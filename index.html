UI.route = UI.route || { screen:"home", entityType:null, entityId:null, section:null };
UI._suppressPush=false;
function routeKey(r){ return r? [r.screen,(r.entityType||""),(r.entityId||""),(r.section||"")].join("|") : "home"; }
function saveCurrentScroll(){
  try{ const y=window.scrollY||document.documentElement.scrollTop||0;
    S.uiState=S.uiState||{}; S.uiState.scrollPositions=S.uiState.scrollPositions||{};
    S.uiState.scrollPositions[routeKey(UI.route)]=y; }catch(e){}
}
function restoreScroll(r){
  try{ const y=(S.uiState&&S.uiState.scrollPositions&&S.uiState.scrollPositions[routeKey(r)])||0;
    setTimeout(()=>window.scrollTo(0,y),0); }catch(e){ window.scrollTo(0,0); }
}
function pushHistory(route){
  if(UI._suppressPush) return;
  S.uiState=S.uiState||{}; S.uiState.entityHistory=S.uiState.entityHistory||[];
  const h=S.uiState.entityHistory;
  const snap={screen:route.screen,entityType:route.entityType||null,entityId:route.entityId||null,section:route.section||null,
    filters:captureScreenFilters(route.screen),scroll:(window.scrollY||0)};
  if(!h.length || routeKey(h[h.length-1])!==routeKey(snap)) h.push(snap);
  if(h.length>30) h.splice(0,h.length-30);
}
function popHistory(){ const h=(S.uiState&&S.uiState.entityHistory)||[]; return h.length?h.pop():null; }
function captureScreenFilters(screen){
  if(screen==="players") return {q:PSTATE.q,f:PSTATE.f,s:PSTATE.s};
  if(screen==="world") return {q:WORLDQ,tab:WORLDTAB};
  if(screen==="scout") return {seg:SEG.scout};
  if(screen==="transfer") return {seg:SEG.transfer};
  if(screen==="agency") return {seg:SEG.agency};
  return null;
}
function restoreScreenFilters(screen,filters){
  if(!filters) return;
  if(screen==="players"){ if(filters.q!=null)PSTATE.q=filters.q; if(filters.f)PSTATE.f=filters.f; if(filters.s)PSTATE.s=filters.s; }
  else if(screen==="world"){ if(filters.q!=null)WORLDQ=filters.q; if(filters.tab)WORLDTAB=filters.tab; }
  else if(screen==="scout"&&filters.seg) SEG.scout=filters.seg;
  else if(screen==="transfer"&&filters.seg) SEG.transfer=filters.seg;
  else if(screen==="agency"&&filters.seg) SEG.agency=filters.seg;
}
/* full-page entity göster (mevcut open* HTML'ini yeniden kullanır) */
function entityBreadcrumb(){
  const r=UI.route; if(!r) return "";
  const crumbs=[];
  const go=(label,onclick)=>`<a onclick="${onclick}" style="cursor:pointer;color:var(--ink2)">${escapeHtml(label)}</a>`;
  if(r.entityType==="player"){ const p=S.world.players[r.entityId];
    if(p&&p.agent==="you") crumbs.push(go("Portföy","navigateTo('players')")); else crumbs.push(go("Dünya","navigateTo('world')"));
    if(p) crumbs.push(escapeHtml(p.name)); }
  else if(r.entityType==="country"){ crumbs.push(go("Dünya","navigateTo('world')")); const c=(S.world.countries||[]).find(x=>x.id===r.entityId); crumbs.push(c?escapeHtml(c.name):"Ülke"); }
  else if(r.entityType==="league"){ const l=S.world.leagues.find(x=>x.id===r.entityId);
    crumbs.push(go("Dünya","navigateTo('world')")); if(l){ crumbs.push(go(l.country,`openEntity('country','${l.countryId}')`)); crumbs.push(escapeHtml(l.name)); } }
  else if(r.entityType==="club"){ const c=S.world.clubs[r.entityId]; crumbs.push(go("Dünya","navigateTo('world')"));
    if(c){ crumbs.push(go(c.countryId,`openEntity('country','${c.countryId}')`)); const l=S.world.leagues.find(x=>x.id===c.leagueId); if(l)crumbs.push(go(l.name,`openEntity('league','${l.id}')`)); crumbs.push(escapeHtml(c.name)); } }
  else if(r.entityType==="rivalAgency"){ crumbs.push(go("Rakip İstihbaratı","gotoAgency('genel')")); const rv=rivalById(r.entityId); crumbs.push(rv?escapeHtml(rv.name):"Rakip"); }
  else if(r.entityType==="negotiation"){ crumbs.push(go("Transfer","navigateTo('transfer')")); crumbs.push("Pazarlık"); }
  else if(r.entityType==="department"){ crumbs.push(go("Ajans","gotoAgency('departmanlar')")); const def=DEPT_MAP[r.entityId]; crumbs.push(def?escapeHtml(def.name):"Departman"); }
  else if(r.entityType==="finance"){ crumbs.push(go("Ajans","gotoAgency('finans')")); crumbs.push("Finans Merkezi"); }
  else if(r.entityType==="competition"){ crumbs.push(go("Dünya","navigateTo('world')"));
    let comp=null; try{ const ce=ensureCompetitions(S); comp=Object.values(ce.domestic).find(x=>x.id===r.entityId)||ce.continental.find(x=>x.id===r.entityId); }catch(e){}
    crumbs.push(comp?escapeHtml(comp.name):"Turnuva"); }
  else if(r.entityType==="scoutFind"){ crumbs.push(go("Keşif","navigateTo('scout')"));
    const rep=(S.reports||[]).find(x=>x.id===r.entityId); const pp=rep?S.world.players[rep.pid]:null;
    crumbs.push(pp?escapeHtml(pp.name):"Scout Raporu"); }
  else if(r.entityType==="match"){ crumbs.push(go("Dünya","navigateTo('world')")); crumbs.push("Oyuncu Performansı"); }
  else crumbs.push("Detay");
  return crumbs.join(' <span style="opacity:.5">›</span> ');
}

  if(!sameEntity){ if(cur.screen!=="entity") saveCurrentScroll(); pushHistory(cur); }
  setActiveRoute({screen:"entity",entityType:type,entityId:id,section:(opts.section!=null?opts.section:(sameEntity?cur.section:null))});
  TAB="entity";

const ENTITY_OPENERS={player:pid=>openPlayer(pid),country:cid=>openCountry(cid),league:lid=>openLeague(lid),
  club:cid=>openClub(cid),rivalAgency:rid=>openRivalAgency(rid),negotiation:oid=>openOffer(oid),
  department:id=>openDepartmentEntity(id),finance:()=>openFinanceEntity(),
  competition:id=>openCompetition(id),scoutFind:id=>openScoutFind(id),match:id=>openMatch(id)};
function openEntity(type,id,opts){ opts=opts||{};
  if(opts.section!=null){ if(type==="player") PDTAB=opts.section; if(type==="rivalAgency") RVTAB=opts.section; }
  const fn=ENTITY_OPENERS[type];
  if(!fn){ toast("Bilinmeyen ekran"); return; }
  if(!entityExists(type,id)){ toast("Kayıt bulunamadı ⚠️"); navigateTo("home"); return; }
  if((type==="club"&&typeof canViewClub==="function"&&!canViewClub(id))||(type==="player"&&typeof canViewPlayer==="function"&&!canViewPlayer(id))||(type==="league"&&typeof canViewLeague==="function"&&!canViewLeague(id))){ showEntityPage(type,id,lockedEntityPage(type,id)); return; }
  fn(id);
}
function entityExists(type,id){
  if(type==="player") return !!S.world.players[id];
  if(type==="country") return !!(S.world.countries||[]).find(x=>x.id===id);
  if(type==="league") return !!S.world.leagues.find(x=>x.id===id);
  if(type==="club") return !!S.world.clubs[id];
  if(type==="rivalAgency") return !!rivalById(id);
  if(type==="negotiation") return !!S.offers.find(x=>x.id===id);
  if(type==="department") return !!(S.departments&&S.departments[id]);
  if(type==="finance") return true;

  return true;
}

function scoreAction(a){
  return (a.score||0) + (a.deadline||0) + (a.fin||0) + (a.player||0) + (a.loyalty||0) + (a.contract||0) + (a.rival||0) + (a.irr||0);
}
function applyDelegationToActions(actions){
  // ajans büyüdükçe rutin/düşük riskli işleri delege et (action center'dan düşür)
  const tier=calculateAgencyTier().lv;
  const d=S.delegation||{};
  const relOk=deptUnlocked&&deptUnlocked("relations")&&deptBonus("relations")>0.4;
  const legalOk=deptUnlocked&&deptUnlocked("legal")&&deptBonus("legal")>0.4;
  return actions.filter(a=>{
    if(!a.deleg) return true;
    // delege koşulu: ilgili departman güçlü VEYA ajans tier yüksek
    if(a.key==="low_offers" && (d.autoReject|| tier>=4)) return false;
    if(a.key==="reports" && relOk) return false;
    if((a.key==="club_contract_grp"||a.key==="rep_grp") && legalOk && tier>=4) return false;
    return true;
  });
}
function buildScoredActions(){
  let cand=buildActionCandidates();
  cand=applyDelegationToActions(cand);
  cand.forEach(a=>a._score=scoreAction(a));
  cand.sort((x,y)=>y._score-x._score);
  // kategoriye göre sınırla: 3 kritik + 3 önerilen + 3 yaklaşan
  const out=[]; const caps={crit:0,sugg:0,soon:0};
  for(const a of cand){ const cat=a.cat||"sugg"; if(caps[cat]>=3) continue; caps[cat]++;
    out.push({t:a.title,cls:cat,btn:a.btn,fn:a.fn,score:a._score,category:cat,deleg:!!a.deleg}); }
  return out;
}
/* geriye dönük uyum: buildActions artık puanlı motoru kullanır */
function buildActions(){ try{ return buildScoredActions(); }catch(e){ console.error("buildActions",e); return []; } }

const VALID_SCREENS=["home","players","scout","transfer","agency","world","news","settings","career","calendar","weeklyBriefing","entity"];
function normalizeRoute(route){

function ensureDeliveryRegistry(){ if(!S.eventDeliveryRegistry) S.eventDeliveryRegistry={}; return S.eventDeliveryRegistry; }
function canDeliverEvent(channel,key){
  if(!key) return true;
  const reg=ensureDeliveryRegistry(); const rec=reg[key];
  if(!rec) return true;
  // aynı olay (aynı key) aynı hafta hangi kanaldan olursa tekrar üretilmez (telefon↔bildirim dedup + tekrar önleme)
  if(rec.week===S.week && rec.season===S.season) return false;
  return true;
}
function markEventDelivered(channel,key){
  if(!key) return; const reg=ensureDeliveryRegistry();
  reg[key]={channel,week:S.week,season:S.season,t:nowTick()};
  pruneDeliveryRegistry();
}
function pruneDeliveryRegistry(){
  const reg=S.eventDeliveryRegistry||{}; const keys=Object.keys(reg);
  if(keys.length<=120) return;
  // en eski kayıtları at
  keys.map(k=>[k,reg[k].t||0]).sort((a,b)=>a[1]-b[1]).slice(0,keys.length-120).forEach(([k])=>delete reg[k]);
}
function deliverPhoneEvent(message,dedupMeta){

}
function deliverNotificationEvent(notif,dedupMeta){

}

/* ============================================================

   ============================================================ */
const GENERATION_VERSION=9;
function fnv1a(str){ let h=2166136261>>>0; for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function ensureSaveMeta(st){ st=st||S; if(!st.saveMeta) st.saveMeta={version:9,generationVersion:st.worldPersistence?st.worldPersistence.generationVersion:null,
  lastSavedAt:0,lastSuccessfulSaveAt:0,lastCheckpointTick:0,lastSeasonCheckpoint:0,lastTransferCheckpoint:0,
  checksum:0,recoveryStatus:"ok",saveSequence:0,dirtySince:0}; return st.saveMeta; }
/* ---- IndexedDB kanalı ---- */
let _idb=null;
function idbOpen(){ return new Promise((res)=>{ try{
  if(typeof indexedDB==="undefined"){ res(null); return; }
  if(_idb){ res(_idb); return; }
  const req=indexedDB.open("agentempire",1);
  req.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains("saves")) db.createObjectStore("saves"); };
  req.onsuccess=e=>{ _idb=e.target.result; res(_idb); };
  req.onerror=()=>res(null);
}catch(e){ res(null); } }); }
function idbPut(key,val){ return new Promise(async(res)=>{ try{ const db=await idbOpen(); if(!db){res(false);return;}
  const tx=db.transaction("saves","readwrite"); tx.objectStore("saves").put(val,key);
  tx.oncomplete=()=>res(true); tx.onerror=()=>res(false); }catch(e){ res(false); } }); }
function idbGet(key){ return new Promise(async(res)=>{ try{ const db=await idbOpen(); if(!db){res(null);return;}
  const tx=db.transaction("saves","readonly"); const rq=tx.objectStore("saves").get(key);
  rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>res(null); }catch(e){ res(null); } }); }
/* ---- checksum'lı payload ---- */
function buildSavePayload(){
  const meta=ensureSaveMeta(S);
  meta.version=9; meta.saveSequence=(meta.saveSequence||0)+1; meta.lastSavedAt=Date.now(); meta.checksum=0;
  let world=S.world;
  try{ if(S.worldPersistence&&S.worldPersistence.mode==="delta"){ const d=serializeWorldDeltas(); if(d) world=d; } }catch(e){ console.error("delta",e); }
  const payload={...S,decisions:[],_idx:null,world};
  let j=JSON.stringify(payload);
  meta.checksum=fnv1a(j);
  payload.saveMeta={...meta};
  return JSON.stringify(payload);
}
function verifyPayload(j){
  try{ const o=JSON.parse(j); if(!o||!o.saveMeta) return o&&o.v?o:null; // eski format: checksum'sız kabul
    const cs=o.saveMeta.checksum; const meta={...o.saveMeta,checksum:0};
    const clone={...o,saveMeta:{...o.saveMeta,checksum:0}};
    // checksum orijinal serileştirme üzerinden hesaplandı; yeniden üretim sırası aynı olmayabilir → yapısal doğrulama esas
    if(!o.world||typeof o.v!=="number") return null;
    return o;
  }catch(e){ return null; }
}
/* ---- save queue ---- */
let saveInFlight=false, saveQueued=false, saveTimer=null;
function markStateDirty(reason){ const m=ensureSaveMeta(S); if(!m.dirtySince) m.dirtySince=Date.now(); }
function setSaveIndicator(txt){ try{ const el=document.getElementById("saveInd"); if(el){ el.textContent=txt; el.style.opacity=txt?"1":"0";
  if(txt==="Kaydedildi") setTimeout(()=>{ if(el.textContent==="Kaydedildi") el.style.opacity="0"; },1800); } }catch(e){}
}
function requestSave(reason,options){
  options=options||{};
  if(!S) return;
  markStateDirty(reason);
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>flushSaveQueue(), options.immediate?0:350);
}
async function flushSaveQueue(){
  if(saveInFlight){ saveQueued=true; return; }
  saveInFlight=true;
  try{ await performAtomicSave(); }catch(e){ console.error("save",e); setSaveIndicator("Kurtarma gerekli"); }
  saveInFlight=false;
  if(saveQueued){ saveQueued=false; flushSaveQueue(); }
}
async function performAtomicSave(){
  setSaveIndicator("Kaydediliyor…");
  const meta=ensureSaveMeta(S);
  let j; try{ j=buildSavePayload(); }catch(e){ console.error(e); return; }
  _mem=j;
  // yedek rotasyonu: her 8 kayıtta bir kaydır
  try{
    if(meta.saveSequence%8===0){
      const b0=localStorage.getItem(SAVE_KEY+"-b0"); const b1=localStorage.getItem(SAVE_KEY+"-b1");
      if(b1) localStorage.setItem(SAVE_KEY+"-b2",b1);
      if(b0) localStorage.setItem(SAVE_KEY+"-b1",b0);
      const cur=localStorage.getItem(SAVE_KEY); if(cur) localStorage.setItem(SAVE_KEY+"-b0",cur);
    }
    localStorage.setItem(SAVE_KEY,j);
  }catch(e){ /* localStorage dolu olabilir — IDB devam eder */ }
  try{ await idbPut("primary",j); }catch(e){}
  try{ if(window.storage) await window.storage.set(SAVE_KEY,j); }catch(e){}
  meta.lastSuccessfulSaveAt=Date.now(); meta.dirtySince=0;
  try{ clearEmergencySnapshot(); }catch(e){}
  setSaveIndicator("Kaydedildi");
}

  ensureSaveMeta(S).lastSeasonCheckpoint=nowTick(); }catch(e){} }

/* ---- çok kanallı yükleme ---- */
async function loadBestSave(){
  const tryParse=(j,src)=>{ if(!j) return null; const o=verifyPayload(j); return o?{state:o,src}:null; };
  let found=null, sawCorrupt=false;
  const idbJ=await idbGet("primary"); if(idbJ){ found=tryParse(idbJ,"idb"); if(!found) sawCorrupt=true; }
  if(!found){ try{ const j=localStorage.getItem(SAVE_KEY); if(j){ found=tryParse(j,"local"); if(!found) sawCorrupt=true; } }catch(e){} }
  if(!found){ try{ if(window.storage){ const r=await window.storage.get(SAVE_KEY); if(r&&r.value){ found=tryParse(r.value,"storage"); if(!found) sawCorrupt=true; } } }catch(e){} }
  for(const bk of ["-b0","-b1","-b2","-season","-backup","-manualbackup"]){
    if(found) break;
    try{ const j=localStorage.getItem(SAVE_KEY+bk); if(j){ found=tryParse(j,"backup"+bk); if(!found) sawCorrupt=true; } }catch(e){}
  }
  if(!found&&_mem) found=tryParse(_mem,"mem");
  return {found,sawCorrupt};
}

/* ============================================================
   V9 — SEED + DELTA DÜNYA KAYDI (güvenli full-snapshot fallback ile)
   ============================================================ */
function ensureWorldPersistence(st){ st=st||S;
  if(!st.worldPersistence) st.worldPersistence={baseSeed:st.worldSeed||st.seed||0,generationVersion:(st.world&&st.world.generationVersion)||null,
    presetId:st.worldPreset||"standard",generatedAt:0,deltaVersion:1,mode:"full",entityOverrides:null,deletedEntityIds:[],createdEntityIds:[],lastCompactionTick:0,validated:false};
  return st.worldPersistence; }
function regenerateWorldBase(seed,presetId){
  const sv=_seed, pv=_pid;
  let base=null;
  try{ base=generateWorldFromPreset(presetId,seed); }catch(e){ console.error("regen",e); }
  _seed=sv; _pid=pv;
  return base;
}
function serializeWorldDeltas(){
  const wp=ensureWorldPersistence(S);
  if(wp.mode!=="delta"||!wp.validated) return null;
  if(!window._worldBase) window._worldBase=regenerateWorldBase(wp.baseSeed,wp.presetId);
  const base=window._worldBase; if(!base) return null;
  const overrides={players:{},clubs:{}}, created={players:{},clubs:{}}, deleted={players:[],clubs:[]};
  for(const id in S.world.players){ const cur=JSON.stringify(S.world.players[id]); const b=base.players[id];
    if(!b) created.players[id]=S.world.players[id];
    else if(JSON.stringify(b)!==cur) overrides.players[id]=S.world.players[id]; }
  for(const id in base.players) if(!S.world.players[id]) deleted.players.push(id);
  for(const id in S.world.clubs){ const cur=JSON.stringify(S.world.clubs[id]); const b=base.clubs[id];
    if(!b) created.clubs[id]=S.world.clubs[id];
    else if(JSON.stringify(b)!==cur) overrides.clubs[id]=S.world.clubs[id]; }
  for(const id in base.clubs) if(!S.world.clubs[id]) deleted.clubs.push(id);
  const delta={__delta:true,seed:wp.baseSeed,preset:wp.presetId,generationVersion:GENERATION_VERSION,
    leagues:S.world.leagues,countries:S.world.countries,youthPool:S.world.youthPool,
    clubNameVersion:S.world.clubNameVersion||2,dataVersion:S.world.dataVersion,
    overrides,created,deleted};
  // boyut kontrolü: delta full'ün %60'ından büyükse anlamsız
  try{ const ds=JSON.stringify(delta).length, fs2=JSON.stringify(S.world).length;
    if(ds>fs2*0.6){ return null; } }catch(e){ return null; }
  return delta;
}
function applyWorldDeltas(base,delta){
  base.leagues=delta.leagues; base.countries=delta.countries; base.youthPool=delta.youthPool;
  base.clubNameVersion=delta.clubNameVersion; base.dataVersion=delta.dataVersion;
  for(const id of delta.deleted.players) delete base.players[id];
  for(const id of delta.deleted.clubs) delete base.clubs[id];
  for(const id in delta.overrides.players) base.players[id]=delta.overrides.players[id];
  for(const id in delta.overrides.clubs) base.clubs[id]=delta.overrides.clubs[id];
  for(const id in delta.created.players) base.players[id]=delta.created.players[id];
  for(const id in delta.created.clubs) base.clubs[id]=delta.created.clubs[id];
  return base;
}
function hydrateWorldIfDelta(st){
  if(!st||!st.world||!st.world.__delta) return st;
  const d=st.world;
  if(d.generationVersion!==GENERATION_VERSION){ throw new Error("generation version mismatch"); }
  const base=regenerateWorldBase(d.seed,d.preset);
  if(!base) throw new Error("world regen failed");
  st.world=applyWorldDeltas(base,d);
  return st;
}
function validateRegeneratedWorld(){
  const wp=ensureWorldPersistence(S);
  if(wp.generationVersion!==GENERATION_VERSION) return false;
  const base=regenerateWorldBase(wp.baseSeed,wp.presetId);
  if(!base) return false;
  window._worldBase=base;
  // deterministik mi: kulüp sayısı + ilk 5 kulüp adı aynı olmalı
  const b2=regenerateWorldBase(wp.baseSeed,wp.presetId);
  const n1=Object.keys(base.clubs), n2=Object.keys(b2.clubs);
  if(n1.length!==n2.length) return false;
  for(let i=0;i<5&&i<n1.length;i++) if(base.clubs[n1[i]].name!==b2.clubs[n2[i]].name) return false;
  // rekonstrüksiyon testi: delta üret + uygula + karşılaştır
  wp.mode="delta"; wp.validated=true;
  const d=serializeWorldDeltas();

      a.level=4; a.unlockedAtTick=nowTick(); a.unlockReason="tam erişim";

  }

function regulationFor(league){
  const cd=COUNTRY_BY_ID[league.countryId]||{prestige:50,confed:"EU"};
  const prof={leagueId:league.id,workPermitRequired:false,foreignPlayerLimit:99,nonRegionalLimit:99,u21Exemption:true,
    permitMin:0,homegrownRequirement:0,clubTrainedRequirement:0,squadLimit:28};
  if(league.countryId==="en"){ prof.workPermitRequired=true; prof.permitMin=12;
    if(league.tier===1){ prof.squadLimit=25; prof.homegrownRequirement=8; prof.clubTrainedRequirement=4; } }
  else if(["es","it"].includes(league.countryId)&&league.tier===1){ prof.nonRegionalLimit=5; prof.squadLimit=25; prof.homegrownRequirement=4; }
  else if(league.countryId==="tr"&&league.tier===1){ prof.foreignPlayerLimit=12; prof.homegrownRequirement=6; }
  else if(cd.confed==="EU"&&league.tier===1){ prof.nonRegionalLimit=6; prof.squadLimit=25; prof.homegrownRequirement=6; prof.clubTrainedRequirement=2; }
  return prof;
}
/* homegrown = kulüp ülkesinde yetişmiş (yerli) VEYA kulübün altyapısından; clubTrained = kulüp altyapısından ya da 21 yaş altı kadro oyuncusu */
function isHomegrownFor(x,club){ return (x.countryId||x.nat)===club.countryId||x.trainedClubId===club.id; }
function isClubTrainedFor(x,club){ return x.trainedClubId===club.id||(x.age<=21&&x.clubId===club.id); }
function registrationCounts(club){
  const cd=COUNTRY_BY_ID[club.countryId]||{confed:"EU"};
  const squad=(worldIdx().byClub[club.id]||[]).map(id=>S.world.players[id]).filter(Boolean);
  return {squad,cd,
    foreign:squad.filter(x=>(x.countryId||x.nat)!==club.countryId).length,
    nonRegional:squad.filter(x=>((COUNTRY_BY_ID[x.countryId||x.nat]||{confed:cd.confed}).confed)!==cd.confed).length,
    homegrown:squad.filter(x=>isHomegrownFor(x,club)).length,
    clubTrained:squad.filter(x=>isClubTrainedFor(x,club)).length};
}
function permitScoreFor(p,club,offer){
  const lg=S.world.leagues.find(l=>l.id===club.leagueId)||{prestige:50};
  const curLg=leagueOf(p,S.world)||{prestige:40};
  return Math.round((p.internationalCaps||0)*2 + Math.max(0,(p.ca-50))/2 + (offer?offer.fee/1e6:p.value/1e6)
    + (offer&&offer.contract?offer.contract.weeklyWage/8000:p.wage/8000) + curLg.prestige/10 + (p.age<=21?4:0)
    + deptBonus("legal")*3 + specLevel("bigdeal"));
}
function evaluateWorkPermit(p,club,offer){
  const lg=S.world.leagues.find(l=>l.id===club.leagueId); if(!lg) return {verdict:"uygun",score:99};
  const reg=regulationFor(lg);
  const pCid=p.countryId||p.nat;
  if(!reg.workPermitRequired||pCid===club.countryId) return {verdict:"uygun",score:99,reg};
  const score=permitScoreFor(p,club,offer);
  let verdict= score>=reg.permitMin+8?"otomatik": score>=reg.permitMin?"uygun": score>=reg.permitMin-4?"itiraz":"uygun-değil";
  return {verdict,score,reg,needed:reg.permitMin};
}
function evaluateRegistration(p,club){
  const lg=S.world.leagues.find(l=>l.id===club.leagueId); if(!lg) return {ok:true};
  const reg=regulationFor(lg);
  const pCid=p.countryId||p.nat;
  const cd=COUNTRY_BY_ID[club.countryId]||{confed:"EU"}; const pd=COUNTRY_BY_ID[pCid]||{confed:"EU"};
  const foreign=pCid!==club.countryId, nonRegional=cd.confed!==pd.confed;
  const rc=registrationCounts(club);
  const u21=reg.u21Exemption&&p.age<=21;
  // kadro limiti — yerli/yabancı fark etmeksizin (U21 genç listesi kontenjan tüketmez)
  if(rc.squad.length>=(reg.squadLimit||28)&&!u21)
    return {ok:false,reason:`Kadro limiti dolu (${rc.squad.length}/${reg.squadLimit||28}) — kulübün yer açması gerekiyor`,reg,workaround:"loan"};
  // kulüpte yetişme tabanı — yerli oyuncular için de geçerli
  if((reg.clubTrainedRequirement||0)>0&&!isClubTrainedFor(p,club)&&!u21){
    const maxNonCT=(reg.squadLimit||28)-reg.clubTrainedRequirement;
    if(rc.squad.length-rc.clubTrained>=maxNonCT)
      return {ok:false,reason:`Kulüpte yetişme kuralı: en az ${reg.clubTrainedRequirement} kulüp altyapı oyuncusu şart — dış slotlar dolu (${rc.squad.length-rc.clubTrained}/${maxNonCT})`,reg,workaround:"loan"};
  }
  if(!foreign) return {ok:true,reg};
  if(nonRegional&&rc.nonRegional>=reg.nonRegionalLimit&&!u21)
    return {ok:false,reason:`Bölge dışı kontenjan dolu (${rc.nonRegional}/${reg.nonRegionalLimit}) — kulübün bir oyuncu göndermesi gerekiyor`,reg,workaround:"loan"};
  if(rc.foreign>=reg.foreignPlayerLimit&&!u21)
    return {ok:false,reason:`Yabancı kontenjanı dolu (${rc.foreign}/${reg.foreignPlayerLimit})`,reg,workaround:"loan"};
  // homegrown tabanı — yerli yetişme sayısını imkânsız kılacak yabancı kaydı reddedilir
  if((reg.homegrownRequirement||0)>0&&!isHomegrownFor(p,club)&&!u21){
    const maxNonHG=(reg.squadLimit||28)-reg.homegrownRequirement;
    if(rc.squad.length-rc.homegrown>=maxNonHG)
      return {ok:false,reason:`Altyapı (homegrown) kuralı: kadroda en az ${reg.homegrownRequirement} yerli yetişme şart — yabancı slotlar dolu (${rc.squad.length-rc.homegrown}/${maxNonHG})`,reg,workaround:"loan"};
  }
  return {ok:true,reg,note:foreign?`Yabancı kontenjan: ${rc.foreign}/${reg.foreignPlayerLimit===99?"∞":reg.foreignPlayerLimit}`:null};
}
function offerEligibility(o){
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  if(!p||!c) return {permit:{verdict:"uygun"},reg:{ok:true}};
  return {permit:evaluateWorkPermit(p,c,o),reg:evaluateRegistration(p,c)};
}
function appealWorkPermit(oid){
  const o=S.offers.find(x=>x.id===oid); if(!o) return;
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  const ev=evaluateWorkPermit(p,c,o);
  if(ev.verdict!=="itiraz"){ toast("İtiraz gerekmiyor"); return; }
  const chance=clamp(0.35+deptBonus("legal")*0.3+deptBonus("international")*0.2+(c.relation||0)/300,0.1,0.85);
  const kase={oid,pid:o.pid,cid:o.cid,s:S.season,w:S.week,score:ev.score,needed:ev.needed};
  if(rnd()<chance){ o._permitAppealed=true; kase.result="onay";
    addNews("me",`Çalışma izni itirazı KABUL: ${p.name} ✅`,`Hukuk ekibin itirazı kazandı — transfer önünde engel kalmadı.`,"good");
    toast("İtiraz kabul edildi ✅","green"); }
  else { kase.result="ret"; o._permitDenied=true;
    addNews("me",`Çalışma izni itirazı RED: ${p.name} ❌`,`Federasyon itirazı reddetti. Kiralık çözüm veya başka lig dene.`,"bad");
    toast("İtiraz reddedildi ❌"); }
  S.workPermitCases=S.workPermitCases||[]; S.workPermitCases.unshift(kase); S.workPermitCases=S.workPermitCases.slice(0,20);
  requestSave("permit"); openOffer(oid,{section:"eligibility"});
}

function repairRepresentationConsistency(state){
  state=state||S;
  state.representationAgreements=state.representationAgreements||{};
  state.recoveryLog=state.recoveryLog||[];
  state.formerClients=state.formerClients||[];
  let fixes=0;
  const log=(txt)=>{ state.recoveryLog.unshift({t:(state.season-1)*BAL.weeksPerSeason+state.week,txt}); if(state.recoveryLog.length>20)state.recoveryLog.length=20; fixes++; };
  const tick=(state.season-1)*BAL.weeksPerSeason+state.week;
  for(const pid in state.world.players){
    const p=state.world.players[pid];
    const ag=state.representationAgreements[pid];
    if(p.agent==="you"){
      if(!ag){ // A: agent var, sözleşme yok → güvenli default
        const wks=(p.agentWeeksLeft&&p.agentWeeksLeft>0)?p.agentWeeksLeft:80;
        if(!p.agentWeeksLeft||p.agentWeeksLeft<=0){ p.agentWeeksLeft=wks; log(`${p.name}: temsil süresi bilinmiyordu — 80 hafta legacy süre atandı`); }
        state.representationAgreements[pid]={pid,durationWeeks:wks,transferCommission:p.agentCommission||0.08,
          wageCommission:0.05,sponsorCommission:0.15,exclusiveTransferRights:true,contractNegotiationRights:true,
          mediaRights:false,terminationClause:true,servicePromises:1,signedTick:tick,endTick:tick+wks,status:"active"};
        if(p.agentWeeksLeft>0) fixes++;
      } else if(ag.endTick!=null&&ag.endTick<=tick&&(p.agentWeeksLeft||0)>0){
        ag.endTick=tick+p.agentWeeksLeft; ag.status="active"; fixes++; // C: agentWeeksLeft esas
      } else if(ag.endTick!=null&&ag.endTick<=tick&&(p.agentWeeksLeft||0)<=0){
        // C: gerçekten bitmiş → yenileme akışına (oyuncu ayrılır, sessiz silinmez)
        ag.status="expired"; p.agent=null;
        state.formerClients.unshift({pid,name:p.name,leftTick:tick,reason:"süre bitti"});
        if(state.formerClients.length>25)state.formerClients.length=25;
        log(`${p.name}: temsil süresi doldu — portföyden ayrıldı (yenilenmedi)`);
      }
    } else if(p.agent==="rival"){
      if(ag&&_agreementActive(ag,null)){ ag.status="terminated"; ag.terminatedAt=tick;
        state.formerClients.unshift({pid,name:p.name,leftTick:tick,reason:"rakip ajansa geçti"});
        if(state.formerClients.length>25)state.formerClients.length=25;
        log(`${p.name}: rakip ajansa geçti — sözleşme feshedildi`); } // E
    } else if(!p.agent){
      if(ag&&_agreementActive(ag,p)&&(p.agentWeeksLeft||0)>0){ p.agent="you"; fixes++; } // B
      else if(ag&&_agreementActive(ag,p)&&ag.endTick&&ag.endTick>tick){ p.agent="you"; p.agentWeeksLeft=ag.endTick-tick; fixes++; } // B
    }
  }
  // D: orphan agreements
  for(const pid in state.representationAgreements){
    if(!state.world.players[pid]){
      const ag=state.representationAgreements[pid];
      if(ag&&ag.status!=="orphan_closed"){ ag.status="orphan_closed"; log(`Orphan temsil sözleşmesi kapatıldı (${pid})`); }
    }
  }
  if(fixes) invalidatePortfolioIndexes("repair");
  return fixes;
}
function closeExpiredRepresentationAgreements(state){
  state=state||S;
  const tick=(state.season-1)*BAL.weeksPerSeason+state.week;
  for(const pid in (state.representationAgreements||{})){
    const ag=state.representationAgreements[pid]; const p=state.world.players[pid];
    if(!ag||ag.status==="expired"||ag.status==="terminated"||ag.status==="orphan_closed") continue;
    if(p&&p.agent!=="you"&&p.agent!=null){ ag.status="terminated"; ag.terminatedAt=tick; }
    else if(p&&p.agent==="you"&&(p.agentWeeksLeft||0)>0){ ag.endTick=tick+p.agentWeeksLeft; }
  }
}
/* ============================================================
   V9 COMPLETE — GERÇEK CHECKSUM (stable stringify + strict compare)
   ============================================================ */
function stableStringify(v){
  const seen=new Set();
  function go(x){
    if(x===null) return "null";
    const t=typeof x;
    if(t==="number") return isFinite(x)?String(x):"null";
    if(t==="boolean") return x?"true":"false";
    if(t==="string") return JSON.stringify(x);
    if(t==="undefined"||t==="function") return "null";
    if(Array.isArray(x)) return "["+x.map(go).join(",")+"]";
    if(t==="object"){
      if(seen.has(x)) return "null";
      seen.add(x);
      const keys=Object.keys(x).sort();
      const out="{"+keys.filter(k=>x[k]!==undefined&&typeof x[k]!=="function").map(k=>JSON.stringify(k)+":"+go(x[k])).join(",")+"}";
      seen.delete(x);
      return out;
    }
    return "null";
  }
  return go(v);
}
function buildSerializableSaveState(state){
  state=state||S;
  let world=state.world;
  try{ if(state.worldPersistence&&state.worldPersistence.mode==="delta"&&state.worldPersistence.validated){
    const d=serializeWorldDeltas(); if(d) world=d; } }catch(e){}
  const clone={...state,decisions:[],_idx:null,world};
  return clone;
}
function buildChecksumSource(clone){
  const metaSave=clone.saveMeta;
  clone.saveMeta={...(clone.saveMeta||{}),checksum:0};
  const src=stableStringify(clone);
  clone.saveMeta=metaSave;
  return src;
}
function calculateSaveChecksum(clone){ return fnv1a(buildChecksumSource(clone)); }
/* buildSavePayload — checksum'lı, algo etiketli */
function buildSavePayload(){
  const meta=ensureSaveMeta(S);
  meta.version=9; meta.saveSequence=(meta.saveSequence||0)+1; meta.lastSavedAt=Date.now();
  meta.schemaRevision=2; meta.checksumAlgo="stable1";
  const clone=buildSerializableSaveState(S);
  clone.saveMeta={...meta,checksum:0};
  const cs=fnv1a(stableStringify(clone));
  meta.checksum=cs;
  clone.saveMeta={...meta};
  return JSON.stringify(clone);
}
/* verifyPayload — GERÇEK karşılaştırma */
function verifyPayload(j){
  try{
    const o=JSON.parse(j);
    if(!o||typeof o.v!=="number"||!o.world) return null;
    for(const k of ["cash","rep","week","season"]) if(typeof o[k]!=="number"||!isFinite(o[k])) return null;
    const meta=o.saveMeta;
    const algo=meta?meta.checksumAlgo:undefined;
    if(algo==="stable1"){
      if(meta.checksum==null) return {__invalid:true,reason:"missing_checksum"};
      const clone={...o,saveMeta:{...meta,checksum:0}};
      const calc=fnv1a(stableStringify(clone));
      if(calc!==meta.checksum){ return {__invalid:true,reason:"checksum_mismatch"}; }
      return o;
    }
    if(algo!=null){ return {__invalid:true,reason:"unknown_checksum_algorithm"}; }
    // checksumAlgo yok:
    if(o.v<=8){ o.__legacyNoChecksum=true; return o; } // V8 ve öncesi: yapısal migrasyon
    // v>=9 ama algo etiketi yok → eski V9 formatı. Eski algoritma (sırasal JSON.stringify) ile doğrulanmak ZORUNDA.
    if(!meta||typeof meta.checksum!=="number") return {__invalid:true,reason:"missing_checksum"};
    const legacyClone={...o,saveMeta:{...meta,checksum:0}};
    if(fnv1a(JSON.stringify(legacyClone))!==meta.checksum){ return {__invalid:true,reason:"checksum_mismatch"}; }
    o.__legacyOldChecksum=true;
    return o;
  }catch(e){ return null; }
}

function estimateRange(val,cid,field){

function resolveStartingMarketAccess(startId,worldCountries){
  const ids=worldCountries.map(c=>c.id);
  const has=cid=>ids.includes(cid);
  const scoutM=[],knownM=[];
  for(const n of (REGION_NEIGHBORS[startId]||[])){ if(has(n)&&n!==startId){ if(scoutM.length<2) scoutM.push(n); else if(knownM.length<2) knownM.push(n); } }
  if(scoutM.length<2){
    const startCd=COUNTRY_BY_ID[startId]||{confed:"EU",prestige:50};
    const cands=worldCountries.filter(c=>c.id!==startId&&!scoutM.includes(c.id)&&(COUNTRY_BY_ID[c.id]||{}).confed===startCd.confed)
      .sort((a,b)=>Math.abs((COUNTRY_BY_ID[a.id]||{prestige:50}).prestige-startCd.prestige)-Math.abs((COUNTRY_BY_ID[b.id]||{prestige:50}).prestige-startCd.prestige));
    for(const c of cands){ if(scoutM.length<2) scoutM.push(c.id); else if(knownM.length<1&&!knownM.includes(c.id)) knownM.push(c.id); if(scoutM.length>=2&&knownM.length>=1) break; }
  }
  if(!knownM.length){ const rest=ids.filter(i=>i!==startId&&!scoutM.includes(i)); if(rest.length) knownM.push(rest[0]); }
  return {full:[startId],scout:scoutM,known:knownM};
}

function initGroupStage(comp){
  const parts=comp.participants.slice();
  const nG=Math.max(2,Math.floor(parts.length/4));
  comp.stage="groups"; comp.groups=[];
  for(let g=0;g<nG;g++){
    const teams=parts.slice(g*4,(g+1)*4);
    comp.groups.push({name:String.fromCharCode(65+g),teams,
      table:Object.fromEntries(teams.map(id=>[id,{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}]))});
  }
  comp.groupMatchday=0;
}
function playGroupMatchday(comp){
  const pairsFor=(teams,day)=>{ // 4 takım 3 gün round-robin
    const P=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]];
    return (P[day]||[]).map(([a,b])=>[teams[a],teams[b]]).filter(x=>x[0]&&x[1]);
  };
  const results=[];
  for(const g of comp.groups){
    for(const [h0,a0] of pairsFor(g.teams,comp.groupMatchday)){
      const r=playCupMatch(comp,h0,a0);
      const m=r.score.match(/(\d+)-(\d+)/); const gh=+m[1],ga=+m[2];
      const T=g.table;
      T[h0].P++; T[a0].P++; T[h0].GF+=gh; T[h0].GA+=ga; T[a0].GF+=ga; T[a0].GA+=gh;
      if(gh>ga){ T[h0].W++; T[h0].Pts+=3; T[a0].L++; }
      else if(ga>gh){ T[a0].W++; T[a0].Pts+=3; T[h0].L++; }
      else { T[h0].D++; T[a0].D++; T[h0].Pts++; T[a0].Pts++; }
      results.push({home:h0,away:a0,score:`${gh}-${ga}`,winner:r.winner});
      maybeStoreMatch(comp,"Grup "+g.name,r,gh,ga);
    }
  }
  comp.rounds.push({round:comp.currentRound+1,week:S.week,stage:"Grup "+(comp.groupMatchday+1),results});
  comp.currentRound++; comp.groupMatchday++;
  if(comp.groupMatchday>=3){
    // grup sonu: her gruptan ilk 2
    const qualified=[];
    for(const g of comp.groups){
      const sorted=g.teams.slice().sort((a,b)=>{ const A=g.table[a],B=g.table[b];
        return B.Pts-A.Pts||(B.GF-B.GA)-(A.GF-A.GA)||B.GF-A.GF; });
      qualified.push(...sorted.slice(0,2));
      for(const id of sorted.slice(0,2)) if(myPlayersAtClub(id).length)
        addNews("me",`🏆 ${comp.name}: gruptan çıktı!`,`${S.world.clubs[id]?.name||"?"} eleme turuna yükseldi — oyuncun kıtasal sahnede.`,"good");
    }
    comp.alive=qualified; comp.stage="ko";
  }
}

const POS_GROUP={GK:"GK",CB:"DEF",FB:"DEF",DM:"MID",CM:"MID",AM:"MID",W:"ATT",ST:"ATT"};
/* mentor uyumu: pozisyon grubu + ortak dil + profesyonellik + karakter uyumu → 0..100 */
function mentorCompatibility(youth,vet){
  let sc=0;
  if(POS_GROUP[vet.pos]===POS_GROUP[youth.pos]) sc+=30;
  else if(vet.pos===youth.pos) sc+=30;
  const yl=youth.languageIds||[langOf(youth.countryId||youth.nat)];
  const vl=vet.languageIds||[langOf(vet.countryId||vet.nat)];
  if(yl.some(l=>vl.includes(l))) sc+=25;
  sc+=Math.round((vet.prof||50)*0.3);
  if(vet.char==="lider") sc+=12; else if(vet.char==="prof") sc+=10;
  if(youth.char==="kirilgan"&&(vet.char==="aile"||vet.char==="lider")) sc+=8;
  if(youth.char==="ego"&&vet.char==="ego") sc-=20;
  if(youth.char===vet.char&&youth.char!=="ego") sc+=5;
  return clamp(sc,0,100);
}
function setAcademyMentor(pid){

const COACH_PLAN_MATCH={teknik:"teknik",fizik:"fizik",mental:"mental",adaptasyon:"dil",kariyer:"mac"};
function simAcademyWeekly(sum){
  const ac=S.academy; if(!ac||!(ac.level>0)) return;
  ac.coaches=ac.coaches||[]; ac.developmentPlans=ac.developmentPlans||{}; ac.mentors=ac.mentors||{}; ac.mentorScores=ac.mentorScores||{};
  ac.partnerPlacements=ac.partnerPlacements||{};
  let coachCost=ac.coaches.reduce((s,c)=>s+c.wage,0)+(ac.partnerships||[]).reduce((s,p)=>s+p.weeklyCost,0);
  if(coachCost>0&&S.week%4===0) ledger("Akademi personel/ortaklık",-coachCost*4);
  // ortaklık yerleştirme: kulüpsüz gençler, boş slotu olan partner kulübe maç tecrübesi için gönderilir
  for(const pid of Object.keys(ac.partnerPlacements)){ // ölü kayıtları temizle
    if(!(ac.youthPlayers||[]).includes(pid)||!S.world.players[pid]) delete ac.partnerPlacements[pid]; }
  for(const pt of (ac.partnerships||[])){
    if(!S.world.clubs[pt.clubId]) continue;
    let used=Object.values(ac.partnerPlacements).filter(x=>x.clubId===pt.clubId).length;
    if(used>=(pt.slots||2)) continue;
    for(const pid of (ac.youthPlayers||[])){
      if(used>=(pt.slots||2)) break;
      const p=S.world.players[pid];
      if(!p||p.clubId||ac.partnerPlacements[pid]) continue;
      if(ac.developmentPlans[pid]!=="mac") continue;
      ac.partnerPlacements[pid]={clubId:pt.clubId,startedTick:nowTick()};
      addNews("me",`Akademi yerleştirmesi: ${p.name} 🤝`,`Ortak kulüp ${S.world.clubs[pt.clubId].name} maç tecrübesi için genç oyuncuyu bünyesine aldı.`,"good");
      used++;
    }
  }
  for(const pid of (ac.youthPlayers||[])){
    const p=S.world.players[pid]; if(!p) continue;
    const plan=ac.developmentPlans[pid];
    const coachQ=ac.coaches.length?Math.max(...ac.coaches.map(c=>c.quality)):30;
    let dev=0.02+(coachQ/100)*0.05+(ac.level||0)*0.008;
    // uzmanlık eşleşmesi: plana uyan uzman antrenör gelişimi hızlandırır (kaleci uzmanı GK'lara her planda etki eder)
    const specCoach=ac.coaches.find(c=>COACH_PLAN_MATCH[c.specialty]===plan)||(p.pos==="GK"?ac.coaches.find(c=>c.specialty==="kaleci"):null);
    if(specCoach) dev+=(specCoach.quality/100)*0.04;
    const placement=ac.partnerPlacements[pid];
    const pt=placement?(ac.partnerships||[]).find(x=>x.clubId===placement.clubId):null;
    if(plan==="mac"&&(p.clubId||placement)) dev+=0.04;
    if(plan==="teknik"||plan==="fizik") dev+=0.03;
    if(pt) dev+=0.01+((pt.trust||40)/100)*0.03; // ortaklık gelişim katkısı güvene bağlı
    // mentor etkisi: uyum skoruna göre ölçeklenir
    const mentor=ac.mentors[pid]&&S.world.players[ac.mentors[pid]];
    if(mentor){ const sc=ac.mentorScores[pid]??mentorCompatibility(p,mentor);
      dev+=0.005+(sc/100)*0.035;
      if(sc>=60) p.prof=clamp((p.prof||50)+0.08,0,100); }
    if(p.ca<p.pa&&rnd()<0.5) p.ca=clamp(p.ca+dev*2,10,p.pa);
    if(plan==="dil") p.prof=clamp((p.prof||50)+0.1,0,100);
    if(specCoach&&plan==="dil") p.prof=clamp((p.prof||50)+0.05,0,100);
    if((p.clubId||placement)&&S.week%4===0){ // kiralık/yerleştirme raporu — ortak kulüpte dakika garantisi daha yüksek
      const minBase=pt?ri(25,90):ri(0,90);
      const mins=pt?clamp(minBase+Math.round((pt.trust||40)/5),0,90):minBase;
      const rat=mins>30?clamp(Math.round((5.5+(p.ca-40)/20+gauss())*10)/10,4,9.5):null;
      p._acadLast={mins,rat,w:S.week,partner:!!pt};
      if(rat&&rat>=7.5){ p.form=clamp(p.form+3,10,99); if(pt) pt.trust=clamp((pt.trust||40)+1,0,100); }
    }
  }
}

      strat==="bolge"?["tr","gr","rs","hr"]: strat==="genc"?["br","ar","hr","rs","tr"]:["tr","en","nl","pt"]; }
  rv.internationalReputation=rv.internationalReputation??Math.round(rv.power*0.6);
  rv.sponsorStrength=rv.sponsorStrength??(rv.specialization==="brand"||rv.specialization==="commercial"?70:30);
  rv.academyStrength=rv.academyStrength??(rv.specialization==="wonderkid"?65:25);
}
function simRivalV9(sum){
  for(const rv of (S.rivalAgencies||[])){
    if(rv.status==="çekildi") continue;
    rivalV9Upgrade(rv);
    // trend/turnuva oyuncusu hedefleme: mediaPop yüksek + trend eşleşen sahipsizler
    if(rnd()<0.06){
      const pool=Object.values(S.world.players).filter(p=>!p.agent&&p.discovered&&(p.mediaPop||0)>55
        &&rv.marketRegions.includes(p.clubId?(S.world.clubs[p.clubId]||{}).countryId:(p.countryId||p.nat)));
      if(pool.length){ const p=pool.sort((a,b)=>(b.mediaPop||0)-(a.mediaPop||0))[0];
        if(p&&rv.cash>40000&&rv.playerIds.length<rv.tier*3+4){
          // regülasyon guard: imkânsız pazara oyuncu taşımaz (temsil serbest, guard transferde zaten)
          assignPlayerToRival(S,p,rv); rv.cash-=ri(3000,9000);
          rlog(rv.baseId,`${p.name} (vitrindeki oyuncu) ile imzaladı`); } }
    }
    // sponsor gücü: müşterilerine sponsor bulur → poach cazibesi artar
    if(rv.sponsorStrength>60&&rnd()<0.03){ rv.cash+=ri(5000,20000); rv.power=clamp(rv.power+0.2,0,96); }
    // akademi gücü: genç üretir
    if(rv.academyStrength>60&&S.week===2&&rv.playerIds.length<rv.tier*3+4){
      const lg=S.world.leagues.find(l=>rv.marketRegions.includes(l.countryId)&&l.tier>=2)||S.world.leagues[0];
      if(lg){ const p=makePlayer(lg,{age:ri(16,18),discovered:true,clubId:pick(lg.clubIds)});
        p.countryId=lg.countryId; p.dl="light"; p.value=calcValue(p,S.world); S.world.players[p.id]=p;
        assignPlayerToRival(S,p,rv); rlog(rv.baseId,"akademisinden genç yetenek çıkardı"); } }
    // uluslararası itibar: kıtasal müşteri
    if(S.week%10===0){ const contClients=rv.playerIds.map(id=>S.world.players[id]).filter(Boolean)
        .filter(p=>{ const comp=ensureCompetitions(S); return comp.continental.some(c=>c.alive&&c.alive.includes(p.clubId)); });
      if(contClients.length) rv.internationalReputation=clamp(rv.internationalReputation+1,0,100); }
  }
}
/* ============================================================
   V9 COMPLETE — SCHEMA REVISION 2 MIGRATION (idempotent)
   ============================================================ */
function migrateV9Revision2(st){
  st=st||S;
  ensureSaveMeta(st);
  if((st.saveMeta.schemaRevision||1)>=2) return st; // idempotent
  st.saveMeta.schemaRevision=2;
  // temsil tutarlılığı
  try{ repairRepresentationConsistency(st); }catch(e){}
  // kompakt/eksik başlangıç erişimi onarımı
  try{
    const start=st.startCountry||"tr";
    st.marketAccess=st.marketAccess||{};
    // dünyada olmayan ülkeleri temizle
    const ids=new Set((st.world.countries||[]).map(c=>c.id));
    for(const cid in st.marketAccess) if(!ids.has(cid)) delete st.marketAccess[cid];
    const lvls=Object.values(st.marketAccess).map(a=>a.level||0);
    const scoutN=lvls.filter(l=>l>=2&&l<4).length;
    if(scoutN<2&&(st.world.countries||[]).length>=4){
      const res=resolveStartingMarketAccess(start,st.world.countries);
      const mk=(lvl)=>({level:lvl,knowledgeXP:lvl*25,networkXP:lvl*15,unlockedAtTick:0,unlockReason:"rev2-onarım",
        temporaryAccessUntil:0,invitedClubIds:[],scoutAccuracy:40+lvl*12,negotiationKnowledge:lvl*20,regulationKnowledge:lvl*18,lastActivityTick:0});
      for(const cid of res.scout){ if(!st.marketAccess[cid]||st.marketAccess[cid].level<2) st.marketAccess[cid]=mk(2); }
      for(const cid of res.known){ if(!st.marketAccess[cid]||st.marketAccess[cid].level<1) st.marketAccess[cid]=mk(1); }
    }
  }catch(e){}
  // sponsor kontrat alanları
  try{ for(const pid in st.world.players){ const p=st.world.players[pid];
    if(p.brand&&p.brand.activeDeals) for(const d of p.brand.activeDeals){
      if(!d.performanceBonuses) d.performanceBonuses={goal:Math.round(d.yearly*0.01),cupWin:Math.round(d.yearly*0.08)};
      if(d.injuryProtection===undefined) d.injuryProtection="partial";
      if(d.moralityClause===undefined) d.moralityClause=true;
      if(d.exclusivity===undefined) d.exclusivity=true;
      if(d.renewalOption===undefined) d.renewalOption=true; } } }catch(e){}
  // akademi yapıları
  try{ if(st.academy){ st.academy.coaches=st.academy.coaches||[]; st.academy.partnerships=st.academy.partnerships||[];
    st.academy.developmentPlans=st.academy.developmentPlans||{}; st.academy.mentors=st.academy.mentors||{}; } }catch(e){}
  // rakip özetleri
  try{ for(const rv of (st.rivalAgencies||[])){ const _S=S; S=st; try{ rivalV9Upgrade(rv); }finally{ S=_S; } } }catch(e){}
  // yarışma grup state (mevcut sezon comps grup alanı yoksa dokunma — knockout devam eder; yeni sezonda gruplu üretilir)
  st.matchCenter=st.matchCenter||[];
  st.formerClients=st.formerClients||[];
  st.recoveryLog=st.recoveryLog||[];
  st.specTriggers=st.specTriggers||{};
  // telefon mesajı veri modeli genişletmesi — eski kayıtlara güvenli dolgu (yıkıcı olmayan)
  try{ for(const m of (st.phoneInbox||[])){
    if(m.status==null) m.status=m.done?"resolved":"unread";
    if(m.cid===undefined) m.cid=null; if(m.pid===undefined) m.pid=null; if(m.rid===undefined) m.rid=null;
    if(m.offerId===undefined) m.offerId=null; if(m.sponsorDealId===undefined) m.sponsorDealId=null; if(m.departmentId===undefined) m.departmentId=null;
    if(m.topic===undefined) m.topic=null;
    if(m.urgency===undefined) m.urgency="orta";
    if(m.expiresAtTick===undefined) m.expiresAtTick=null;
    if(m.stage===undefined) m.stage="initial";
    if(m.outcome===undefined) m.outcome=null;
    if(m.followUpTick===undefined) m.followUpTick=null;
    if(m.followUpKind===undefined) m.followUpKind=null;
    if(m.parentMessageId===undefined) m.parentMessageId=null;
  } }catch(e){}
  return st;
}
/* ============================================================
   V9 COMPLETE — ÇOK KANALLI YÜKLEME v2 (emergency + sequence + strict checksum)
   (aynı isimli eski fonksiyonu bilinçli olarak gölgeler)
   ============================================================ */
async function loadBestSave(){
  let sawCorrupt=false;
  const parse=(j,src)=>{
    if(!j) return null;
    const o=verifyPayload(j);
    if(!o){ sawCorrupt=true; return null; }
    if(o.__invalid){ sawCorrupt=true; console.warn("save reddedildi:",src,o.reason); return null; }
    return {state:o,src,seq:(o.saveMeta&&o.saveMeta.saveSequence)||0};
  };
  // adaylar: emergency, idb, localStorage — en yüksek sequence kazanır
  const cands=[];
  try{ const em=localStorage.getItem(SAVE_KEY+"-emergency"); const r=parse(em,"emergency"); if(r) cands.push(r); }catch(e){}
  try{ const idbJ=await idbGet("primary"); const r=parse(idbJ,"idb"); if(r) cands.push(r); }catch(e){}
  try{ const j=localStorage.getItem(SAVE_KEY); const r=parse(j,"local"); if(r) cands.push(r); }catch(e){}
  try{ if(window.storage){ const rr=await window.storage.get(SAVE_KEY); if(rr&&rr.value){ const r=parse(rr.value,"storage"); if(r) cands.push(r); } } }catch(e){}
  let found=null;
  for(const c of cands) if(!found||c.seq>found.seq) found=c;
  // yedek zinciri (primary'ler bozuksa)
  if(!found){
    for(const bk of ["-b0","-b1","-b2","-season","-transfer","-backup","-manualbackup"]){
      try{ const j=localStorage.getItem(SAVE_KEY+bk); const r=parse(j,"backup"+bk); if(r){ found=r; break; } }catch(e){}
    }
  }
  if(!found){ try{ const idbS=await idbGet("season-checkpoint"); const r=parse(idbS,"idb-season"); if(r) found=r; }catch(e){} }
  if(!found&&_mem){ const r=parse(_mem,"mem"); if(r) found=r; }
  return {found,sawCorrupt};
}

if(typeof document.addEventListener==="function") document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ if(UI.menuOpen) closeMainMenu(); else if($("sheetwrap")&&$("sheetwrap").classList.contains("open")) closeSheet(); else if(TAB==="entity") goBack(); return; }
  if(e.key==="Tab"&&UI.menuOpen){
    const w=$("drawerwrap"); if(!w||!w.querySelectorAll) return;
    const f=[...w.querySelectorAll("button")]; if(!f.length) return;
    const first=f[0], last=f[f.length-1];
    if(e.shiftKey&&document.activeElement===first){ e.preventDefault&&e.preventDefault(); last.focus(); }
    else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault&&e.preventDefault(); first.focus(); }
  }
});
(async function(){
  let saved=null, corrupt=false;
  try{ const r=await loadBestSave(); if(r.found){ saved=r.found.state; window.__loadedFrom=r.found.src; } corrupt=r.sawCorrupt&&!r.found; }catch(e){ saved=null; }
  try{ if(saved) saved=hydrateWorldIfDelta(saved); }catch(e){ saved=null; corrupt=true; }
  try{ if(saved) saved=migrateSaveState(saved); }catch(e){ saved=null; corrupt=true; }
  if(saved && saved.v===9 && validateSaveState(saved)){ S=saved; S.decisions=S.decisions||[]; repairSaveState(S); try{ migrateV9Revision2(S); repairRepresentationConsistency(S); }catch(e){} syncPidCounter(S.world); buildWorldIndexes(S);
    try{ if(window.__loadedFrom==="emergency"){ clearEmergencySnapshot(); requestSave("emergency-restore",{immediate:true}); } }catch(e){}
    try{ restoreRouteAfterLoad(); }catch(e){ renderAll(); } toast("Kariyer yüklendi — kaldığın yerden 👋"); }
  else if(corrupt){ renderRecoveryScreen(); }
  else renderOnboarding();
  try{ setupBrowserBack(); }catch(e){}
  try{ setupEmergencySave(); }catch(e){}
})();
