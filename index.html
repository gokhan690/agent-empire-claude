  /* haftalık portföy değer değişimi (ajans geçmişinden) */
  const Hh=(S.history&&S.history.agencyWeekly)||[];
  const prevPv=Hh.length>1?Hh[Hh.length-2].pv:null;
  const pvDelta=prevPv!=null?tv-prevPv:null;
  /* risk özeti */
  const urgentN=mp.filter(p=>(p.agentWeeksLeft>0&&p.agentWeeksLeft<15)||(p.rivalId&&p.loyalty<45)).length;
  const offN=mp.filter(p=>S.offers.some(o=>o.pid===p.id)).length;
  const sadN=mp.filter(p=>p.morale<38).length;
  const injN=mp.filter(p=>p.injury).length;
  const conN=mp.filter(p=>p.clubId&&contractWeeksLeft(p)<26).length;
  let h=`<div class="page-header"><div class="page-eyebrow">MÜŞTERİ YÖNETİMİ</div>
    <div class="page-title">Portföy</div>
    <div class="page-subtitle">${mp.length}/${cap} müşteri · toplam değer ${fmtM(tv)}${pvDelta!=null?` · bu hafta <span class="${pvDelta>=0?'pos-delta':'neg-delta'}">${pvDelta>=0?"+":""}${fmtM(pvDelta)}</span>`:""}</div></div>`;
  /* risk şeridi — dokununca ilgili filtre açılır */
  h+=`<div class="filterrow" role="group" aria-label="risk özeti">
    <button class="fchip ${PSTATE.f==='risk'?'on':''}" onclick="setPF('risk')">🔴 Acil ${urgentN}</button>
    <button class="fchip ${PSTATE.f==='teklif'?'on':''}" onclick="setPF('teklif')">📩 Teklifli ${offN}</button>
    <button class="fchip ${PSTATE.f==='mutsuz'?'on':''}" onclick="setPF('mutsuz')">😞 Mutsuz ${sadN}</button>
    <button class="fchip ${PSTATE.f==='sakat'?'on':''}" onclick="setPF('sakat')">🤕 Sakat ${injN}</button>
    <button class="fchip ${PSTATE.f==='kontrat'?'on':''}" onclick="setPF('kontrat')">📄 Kontrat ${conN}</button></div>`;
  h+=`
  <input class="search" placeholder="Oyuncu veya kulüp ara..." value="${PSTATE.q}" oninput="pQ(this.value)" aria-label="oyuncu ara">
  <div class="filterrow">${[["all","Tümü"],["genc","Gençler"],["form","Formda"],["mutsuz","Mutsuz"],["sakat","Sakat"],["teklif","Teklifli"],["kontrat","Kontrat"],["risk","Acil"]].map(([k,l])=>
    `<button class="fchip ${PSTATE.f===k?'on':''}" onclick="setPF('${k}')">${l}</button>`).join("")}</div>
  <div class="row" style="justify-content:flex-end;margin-bottom:8px"><label class="tiny" style="margin-right:6px">Sırala:</label>
  <select class="sel" onchange="setPS(this.value)" aria-label="sıralama">
    ${[["value","Piyasa değeri"],["pot","Potansiyel"],["age","Yaş"],["form","Form"],["morale","Moral"],["loyalty","Sadakat"],["contract","Sözleşme süresi"]].map(([k,l])=>`<option value="${k}" ${PSTATE.s===k?"selected":""}>${l}</option>`).join("")}
  </select></div>
  <div id="plist">${buildPlayerList()}</div>`;
  $("scr-players").innerHTML=h;
}

/* ---------- OYUNCU DETAY (sheet) ---------- */
function pdTab(pid,tab){ PDTAB=tab; openPlayer(pid); }
function careerStage(p){
  if(p.age<=17) return "Akademi Adayı";
  if(p.age<=20) return "Genç Profesyonel";
  if(p.age<=23) return "Gelişim Oyuncusu";
  if(p.age<=29) return "Prime Dönem";
  if(p.age<=32) return "Tecrübeli Lider";
  return "Kariyer Sonu";
}
/* eski PDTAB değerlerinin son 6-sekme yapısına güvenli, idempotent göçü */
const PDTAB_MIGRATION={perf:"kariyer",pazar:"soz"};
function normalizePDTab(tab){ return PDTAB_MIGRATION[tab]||tab; }
function openPlayer(pid){
  const p=S.world.players[pid]; if(!p) return;
  if(typeof canViewPlayer==="function"&&!canViewPlayer(pid)){ showEntityPage("player",pid,lockedEntityPage("player",pid)); return; }
  if(typeof emitGameEvent==="function"&&!UI._suppressPush) emitGameEvent("PLAYER_PROFILE_OPENED",{pid});
  const club=S.world.clubs[p.clubId];
  const L=leagueOf(p,S.world);
  const isMine=p.agent==="you";
  const tabs=isMine?[["genel","Genel"],["kariyer","Kariyer"],["soz","Sözleşme"],["iliskiler","İlişkiler"],["gelisim","Gelişim"],["marka","Marka"]]
                   :[["genel","Genel"],["kariyer","Kariyer"]];
  PDTAB=normalizePDTab(PDTAB);
  if(!tabs.some(([id])=>id===PDTAB)) PDTAB="genel";
  let h=`<div class="grab"></div>
  <div class="row">${renderPlayerPortrait(p,58)}
  <div class="grow"><div class="b" style="font-size:18px;font-family:'Fraunces',serif">${p.natFlag} ${p.name}</div>
  <div class="muted">${p.age} yaş · ${POS_LABEL[p.pos]} · ${club?club.name:"Kulüpsüz"} ${L?"· "+L.flag:""}</div>
  <div>${starStr(p.ca)} <span class="tiny">${careerStage(p)}</span></div></div>
  <div style="text-align:right"><div class="tiny">DEĞER</div><div class="b" style="color:var(--success-ink);font-size:16px">${isMine?fmtM(p.value):fmtRange(p.value,(p.clubId?(S.world.clubs[p.clubId]||{}).countryId:(p.countryId||p.nat)),"playerKnowledge")}</div>
  ${isMine?`<div class="tiny">${p.squadRole||playerRole(p)}</div>`:""}</div></div>
  ${isMine?playerDualStatus(p):""}
  <div class="seg" style="margin-top:10px">${tabs.map(([id,l])=>`<button class="${PDTAB===id?'on':''}" onclick="pdTab('${p.id}','${id}')">${l}</button>`).join("")}</div>`;
  h+= PDTAB==="kariyer"? pdCareer(p): PDTAB==="soz"? pdContract(p): PDTAB==="iliskiler"? pdRelations(p): PDTAB==="gelisim"? pdDevelopment(p): PDTAB==="marka"? pdBrand(p): pdOverview(p);
  h+=playerStickyActions(p);
  showEntityPage("player",p.id,h,{section:PDTAB});
}
function pdOverview(p){
  const isMine=p.agent==="you";
  const st=p.seasonStats;
  let h="";
  if(st&&(st.apps||st.ratN)){
    const avgR=st.ratN?(st.ratSum/st.ratN).toFixed(2):"—";
    h+=renderMetricGrid([{label:"Maç",value:st.apps},{label:"Gol",value:st.goals},{label:"Asist",value:st.assists},{label:"Ort. Rating",value:avgR}]);
    if(p.lastMatch) h+=`<div class="tiny" style="margin:-4px 2px 8px">Son maç: rating <b>${p.lastMatch.r}</b> · ${p.lastMatch.mins} dk${p.lastMatch.goals?` · ${p.lastMatch.goals} gol ⚽`:""}</div>`;
  }
  h+=`<div class="sb"><div class="lbl"><span>Form</span><span>${Math.round(p.form)}</span></div><div class="track"><div class="fill ${p.form>65?'g':p.form<40?'r':''}" style="width:${p.form}%"></div></div></div>
  <div class="sb"><div class="lbl"><span>Moral ${moodEmoji(p.morale)}</span><span>${Math.round(p.morale)}</span></div><div class="track"><div class="fill ${p.morale>65?'g':p.morale<40?'r':''}" style="width:${p.morale}%"></div></div></div>`;
  if(p.clubId){
    const ct=p.coachTrust??50;
    h+=`<div class="sb"><div class="lbl"><span>Hoca Güveni</span><span>${Math.round(ct)}</span></div><div class="track"><div class="fill ${ct>60?'g':ct<38?'r':'au'}" style="width:${ct}%"></div></div></div>
    <div class="tiny" style="margin:2px 2px 8px">${roleHint(p)}</div>`;
  }
  if(p.injury) h+=`<div class="card urgent">🤕 ${p.injury.label} sakatlık — ${p.injury.weeks} hafta kaldı</div>`;
  if(p.suspension>0) h+=`<div class="card urgent">🟥 Cezalı — ${p.suspension} hafta</div>`;
  if(!isMine && p.discovered){
    if(p.agent){ h+=`<div class="card alt" style="text-align:center;margin-top:8px"><span class="badge sad">Başka bir menajerle çalışıyor</span></div>`; }
    else {
      const w=calculatePlayerWillingness(p); const cat=playerCategory(p);
      h+=`<div class="card alt" style="margin-top:8px">
      <div class="row" style="justify-content:space-between"><span class="muted">Kategori</span><span class="b">${cat.label}</span></div>
      <div class="sb"><div class="lbl"><span>Temsil Etme Şansı</span><span>%${w}</span></div><div class="track"><div class="fill ${w>=70?'g':w<35?'r':'au'}" style="width:${w}%"></div></div></div>
      ${w<50?`<div class="tiny" style="margin-top:2px">${getWillingnessReasons(p)[0]}</div>`:""}
      ${p.meetCooldown>0?`<div class="tiny" style="color:var(--danger-ink);margin-top:4px">Aile ${p.meetCooldown} hafta sonra görüşmeye açık.</div>`
        :`<button class="btn block primary" style="margin-top:8px" onclick="requestPlayerMeeting('${p.id}')">🤝 Görüşme Talep Et (${fmtM(meetCost(p))})</button>`}
      <button class="btn block ghost" style="margin-top:6px" onclick="toggleWatch('${p.id}')">${(S.watchlist||[]).includes(p.id)?"👁️ İzlemeden çıkar":"👁️ İzleme listesine ekle"}</button>
      </div>`;
    }
    return h;
  }
  if(isMine){
    h+=`<div class="sb"><div class="lbl"><span>Sana Sadakati</span><span>${Math.round(p.loyalty)}</span></div><div class="track"><div class="fill ${p.loyalty>60?'g':p.loyalty<45?'r':'au'}" style="width:${p.loyalty}%"></div></div></div>
    <div class="sb"><div class="lbl"><span>Aile Güveni</span><span>${Math.round(p.famTrust??40)}</span></div><div class="track"><div class="fill ${(p.famTrust??40)>60?'g':(p.famTrust??40)<38?'r':'au'}" style="width:${p.famTrust??40}%"></div></div></div>`;
    const risks=[], opps=[];
    if(p.rivalId){ const rv=RIVALS.find(x=>x.id===p.rivalId); risks.push(`Rakip menajer teması: ${rv?rv.name:"?"}`); }
    if(p.loyalty<45) risks.push("Sadakat düşük — kaybetme riski");
    if(p.morale<40) risks.push("Moral dipte");
    if(p.clubId&&contractWeeksLeft(p)<30) risks.push(`Kulüp sözleşmesi ${Math.max(0,contractWeeksLeft(p))} hafta sonra bitiyor`);
    if(p.agentWeeksLeft<15) risks.push("Menajerlik sözleşmesi bitmek üzere");
    if(p.injProne>60) risks.push("Sakatlık eğilimi yüksek");
    if(p.breakout) opps.push("Patlama dönemi — değer hızla artıyor");
    if(p.form>70) opps.push("Form zirvede — pazarlama için ideal hafta");
    if(Object.values(p.interest||{}).filter(v=>v>55).length>=2) opps.push("Birden fazla kulüp ilgili");
    if(p.age<=20&&(p.coachTrust??50)<45&&p.clubId) opps.push("Kiralık gelişim fırsatı");
    if(risks.length){ h+=`<div class="card urgent" style="margin-top:8px"><div class="tiny" style="color:var(--danger-ink);font-weight:800">RİSKLER</div>${risks.slice(0,3).map(r=>`<div class="sumline"><span>⚠️ ${r}</span></div>`).join("")}</div>`; }
    if(opps.length){ h+=`<div class="card alt"><div class="tiny" style="color:var(--success-ink);font-weight:800">FIRSATLAR</div>${opps.slice(0,3).map(o=>`<div class="sumline"><span>✨ ${o}</span></div>`).join("")}</div>`; }
    const next= p.rivalId||p.loyalty<45? "Sadakati güçlendir: söz ver veya sözleşmeyi yenile."
      : p.morale<40? "Moral düşük: kiralık veya kulüp değişikliği değerlendir."
      : (p.clubId&&contractWeeksLeft(p)<30)? "Kulüp sözleşmesini yenilet ya da transferi planla."
      : p.form>70&&inWindow(S.week)? "Form yüksek, pencere açık: kulüplere pazarla."
      : "Gelişim yolunda — haftalık takibe devam.";
    h+=`<div class="card gold"><span class="tiny" style="color:var(--premium-ink);font-weight:800">MENAJER ÖNERİSİ</span><div style="margin-top:3px">${next}</div></div>
    <button class="btn block primary" style="margin-top:4px" onclick="startPlayerMeeting('${p.id}')">🗣️ Özel Görüşme (dikkat 1)${p.meetCd>0?` · ${p.meetCd} hafta bekle`:""}</button>
    <div class="btnrow">
      <button class="btn blue" onclick="openMarketing('${p.id}')">📣 Pazarla</button>
      <button class="btn ghost" onclick="investPlayer('${p.id}')">💪 Yatırım (€8K)</button></div>`;
  }
  return h;
}

    ${p.clubId&&!p.loan?`<button class="btn ghost" onclick="startLoan('${p.id}')">🔁 Kiralık Ara</button>`:""}
  </div>

}

    h+=`<div class="sb"><div class="lbl"><span>Hoca Güveni</span><span>${Math.round(ct)}</span></div><div class="track"><div class="fill ${ct>60?'g':ct<38?'r':'au'}" style="width:${ct}%"></div></div></div>

function pdDevelopmentRecommendation(p){
  if(p.injury) return "Sakatlık geçirene kadar gelişim yükünü hafiflet.";
  if(p.age<=21&&(p.coachTrust??50)<45&&p.clubId&&!p.loan) return "Hoca güveni düşük — kiralık gelişim yolunu değerlendir.";
  if((p.devMod||1)<0.9) return "Gelişim yavaşladı — rol/kulüp uyumunu kontrol et.";
  if(p.age<=23&&(p.pa-p.ca)>8) return "Potansiyel açığı yüksek — düzenli süre gelişimi hızlandırır.";
  return "Gelişim istikrarlı — mevcut planı sürdür.";
}

  } else h+=`<div class="tiny" style="margin:2px 2px 8px">Akademi dışında — gelişimi hoca güveni, süre ve kariyer planına bağlı ilerliyor.</div>`;
  if(p.loan) h+=`<div class="card alt">🔁 Kiralık gelişim: ${S.world.clubs[p.loan.club]?.name||"?"} · ${p.loan.weeks} hafta kaldı</div>`;

  }
  if(p.minutesHistory&&p.minutesHistory.length>1){

function runCampaign(pid,type){
  if(typeof emitGameEvent==="function") emitGameEvent("PLAYER_MARKETED",{pid});
  const p=S.world.players[pid];
  const def=CAMPAIGNS.find(c=>c.id===type); if(!def) return;
  if(S.cash<def.cost){ toast("Yetersiz bakiye 💸"); return; }
  ledger(`Pazarlama (${def.label}) — ${p.name}`, -def.cost); taskDone("market");
  let boosted=0;
  for(const L of S.world.leagues){
    for(const cid of L.clubIds){
      if(cid===p.clubId) continue;
      const c=S.world.clubs[cid];
      let ch=0, amt=[0,0];
      if(type==="local"){ if(L.namePool!=="tr") continue; ch=0.4+c.relation/200; amt=[10,22]; }
      if(type==="europe"){ ch=0.3+c.relation/250; amt=[6,16]; }
      if(type==="vitrin"){ if(c.prestige<65) continue; ch=0.45; amt=[10,24]; }
      if(rnd()<ch && p.value<c.budget*1.6){ p.interest[cid]=clamp((p.interest[cid]||0)+ri(amt[0],amt[1]),0,100); boosted++; }
    }
  }
  if(type==="europe") p.mediaPop=clamp(p.mediaPop+3,1,99);
  if(type==="vitrin"){
    p.mediaPop=clamp(p.mediaPop+5,1,99);
    if(rnd()<0.35) addNews("",`Dedikodu: ${p.name} büyük transfere mi hazırlanıyor?`,`Menajerinin vitrin dosyası kulislerde dolaşıyor. Rakip menajerler de kokuyu aldı.`,"");
    if(rnd()<0.12*((typeof specLevel==="function"&&specLevel("crisis")>=1)?0.6:1)&&!p.rivalId) p.rivalId=pick(RIVALS).id;
  }
  toast(boosted?`${boosted} kulübün radarına girdin 📡`:"Bu tur ilgi zayıf kaldı 😕", boosted?"green":"");
  save(); closeSheet(); renderAll();
}
function compareOffers(pid){
  const p=S.world.players[pid];
  const offers=S.offers.filter(o=>o.pid===pid);
  if(offers.length<2){ toast("Karşılaştırılacak birden fazla teklif yok"); return; }
  const rows=offers.map(o=>{const c=S.world.clubs[o.cid]; const L=S.world.leagues.find(l=>l.id===c.leagueId);
    return {o,c,L,fit:calculateCareerFit(p,c)};});
  const bestFin=[...rows].sort((a,b)=>(b.o.comm+(b.o.signBonus||0)*0.1)-(a.o.comm+(a.o.signBonus||0)*0.1))[0];
  const bestCar=[...rows].sort((a,b)=>b.fit.score-a.fit.score)[0];
  const maxComm=Math.max(...rows.map(r=>r.o.comm));
  const bestBal=[...rows].sort((a,b)=>(b.o.comm/maxComm*50+b.fit.score/2)-(a.o.comm/maxComm*50+a.fit.score/2))[0];
  let h=`<div class="grab"></div><h2 class="sec">⚖️ ${p.name} — Teklif Karşılaştırma</h2>`;
  for(const r of rows){
    h+=`<div class="card ${r===bestBal?'gold':''}">
    <div class="row" style="justify-content:space-between"><span class="b">${r.L.flag} ${r.c.name}</span><span class="tiny">${r.c.profile||""}</span></div>
    <div class="nego-line"><span class="muted">Bonservis / Komisyon</span><span class="b">${fmtM(r.o.fee)} / <span style="color:var(--success-ink)">${fmtM(r.o.comm)}</span></span></div>
    <div class="nego-line"><span class="muted">Maaş</span><span class="b">${fmtM(r.o.wage)}/hf</span></div>
    <div class="nego-line"><span class="muted">Ekstralar</span><span class="b">${[r.o.signBonus?`imza ${fmtM(r.o.signBonus)}`:"",r.o.sellOn?`sell-on %${r.o.sellOn}`:"",r.o.playGuar?"oynama garantisi":""].filter(Boolean).join(" · ")||"—"}</span></div>
    <div class="nego-line"><span class="muted">Kariyer uyumu / Oynama</span><span class="b" style="color:${r.fit.score>=65?'#3E8E63':r.fit.score<38?'#C96A6A':'#B08A2E'}">${r.fit.score}/100 · %${r.fit.play}</span></div>
    <button class="btn sm ghost" style="margin-top:6px" onclick="openOffer('${r.o.id}')">Masaya otur →</button></div>`;
  }
  h+=`<div class="card alt">
  <div class="sumline"><span class="muted">💰 En iyi finansal</span><span class="b">${bestFin.c.name}</span></div>
  <div class="sumline"><span class="muted">🚀 En iyi kariyer</span><span class="b">${bestCar.c.name}</span></div>
  <div class="sumline"><span class="muted">⚖️ En dengeli</span><span class="b">${bestBal.c.name}</span></div>
  <div class="tiny" style="margin-top:4px">Son karar senin patron — en yüksek para her zaman en iyi kariyer değildir.</div></div>`;
  openSheet(h);
}
/* ---------- ÇOK KALEMLİ PAZARLIK MASASI ---------- */
const PROFILE_W={
 "Genç geliştirici":{fee:1.1,wage:0.9,sellOn:0.7,signBonus:1.2,playGuar:0.6},
 "Yıldız alıcı":{fee:0.7,wage:0.8,sellOn:1.3,signBonus:0.9,playGuar:1.1},
 "Satıcı kulüp":{fee:1.3,wage:1.0,sellOn:0.6,signBonus:1.0,playGuar:1.0},
 "Kiralık sever":{fee:1.0,wage:1.2,sellOn:0.9,signBonus:1.1,playGuar:0.7},
 "Maaş cömerti":{fee:1.1,wage:0.5,sellOn:1.0,signBonus:0.8,playGuar:1.0},
 "Yerli odaklı":{fee:1.0,wage:1.0,sellOn:1.0,signBonus:1.0,playGuar:0.9},
};
const PROFILE_HINT={
 "Genç geliştirici":"gençlere oynama garantisini kolay verir, bonservise direnir",
 "Yıldız alıcı":"bonservis öder ama sell-on sevmez",
 "Satıcı kulüp":"bonservisi yüksek tutmak ister",
 "Kiralık sever":"maaş yükünde katıdır",
 "Maaş cömerti":"maaşta esner, bonserviste pazarlıkçıdır",
 "Yerli odaklı":"dengeli ama temkinli pazarlık yapar",
};
const SELLON_STEPS=[0,10,15], SB_STEPS=[0,0.03,0.05];
function negoRow(label,val,dn,up){
  return `<div class="nego-line"><span class="muted">${label}</span><span class="row" style="gap:8px">
  <button class="btn sm ghost" style="min-height:32px;padding:4px 11px" aria-label="azalt" onclick="${dn}">−</button>
  <span class="b" style="min-width:78px;text-align:center">${val}</span>
  <button class="btn sm ghost" style="min-height:32px;padding:4px 11px" aria-label="artır" onclick="${up}">+</button></span></div>`;
}
function negoValues(o){
  const fee=Math.round(o.fee*(1+o.ask.fee*0.1)/1000)*1000;
  return {
    fee,
    wage:Math.round(o.wage*(1+o.ask.wage*0.1)/100)*100,
    sellOn:SELLON_STEPS[o.ask.sellOn],
    signBonus:Math.round(fee*SB_STEPS[o.ask.signBonus]/1000)*1000,
    playGuar:!!o.ask.playGuar,
  };
}
function negoLoad(o){
  const c=S.world.clubs[o.cid]; const w=PROFILE_W[c.profile]||{};
  return o.ask.fee*(w.fee??1)
   + o.ask.wage*(w.wage??1)*0.8
   + Math.max(0,o.ask.sellOn-(o.sellOn?SELLON_STEPS.indexOf(o.sellOn):0))*(w.sellOn??1)*0.7*((typeof specLevel==="function"&&specLevel("bigdeal")>=2)?0.8:1)
   + Math.max(0,o.ask.signBonus-(o.signBonus?1:0))*(w.signBonus??1)*0.6
   + (o.ask.playGuar&&!o.playGuar?(w.playGuar??1)*0.8:0);
}
function openNegoTable(oid,msg){
  const o=S.offers.find(x=>x.id===oid); if(!o){ closeSheet(); renderAll(); return; }
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  if(!o.ask) o.ask={fee:0,wage:0,sellOn:Math.max(0,SELLON_STEPS.indexOf(o.sellOn||0)),signBonus:o.signBonus?1:0,playGuar:!!o.playGuar};
  const v=negoValues(o);
  const pat=o.patience??3;
  const load=negoLoad(o);
  const heat=load<1?"Rahat 🟢":load<2.2?"Gergin 🟡":"Riskli 🔴";
  let h=`<div class="grab"></div>
  <div style="text-align:center"><div class="tiny">PAZARLIK MASASI · TUR BAZLI</div>
  <div class="b" style="font-family:'Fraunces',serif;font-size:19px">${c.name} × ${p.name}</div>
  <div class="tiny">${c.profile||""} — ${PROFILE_HINT[c.profile]||""}</div></div>
  <div class="card alt" style="margin-top:8px">🗣️ ${msg||`"Masaya hoş geldin. Taleplerini duyalım."`}</div>
  ${(typeof negoQuickBar==="function")?negoQuickBar(oid):""}
  <div class="card">
    ${negoRow("Bonservis",fmtM(v.fee),`negoAdj('${oid}','fee',-1)`,`negoAdj('${oid}','fee',1)`)}
    ${negoRow("Oyuncu maaşı",fmtM(v.wage)+"/hf",`negoAdj('${oid}','wage',-1)`,`negoAdj('${oid}','wage',1)`)}
    ${negoRow("Sell-on payı","%"+v.sellOn,`negoAdj('${oid}','sellOn',-1)`,`negoAdj('${oid}','sellOn',1)`)}
    ${negoRow("İmza parası",v.signBonus?fmtM(v.signBonus):"Yok",`negoAdj('${oid}','signBonus',-1)`,`negoAdj('${oid}','signBonus',1)`)}
    <div class="nego-line"><span class="muted">Oynama garantisi</span>
      <button class="btn sm ${o.ask.playGuar?'primary':'ghost'}" onclick="negoAdj('${oid}','playGuar',0)">${o.ask.playGuar?"İsteniyor ✅":"İstenmiyor"}</button></div>
    <div class="nego-line"><span class="muted">Ajans komisyonu (%${Math.round(p.agentCommission*100)})</span>
      <span class="b" style="color:var(--success-ink)">${fmtM(Math.round(v.fee*p.agentCommission))}</span></div>
    <div class="tiny" style="margin-top:6px">Talep yükü: <b>${heat}</b> · Kulüp sabrı: ${pat} tur</div>
    <div class="patience"><div class="pf" style="width:${clamp(pat/3*100,5,100)}%"></div></div>
  </div>
  <button class="btn block primary" ${pat<=0?"disabled":""} onclick="sendNegoOffer('${oid}')">📨 Teklifi Gönder (1 tur)</button>
  <div class="btnrow">
    <button class="btn gold" onclick="doAccept('${oid}')">✍️ Mevcut Şartlarla İmzala</button>
    <button class="btn ghost" onclick="openOffer('${oid}')">← Teklife Dön</button>
  </div>`;
  { const _u=negoSessionUI(oid); if(_u)_u.activeStep="package"; showEntityPage("negotiation",oid, negoStepperHeader(oid,"package")+h, {section:"package"}); return; }
}
function negoAdj(oid,k,d){
  const o=S.offers.find(x=>x.id===oid); if(!o||!o.ask) return;
  if(k==="playGuar"){ o.ask.playGuar=!o.ask.playGuar; }
  else { const max={fee:3,wage:2,sellOn:2,signBonus:2}[k]; o.ask[k]=clamp(o.ask[k]+d,0,max); }
  openNegoTable(oid);
}
function sendNegoOffer(oid){
  const o=S.offers.find(x=>x.id===oid); if(!o) return;
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  if((o.patience??3)<=0) return;
  o.patience=(o.patience??3)-1;
  if(o.budget==null) o.budget=2.2+rnd()*1.4;
  const load=negoLoad(o);
  if(rnd()<0.12){ addNews("",`Sızıntı: ${p.name} pazarlığı basında`,`${c.name} ile görüşmeler medyaya sızdı. Baskı ve değer arttı.`,"");
    p.mediaPop=clamp(p.mediaPop+2,1,99);
    if(rnd()<0.3&&!p.rivalId){ p.rivalId=pick(RIVALS).id; rlog(p.rivalId,`${p.name} pazarlığına burnunu soktu`); } }
  const succ=clamp((0.75-load*0.13+S.rep/300+(S.staff.lawyer?0.06:0)+(S.approach==="pazarlik"?0.06:0)+(focusOn("pazarlik")?0.06:0)+(repProfile().negotiation-50)/250)*(load>o.budget?0.5:1),0.05,0.95);
  const roll=rnd();
  if(roll<succ){
    const v=negoValues(o);
    o.fee=v.fee; o.wage=v.wage; o.sellOn=v.sellOn; o.signBonus=v.signBonus; o.playGuar=v.playGuar;
    o.comm=Math.round(o.fee*p.agentCommission);
    o.ask={fee:0,wage:0,sellOn:SELLON_STEPS.indexOf(o.sellOn),signBonus:o.signBonus?1:0,playGuar:o.playGuar};
    o.budget=Math.max(0,o.budget-load*0.85);
    bumpRep("negotiation",1);
    toast("Kulüp şartları kabul etti 🤝","green");
    save(); openNegoTable(oid,`"Zor pazarlıkçısın... Kabul. Kalemler güncellendi." 🤝`);
  } else if(roll<succ+0.3 && o.patience>0){
    o.ask.fee=Math.ceil(o.ask.fee/2); o.ask.wage=Math.ceil(o.ask.wage/2);
    const v=negoValues(o);
    o.fee=v.fee; o.wage=v.wage; o.comm=Math.round(o.fee*p.agentCommission);
    o.ask.fee=0; o.ask.wage=0;
    toast("Kulüp ortada buluştu","gold");
    save(); openNegoTable(oid,`"Ortada buluşalım — bonservis ve maaşta biraz esnedik, gerisi zor."`);
  } else if(o.patience<=0){
    S.offers=S.offers.filter(x=>x.id!==o.id);
    c.relation=clamp(c.relation-6,0,100); try{ directorMemory(c.id,"masa dağıldı",-5); }catch(e){}
    addNews("me","Masa dağıldı",`${c.name} pazarlıktan çekildi. Belki gelecek pencere...`,"bad");
    toast("Kulüp masadan kalktı 😬");
    save(); closeSheet(); renderAll();
  } else {
    save(); openNegoTable(oid,`"Bu şartlar bizim için ağır. Taleplerini düşür ya da vazgeç." 😤`);
  }
  renderChrome();

/* ---------- SPONSOR PAZARLIĞI ---------- */
const SP_DUR=[24,40,56], SP_SHARE=[20,25,30];
function openSponsorNego(spid,msg){
  const sp=(S.sponsorPipeline||[]).find(x=>x.id===spid); if(!sp) return;
  const p=S.world.players[sp.pid]; if(!p) return;
  if(!sp.ask) sp.ask={pay:0,dur:1,share:1};
  const pay=Math.round(sp.val*(1+sp.ask.pay*0.15)/10)*10;
  const cut=Math.round(pay*SP_SHARE[sp.ask.share]/100);
  let h=`<div class="grab"></div>
  <div style="text-align:center"><div class="tiny">SPONSOR PAZARLIĞI</div>
  <div class="b" style="font-family:'Fraunces',serif;font-size:19px">${sp.brand} × ${p.name}</div></div>
  <div class="card alt" style="margin-top:8px">🗣️ ${msg||`"${p.name} markamıza çok uyuyor. Şartları konuşalım."`}</div>
  <div class="card">
    ${negoRow("Aylık ödeme",fmtM(pay),`spAdj('${spid}','pay',-1)`,`spAdj('${spid}','pay',1)`)}
    ${negoRow("Süre",SP_DUR[sp.ask.dur]+" hf",`spAdj('${spid}','dur',-1)`,`spAdj('${spid}','dur',1)`)}
    ${negoRow("Ajans payı","%"+SP_SHARE[sp.ask.share],`spAdj('${spid}','share',-1)`,`spAdj('${spid}','share',1)`)}
    <div class="nego-line"><span class="muted">Ajansa aylık</span><span class="b" style="color:var(--success-ink)">${fmtM(cut)}</span></div>
    <div class="tiny" style="margin-top:4px">Kalan deneme hakkı: ${2-(sp.tries||0)} · Skandal maddesi: var</div>
  </div>
  <button class="btn block primary" onclick="sendSponsorOffer('${spid}')">📨 Şartları Gönder</button>
  <button class="btn block ghost" style="margin-top:8px" onclick="closeSheet()">Sonra Dönerim</button>`;
  openSheet(h);
}
function spAdj(spid,k,d){
  const sp=(S.sponsorPipeline||[]).find(x=>x.id===spid); if(!sp||!sp.ask) return;
  sp.ask[k]=clamp(sp.ask[k]+d,0,2);
  openSponsorNego(spid);
}
function sendSponsorOffer(spid){
  const sp=(S.sponsorPipeline||[]).find(x=>x.id===spid); if(!sp) return;
  const p=S.world.players[sp.pid];
  sp.tries=(sp.tries||0)+1;
  const load=sp.ask.pay*1+sp.ask.share*0.9+(2-sp.ask.dur)*0.2;
  const succ=clamp(0.8-load*0.16+(S.staff.marketer?0.08:0)+(S.mediaPower||0)/400+(repProfile().media-50)/300,0.1,0.95);
  if(rnd()<succ){
    const pay=Math.round(sp.val*(1+sp.ask.pay*0.15)/10)*10;
    const cut=Math.round(pay*SP_SHARE[sp.ask.share]/100);
    S.sponsorDeals.push({brand:sp.brand,pid:sp.pid,cut,weeksLeft:SP_DUR[sp.ask.dur]});
    S.sponsorPipeline=S.sponsorPipeline.filter(x=>x.id!==spid);
    p.mediaPop=clamp(p.mediaPop+5,1,99);
    bumpRep("media",3);
    addNews("me",`${p.name}, ${sp.brand}'ın yüzü oldu 👟`,`${SP_DUR[sp.ask.dur]} haftalık anlaşma. Ajans payı aylık ${fmtM(cut)}.`,"good");
    toast("Sponsor anlaşması imzalandı 🤝","gold");
    save(); closeSheet(); renderAll();
  } else if(sp.tries>=2){
    S.sponsorPipeline=S.sponsorPipeline.filter(x=>x.id!==spid);
    addNews("me",`${sp.brand} masadan kalktı`,`Şartlar markaya ağır geldi. Belki daha popüler bir dönemde...`,"bad");
    toast("Sponsor vazgeçti 😬"); save(); closeSheet(); renderAll();
  } else {
    save(); openSponsorNego(spid,`"Bu şartlar bütçemizi aşıyor. Biraz esneyin — bu son denememiz."`);
  }
}

function requestPlayerMeeting(pid){
  const p=S.world.players[pid]; if(!p||p.agent) return;
  if(p.retired){ toast("Bu oyuncu emekli oldu 👞"); return; }
  if(p.meetCooldown>0){ toast(`Aile ${p.meetCooldown} hafta sonra görüşür ⏳`); return; }
  if(myPlayers().length>=BAL.officeLevels[S.officeLevel].cap){ toast("Müşteri kapasiten dolu — ofisi büyüt 🏢"); return; }
  const cost=meetCost(p);
  if(S.cash<cost){ toast("Yetersiz bakiye 💸"); return; }
  ledger("Görüşme masrafı — "+p.name, -cost); taskDone("meet");
  const w=calculatePlayerWillingness(p);
  const cat=playerCategory(p);
  if(w < Math.max(Math.round(cat.minW*0.85), 27)){
    p.meetCooldown=ri(5,9);
    const why=getWillingnessReasons(p)[0];
    addNews("me",`${p.name} görüşme talebini reddetti`,why,"bad");
    toast("Görüşme reddedildi 😞");
    if(p.rivalId&&rnd()<0.25){ p.agent="rival"; S.trackRecord.lostPlayers++;
      const rv=RIVALS.find(x=>x.id===p.rivalId);
      if(rv) addNews("me",`${p.name}, ${rv.name} ile anlaştı 💔`,"Sen kapıdan dönerken rakip içeri girdi.","bad"); }
    save(); closeSheet(); renderAll(); return;
  }
  openNegotiation(pid,w);
}
function buildNegotiationOptions(p,w){
  const fam=p.family; const opts=[];
  const bonus=Math.round((p.value*0.03+4000)/500)*500;
  opts.push({t:"Standart teklif — %8 komisyon",h:"Düz, dürüst anlaşma.",risk:"mid",
    chance:clamp(w+4,5,95),comm:0.08,cost:0,loyB:0});
  opts.push({t:"Düşük komisyon — %5",h:"Güven kazan, gelirden feda et. Gençlerde etkili.",risk:"low",
    chance:clamp(w+16+(p.age<=19?6:0),5,97),comm:0.05,cost:0,loyB:6});
  opts.push({t:"Kariyer planı sun",h:"Kulüp / lig / süre yol haritası çiz.",risk:"low",
    chance:clamp(w+11+(S.scouts.length>=2?6:0)+(fam==="egitim"?9:0),5,96),comm:0.08,cost:0,loyB:8});
  if(p.age<=20) opts.push({t:"Aileye güvence paketi",h:"Eğitim + düzenli rapor + şehir planı.",risk:"low",
    chance:clamp(w+14+(fam==="koruyucu"||fam==="egitim"?10:0),5,97),comm:0.08,cost:5000,loyB:5,famB:12,led:"Aile güvence paketi — "+p.name});
  opts.push({t:`İmza bonusu ver (${fmtM(bonus)})`,h:"Para odaklılarda çok etkili.",risk:"mid",
    chance:clamp(w+10+(fam==="para"||p.char==="ego"?14:0),5,96),comm:0.08,cost:bonus,loyB:2,led:"İmza bonusu — "+p.name});
  if((S.trackRecord||{}).transfers>0) opts.push({t:"Başarı hikâyeni anlat",h:`${S.trackRecord.transfers} transferlik geçmişini göster.`,risk:"low",
    chance:clamp(w+8+Math.min(14,S.trackRecord.transfers*4)+(fam==="guvensiz"?8:0),5,96),comm:0.08,cost:0,loyB:4});
  opts.push({t:"Agresif pazarlık — %12 komisyon",h:"Yüksek getiri ama oyuncuyu tamamen kaçırabilirsin.",risk:"high",
    chance:clamp(w-14,3,85),comm:0.12,cost:0,loyB:-4});
  return opts;
}
function openNegotiation(pid,w){
  const p=S.world.players[pid];
  const opts=buildNegotiationOptions(p,w);
  window._nego={pid,opts};
  const fam=p.family?FAM_TYPES.find(f=>f.id===p.family):null;
  const ch=CHAR_TYPES.find(c=>c.id===p.char);
  let h=`<div class="grab"></div>
  <div style="text-align:center"><div class="tiny">TEMSİL GÖRÜŞMESİ</div>
  <div class="b" style="font-family:'Fraunces',serif;font-size:19px">${p.name} masada 🤝</div>
  <div class="muted">${ch.icon} ${ch.label}${fam?` · ${fam.icon} ${fam.label}`:""}</div></div>
  <div class="card alt" style="margin-top:8px"><span class="muted">${fam?fam.hint:"Kararı teklifin şekli belirleyecek."} Görüşme ilgisi: <b>%${w}</b></span></div>`;
  opts.forEach((o,i)=>{ h+=`<button class="opt" onclick="resolveNegotiation(${i})">
    <span class="risk ${o.risk}">${o.chance>=75?"GÜÇLÜ":o.chance>=50?"MAKUL":"ZAYIF"} %${o.chance}</span>
    <div class="ot">${o.t}</div><div class="oh">${o.h}${o.cost?` · Maliyet ${fmtM(o.cost)}`:""}</div></button>`;});
  h+=`<button class="btn block ghost" style="margin-top:10px" onclick="closeSheet()">Masadan kalk</button>`;
  openSheet(h);
}
function resolveNegotiation(i){
  const n=window._nego; if(!n) return;
  const p=S.world.players[n.pid]; const o=n.opts[i]; if(!p||!o) return;
  if(o.cost&&S.cash<o.cost){ toast("Yetersiz bakiye 💸"); return; }
  if(o.cost) ledger(o.led||("İkna masrafı — "+p.name), -o.cost);
  window._nego=null;
  if(rnd()*100 < o.chance){
    p.agent="you"; p.agentCommission=o.comm;
    p.loyalty=clamp(ri(58,72)+(o.loyB||0),5,99);
    p.agentWeeksLeft=ri(110,170); p.rivalId=null;
    try{ if(!S.representationAgreements[p.id]) S.representationAgreements[p.id]=defaultRepAgreement(p); invalidatePortfolioIndexes("sign"); }catch(e){}
    p.famTrust=clamp((p.famTrust??40)+(o.famB||0)+10,0,99);
    (p.careerEvents=p.careerEvents||[]).push({s:S.season,w:S.week,t:"İmza",d:`${S.agencyName} ile menajerlik anlaşması`});
    bumpRep("playerTrust",2);
    addNews("me",`İMZA: ${p.name} → ${S.agencyName} ✍️`,`Görüşme masasından el sıkışarak kalktılar. Komisyon: %${Math.round(o.comm*100)}.`,"good");
    toast(`${p.name} portföyde! 🎉`,"gold");
    milestone("firstSign","İlk oyuncunu ikna ettin! 🔭");
    if(p.gem) milestone("gem","Bir gizli cevher yakaladın... henüz bilmiyorsun 💎");
  } else {
    p.meetCooldown=ri(4,8);
    p.famTrust=clamp((p.famTrust??40)-4,0,99);
    if(o.risk==="high"&&rnd()<0.4){
      p.agent="rival"; p.rivalId=p.rivalId||pick(RIVALS).id; S.trackRecord.lostPlayers++;
      const rv=RIVALS.find(x=>x.id===p.rivalId);
      addNews("me",`${p.name} ipleri kopardı 💔`,`Agresif pazarlık geri tepti — ${rv?rv.name:"bir rakip"} devreye girip imzayı aldı.`,"bad");
      toast("Oyuncuyu kaybettin 💔");
    } else {
      addNews("me",`${p.name} ikna olmadı`,`"Biraz daha düşünelim" dediler. ${p.meetCooldown} hafta sonra tekrar dene.`,"bad");
      toast("İkna edemedin 😞");
    }
  }
  save(); closeSheet(); renderAll();
}

function givePromiseSilent(p,type){
  const def=PROMISE_TYPES.find(x=>x.id===type); if(!def) return;
  if((p.promises||[]).some(x=>x.status==="open"&&x.type===type)) return;
  let dw=S.week+def.weeks, ds=S.season;
  while(dw>BAL.weeksPerSeason){ dw-=BAL.weeksPerSeason; ds++; }
  (p.promises=p.promises||[]).push({id:"pr"+ri(1e4,9e4),type,createdSeason:S.season,createdWeek:S.week,deadlineSeason:ds,deadlineWeek:dw,status:"open",baseClub:p.clubId,basePrestige:S.world.clubs[p.clubId]?.prestige||0});
  p.loyalty=clamp(p.loyalty+6,5,99);
}
function resolveMeeting(pid,topic,app){
  if(typeof emitGameEvent==="function") emitGameEvent("PLAYER_MEETING_COMPLETED",{pid});
  try{ if(typeof specLevel==="function"&&specLevel("wonderkid")>=2){ const _pw=S.world.players[pid]; if(_pw&&_pw.age<=20){ _pw.famTrust=clamp((_pw.famTrust||50)+2,0,100); specTick("wonderkid"); } } }catch(e){}
  const p=S.world.players[pid]; if(!p) return;
  let base=clamp(45+p.loyalty*0.3+((p.famTrust??40)-40)*0.2,10,90);
  if(p.char==="ego"&&(app==="durust"||app==="hedef")) base-=15;
  if(p.char==="kirilgan"&&app==="durust") base-=18;
  if(p.char==="prof") base+=8;
  if(focusOn("iliski")) base+=6;
  const ok=rnd()*100<base;
  let msg="";
  if(topic==="moral"){ if(ok){p.morale=clamp(p.morale+(app==="durust"?14:9),5,99); p.loyalty=clamp(p.loyalty+4,5,99); msg="Moral toparlandı 💪";}
    else {p.morale=clamp(p.morale-(app==="durust"?6:2),5,99); msg="Görüşme soğuk geçti 😕";} }
  else if(topic==="sure"){ if(app==="soz"){ givePromiseSilent(p,"minutes"); msg="Süre sözü verildi — takibe girdi 🤙"; }
    else if(ok){p.morale=clamp(p.morale+7,5,99); msg="Sabır telkini işe yaradı";} else msg="İkna olmadı — süre istiyor"; }
  else if(topic==="rakip"){ if(app==="yenile"){ if(ok){p.agentWeeksLeft=ri(120,170); p.rivalId=null; p.loyalty=clamp(p.loyalty+12,5,99); msg="Sözleşme yenilendi, rakip devre dışı 🤝";} else {p.loyalty=clamp(p.loyalty-4,5,99); msg="Yenilemeye yanaşmadı ⚠️";} }
    else { if(ok){p.loyalty=clamp(p.loyalty+8,5,99); if(rnd()<0.5)p.rivalId=null; msg="Güven tazelendi ✊";} else msg="Kafası hâlâ karışık";} }
  else if(topic==="aile"){ const cost=app==="plan"?3000:0;
    if(cost&&S.cash<cost){toast("Yetersiz bakiye 💸");return;}
    if(cost) ledger("Aile eğitim planı — "+p.name,-cost);
    if(ok){p.famTrust=clamp((p.famTrust??40)+(app==="plan"?14:8),0,99); p.loyalty=clamp(p.loyalty+5,5,99); msg="Aile memnun 🏡";}
    else {p.famTrust=clamp((p.famTrust??40)+2,0,99); msg="Aile temkinli yaklaştı";} }
  else if(topic==="transfer"){ if(app==="soz"){ givePromiseSilent(p,"transfer_up"); msg="Transfer sözü verildi — büyük söz 🤙"; }
    else if(ok){p.morale=clamp(p.morale+6,5,99); msg="Beklenti yönetildi";} else {p.morale=clamp(p.morale-3,5,99); msg="Transfer istiyor, sabrı azalıyor";} }
  else { if(ok){p.morale=clamp(p.morale+6,5,99); p.form=clamp(p.form+2,5,99); msg="Motivasyon tavan 🚀";} else msg="Sözlerin havada kaldı"; }
  (p.careerEvents=p.careerEvents||[]).push({s:S.season,w:S.week,t:"Görüşme",d:msg});
  if(p.careerEvents.length>20)p.careerEvents.shift();
  toast(msg, ok?"green":"");
  save(); closeSheet(); openPlayer(pid);
}

function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
const nowTick=()=> (S? (S.season-1)*BAL.weeksPerSeason + S.week : 0);

let _ichartSeq=0; const _ichartReg=new Map();
/* series: [{label,color,points:[{y,ev?}]}, ...] veya sayı dizisi; options:{label,fmt,h,w,fmt2,xfmt} */
function interactiveChart(series, options){
  options=options||{};
  const key="ic"+(_ichartSeq++);
  _ichartReg.set(key,{series,options});
  const h=options.h||124;
  return `<div class="ichart" data-ic="${key}" style="height:${h}px" tabindex="0" role="img" aria-label="${escapeHtml(options.label||'grafik')}"><div class="ic-live" aria-live="polite"></div></div>`;
}
function _chartTipEl(){
  let t=document.getElementById("chartTip");
  if(!t){ t=document.createElement("div"); t.id="chartTip"; t.className="chart-tip"; t.style.display="none"; document.body.appendChild(t); }
  return t;
}
function mountCharts(){
  const els=document.querySelectorAll('.ichart[data-ic]');
  els.forEach(el=>{
    const key=el.getAttribute('data-ic'); if(!key) return;
    const cfg=_ichartReg.get(key); _ichartReg.delete(key); el.removeAttribute('data-ic');
    try{ buildInteractiveChart(el, cfg?cfg.series:[], cfg?cfg.options:{}); }catch(e){ el.innerHTML='<div class="empty">grafik yüklenemedi</div>'; }
  });
  if(_ichartReg.size>200) _ichartReg.clear();
}
function _normSeries(series){
  // sayı dizisini seriye çevir
  if(Array.isArray(series)&&series.length&&typeof series[0]==="number")
    series=[{label:"",color:"#4A7FB5",points:series.map(y=>({y}))}];
  return (series||[]).map(s=>({label:s.label||"",color:s.color||"#4A7FB5",points:(s.points||[]).map(p=>typeof p==="number"?{y:p}:p)}));
}
function buildInteractiveChart(el, series, options){
  options=options||{}; series=_normSeries(series);
  const prim=series[0]; const pts=prim?prim.points:[];
  const valid=pts.filter(p=>p&&p.y!=null&&isFinite(p.y));
  if(valid.length<2){ el.innerHTML='<div class="empty">Henüz yeterli veri yok — haftalar ilerledikçe grafik oluşur.</div>'; return; }
  const dual=!!options.dualAxis && series.length>=2;
  const W=options.w||320, H=options.h||124, PL=26, PR=dual?26:8, PT=10, PB=16;
  const fmt=options.fmt||(v=>Math.round(v));
  const fmt2=options.fmt2||fmt;
  const axisOf=(s,si)=> (dual && (s.axis==="right" || (si===1 && !s.axis))) ? "right":"left";
  function scaleFor(axis){ const ys=[]; series.forEach((s,si)=>{ if(axisOf(s,si)===axis) s.points.forEach(p=>{ if(p&&p.y!=null&&isFinite(p.y))ys.push(p.y); }); });
    if(!ys.length) return {min:0,max:1}; let mn=Math.min(...ys),mx=Math.max(...ys); if(mn===mx){mn-=1;mx+=1;} return {min:mn,max:mx}; }
  const scL=(options.min!=null||options.max!=null)?{min:options.min??Math.min(...series[0].points.filter(p=>p&&p.y!=null).map(p=>p.y)),max:options.max??Math.max(...series[0].points.filter(p=>p&&p.y!=null).map(p=>p.y))}:scaleFor("left");
  const scR=dual?scaleFor("right"):scL;
  let min=scL.min, max=scL.max;
  const n=pts.length;
  const X=i=> PL + (i*(W-PL-PR)/Math.max(1,n-1));
  const Y=(v,axis)=>{ const sc=(axis==="right")?scR:scL; return H-PB - ((v-sc.min)/(sc.max-sc.min))*(H-PT-PB); };
  const uid="g"+Math.random().toString(36).slice(2,8);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none" style="display:block;overflow:visible">`;
  // grid + sol y ekseni etiketleri (+ dual ise sağ eksen)
  const rcol=dual?(series.find((s,si)=>axisOf(s,si)==="right")||{}).color||"#B08A2E":null;
  [0,0.5,1].forEach(g=>{ const yy=PT+(H-PT-PB)*g; const valL=scL.max-(scL.max-scL.min)*g;
    svg+=`<line x1="${PL}" x2="${W-PR}" y1="${yy.toFixed(1)}" y2="${yy.toFixed(1)}" stroke="#E8E5DE" stroke-width="0.8" stroke-dasharray="3 4"/>`;
    svg+=`<text x="2" y="${(yy+3).toFixed(1)}" font-size="8" fill="#93A0B8" font-family="Manrope,system-ui">${escapeHtml(fmt(valL))}</text>`;
    if(dual){ const valR=scR.max-(scR.max-scR.min)*g; svg+=`<text x="${W-PR+2}" y="${(yy+3).toFixed(1)}" font-size="8" fill="${rcol}" font-family="Manrope,system-ui">${escapeHtml(fmt2(valR))}</text>`; } });
  // seriler
  series.forEach((s,si)=>{ const ax=axisOf(s,si);
    const sp=s.points; let d=""; let started=false;
    for(let i=0;i<sp.length;i++){ const p=sp[i]; if(!p||p.y==null||!isFinite(p.y)) continue;
      d+=(started?"L":"M")+X(i).toFixed(1)+" "+Y(p.y,ax).toFixed(1)+" "; started=true; }
    if(si===0){ const area=d+`L${X(n-1).toFixed(1)} ${(H-PB).toFixed(1)} L${X(0).toFixed(1)} ${(H-PB).toFixed(1)} Z`;
      svg+=`<path d="${area}" fill="${s.color}" opacity="0.10"/>`; }
    svg+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${si===0?2.2:1.6}" stroke-linecap="round" stroke-linejoin="round" ${ax==="right"?'stroke-dasharray="4 3"':''}/>`;
  });
  // crosshair + focus dots
  svg+=`<line class="ic-cross" x1="0" x2="0" y1="${PT}" y2="${H-PB}" stroke="#1B2A4A" stroke-width="1" stroke-dasharray="2 3" opacity="0"/>`;
  series.forEach((s,si)=> svg+=`<circle class="ic-dot ic-dot-${si}" r="3.6" fill="${s.color}" stroke="#fff" stroke-width="1.5" opacity="0"/>`);
  svg+=`</svg>`;
  el.innerHTML=svg+(el.querySelector('.ic-live')?'':'<div class="ic-live" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"></div>');
  const live=el.querySelector('.ic-live')||(()=>{ const d=document.createElement('div'); d.className='ic-live'; el.appendChild(d); return d; })();
  const svgEl=el.querySelector('svg');
  const cross=el.querySelector('.ic-cross');
  const dots=[...el.querySelectorAll('.ic-dot')];
  let active=-1, pinned=false;
  function rectRatio(){ const r=el.getBoundingClientRect(); return {r, sx:r.width/W, sy:r.height/H}; }
  function idxFromClientX(cx){ const {r}=rectRatio(); const rel=(cx-r.left)/r.width*W; let best=0,bd=1e9;
    for(let i=0;i<n;i++){ const dx=Math.abs(X(i)-rel); if(dx<bd){bd=dx;best=i;} } return best; }
  function show(i){
    if(i<0||i>=n){ hide(); return; }
    active=i;
    const {r,sx,sy}=rectRatio();
    const cx=X(i)*sx, defaultY=(prim.points[i]&&prim.points[i].y!=null)?Y(prim.points[i].y,"left"):PT;
    cross.setAttribute("x1",X(i)); cross.setAttribute("x2",X(i)); cross.setAttribute("opacity","1");
    series.forEach((s,si)=>{ const p=s.points[i]; const dot=dots[si]; if(!dot) return;
      if(p&&p.y!=null&&isFinite(p.y)){ dot.setAttribute("cx",X(i)); dot.setAttribute("cy",Y(p.y,axisOf(s,si))); dot.setAttribute("opacity","1"); }
      else dot.setAttribute("opacity","0"); });
    // tooltip
    const tip=_chartTipEl();
    const p0=prim.points[i]; const prev=i>0?prim.points[i-1]:null;
    let head="";
    if(p0&&p0.s!=null&&p0.w!=null) head=`Sezon ${p0.s} · Hafta ${p0.w}`;
    else if(options.xlabels&&options.xlabels[i]!=null) head=escapeHtml(options.xlabels[i]);
    else head=`Nokta ${i+1}`;
    let body=`<div class="ct-h">${head}</div>`;
    series.forEach(s=>{ const p=s.points[i]; if(!p||p.y==null||!isFinite(p.y)) return;
      const f=s===prim?fmt:(options.fmt2||fmt);
      body+=`<div class="ct-row"><span class="ct-dot" style="background:${s.color}"></span><span>${escapeHtml(s.label||"değer")}</span><b>${escapeHtml(f(p.y))}</b></div>`; });
    if(p0&&prev&&prev.y!=null&&isFinite(prev.y)&&p0.y!=null){ const d=p0.y-prev.y; const base=Math.abs(prev.y)>1e-9?Math.abs(prev.y):1;
      const pct=Math.round(d/base*100);
      body+=`<div class="ct-delta ${d>=0?'up':'down'}">${d>=0?"▲":"▼"} ${escapeHtml(fmt(Math.abs(d)))} (%${Math.abs(pct)})</div>`; }
    if(p0&&p0.ev) body+=`<div class="ct-ev">📌 ${escapeHtml(p0.ev)}</div>`;
    tip.innerHTML=body; tip.style.display="block";
    // konumlandırma (ekrandan taşmasın)
    const tw=tip.offsetWidth, th=tip.offsetHeight;
    let left=r.left+cx-tw/2; let top=r.top+defaultY*sy-th-12;
    if(top<6) top=r.top+defaultY*sy+14;
    left=clamp(left,6,window.innerWidth-tw-6);
    top=clamp(top,6,window.innerHeight-th-6);
    tip.style.left=left+"px"; tip.style.top=top+"px";
    if(live) live.textContent=`${head}, ${series.map(s=>{const p=s.points[i]; return p&&p.y!=null?((s.label||"değer")+" "+fmt(p.y)):"";}).filter(Boolean).join(", ")}`;
  }
  function hide(){ active=-1; if(cross)cross.setAttribute("opacity","0"); dots.forEach(d=>d.setAttribute("opacity","0"));
    const tip=document.getElementById("chartTip"); if(tip) tip.style.display="none"; }
  el.addEventListener("pointermove",e=>{ if(pinned&&e.pointerType==="touch") return; show(idxFromClientX(e.clientX)); });
  el.addEventListener("pointerdown",e=>{ if(e.pointerType==="touch"){ pinned=true; show(idxFromClientX(e.clientX)); } });
  el.addEventListener("pointerleave",e=>{ if(!pinned) hide(); });
  el.addEventListener("pointerup",e=>{ if(e.pointerType!=="touch"&&!pinned) {} });
  el.addEventListener("keydown",e=>{
    let i=active<0?(n-1):active;
    if(e.key==="ArrowLeft"){ i=Math.max(0,i-1); show(i); e.preventDefault(); }
    else if(e.key==="ArrowRight"){ i=Math.min(n-1,i+1); show(i); e.preventDefault(); }
    else if(e.key==="Home"){ show(0); e.preventDefault(); }
    else if(e.key==="End"){ show(n-1); e.preventDefault(); }
    else if(e.key==="Escape"){ hide(); el.blur&&el.blur(); }
  });
  el.addEventListener("blur",()=>{ if(!pinned) hide(); });
  // grafik dışına dokununca sabit tooltip'i kapat
  if(!window._chartTapClose){ window._chartTapClose=true;
    document.addEventListener("pointerdown",e=>{ if(!e.target.closest||!e.target.closest(".ichart")){ const t=document.getElementById("chartTip"); if(t)t.style.display="none"; } },true); }
}

function deptStaff(st, id){ st=st||S; return (st.staffDirectory||[]).filter(s=>s.departmentId===id); }
function recomputeDepartments(st){

    const staffPow = staff.reduce((s,x)=>s+ x.quality*(0.6+x.level*0.12),0);
    const cap = d.level*1.6; // beklenen personel gücü

    const workloadPenalty = Math.max(0,d.workload-70)*0.5;

function simDepartments(sum){

function processDepartmentTasks(sum){
  const t=nowTick();

    const d=S.departments[task.deptId];
    const eff=d?d.efficiency:30;
    // aşırı yük hata riskini artırır
    const wlPen=Math.max(0,(d?d.workload:0)-85)*0.004;
    const succ=clamp(task.baseSucc + eff/250 - wlPen, 0.15, 0.96);

    else { task.status="failed"; if(d)d.failCount++; applyDeptTaskResult(task,false); }

function ensureOfferV6(o){

function newNegoSession(o){

function playerRedLines(p){

  const cat=playerCategory(p);
  return {
    minWage: Math.round((p.wage*1.05 + cat.minW*120)/100)*100,
    minSquadRole: p.age<=20?"Gelişim (genç)": (p.char==="ego"||cat.tier>=4)?"Kilit oyuncu":"İlk 11 adayı",
    maxDuration: p.age>=30?2 : p.char==="ego"?3 : 5,
    wantsRelease: (cat.tier>=4 || p.char==="ego" || p.family==="avrupa"),
    releaseMaxPct: p.char==="ego"?1.5 : cat.tier>=5?1.5 : 2.0,
  };
}
function contractDemandLoad(o, session){
  const p=S.world.players[o.pid]; const c=o.contract; const rl=playerRedLines(p);
  let load=0;
  // maaş düşükse oyuncu zorlanır
  if(c.weeklyWage < rl.minWage) load += (rl.minWage-c.weeklyWage)/Math.max(1,rl.minWage)*3;
  // süre çok uzunsa memnuniyet düşer
  if(c.durationYears > rl.maxDuration) load += (c.durationYears-rl.maxDuration)*0.8;
  // squad role düşükse
  const roleRank=SQUAD_ROLES.indexOf(c.squadRole), wantRank=SQUAD_ROLES.indexOf(rl.minSquadRole);
  if(roleRank<wantRank && rl.minSquadRole!=="Gelişim (genç)") load += (wantRank-roleRank)*0.9;
  // release clause: yıldız çıkış yolu ister; düşük clause oyuncuyu memnun eder ama kulübü sıkabilir
  if(rl.wantsRelease && c.releasePct===0) load += 1.2;
  if(rl.wantsRelease && c.releasePct> rl.releaseMaxPct) load += (c.releasePct-rl.releaseMaxPct)*1.5;
  // oynama garantisi memnuniyeti artırır
  if(c.playingTimePromise) load -= 0.6;
  if(c.signingBonus>0) load -= Math.min(0.8, c.signingBonus/Math.max(1,p.value)*4);
  if(c.loyaltyBonus>0) load -= 0.3;
  return load;
}
function clubContractLoad(o){
  // kulüp açısından: yüksek maaş/imza/oynama garantisi/düşük release clause zorlar
  const c=o.contract; const p=S.world.players[o.pid]; const club=S.world.clubs[o.cid];
  const prof=PROFILE_W[club.profile]||{};
  let load=0;
  load += Math.max(0, c.weeklyWage-o.wage)/Math.max(1,o.wage) * (prof.wage??1) * 1.5;
  load += (c.signingBonus/Math.max(1,p.value)) * 2 * (prof.signBonus??1);
  if(c.playingTimePromise) load += 0.8*(prof.playGuar??1);
  if(c.releasePct>0 && c.releasePct<1.5) load += (1.5-c.releasePct)*1.2; // düşük clause kulübü sıkar
  if(c.durationYears<=1) load += 0.6; // çok kısa kontrat kulüp sabrını düşürür
  return load;
}
function persuadePlayerContract(oid){

    playerPatience:s.playerPatience, load:Math.round(load*100)/100, t:nowTick()});

    s.playerConcessionBudget=Math.max(0,s.playerConcessionBudget-Math.max(0,load)*0.7);

    save(); openContractLayer(oid,`"Anlaştık — imzaya hazırız. İyi iş." 🤝`);
  } else if(roll<pSucc){
    o.contractOk=false;
    save(); openContractLayer(oid,`"Oyuncu ikna oldu ama kulüp bu maddede geri adım istiyor." Maaş/imza/clause ayarla.`);
  } else {
    o.contractOk=false;

    const ask= rl.wantsRelease&&c.releasePct===0? "serbest kalma maddesi" : c.weeklyWage<rl.minWage? "daha yüksek maaş" : !c.playingTimePromise? "oynama garantisi" : "daha kısa süre";
    save(); openContractLayer(oid,`"${ask} olmadan imzalamam." 😤 (${s.playerPatience} tur sabır kaldı)`);
  }
}

function validateTransferCompletion(oid){
  const o=S.offers.find(x=>x.id===oid); const reasons=[];
  if(!o) return {ok:false,reasons:["Teklif bulunamadı"]};
  const p=S.world.players[o.pid];
  ensureOfferV6(o);
  if(o._completed) return {ok:false,reasons:["Bu transfer zaten tamamlandı"]};
  if(!o.pkgOk) reasons.push("Kulüpler arası paket kabul edilmedi");
  if(!o.contractOk) reasons.push("Oyuncu kontrat şartları kabul edilmedi");
  if(!repValid(o.pid)) reasons.push("Geçerli temsil yetkin yok");
  if(!p) reasons.push("Oyuncu yok");
  const c=o.contract||{};
  for(const v of [o.fee,o.wage,o.comm,c.weeklyWage,c.durationYears,c.releaseClause]) if(v!=null&&(!isFinite(v)||Number.isNaN(v))) reasons.push("Geçersiz sayısal değer");
  const club=S.world.clubs[o.cid];
  if(club && o.fee>club.budget*1.6) reasons.push("Kulüp bütçesi yetersiz");
  if(p && S.offers.some(x=>x.pid===o.pid&&x._completed)) reasons.push("Oyuncu aynı anda başka transferde");
  if(p && p.agent==="rival") reasons.push("Oyuncu rakip ajansla sözleşmeli");
  if(o.expires!=null && o.season===S.season && o.expires<S.week) reasons.push("Teklif süresi doldu");
  try{ const el=offerEligibility(o);
    if(el.permit&&el.permit.verdict==="uygun-değil") reasons.push("Çalışma izni: uygun değil");
    if(el.permit&&el.permit.verdict==="itiraz"&&!o._permitAppealed) reasons.push("Çalışma izni itirazı gerekli");
    if(o._permitDenied) reasons.push("Çalışma izni reddedildi");
    if(el.reg&&!el.reg.ok&&!o._regLoanWorkaround&&!o._regU21) reasons.push("Kadro kaydı: "+el.reg.reason); }catch(e){}
  return {ok:reasons.length===0, reasons};
}

function pickTransferInterestClub(p){
  const cands=Object.values(S.world.clubs).filter(c=>{

    const need=(c.needs&&c.needs[p.pos])||0; if(need<40) return false;
    if(c.transferBudget!=null && c.transferBudget<(p.value||0)*0.35) return false;
    const lg=S.world.leagues.find(l=>l.id===c.leagueId); if(!lg) return false;
    const reg=regulationFor(lg);

      try{ if(evaluateWorkPermit(p,c,null).verdict==="uygun-değil") return false; }catch(e){}
    }
    return true;
  });
  if(!cands.length) return null;
  cands.sort((a,b)=>(((b.needs&&b.needs[p.pos])||0)+(b.transferBudget||0)/2e6)-(((a.needs&&a.needs[p.pos])||0)+(a.transferBudget||0)/2e6));

const PHONE_INFO_TOPICS=new Set(["thank_you","player_form","agency_strategy","cooperation"]);
function phoneDismissImpact(m){
  const topic=inferPhoneTopic(m);

  const p=m.pid?S.world.players[m.pid]:null, c=m.cid?S.world.clubs[m.cid]:null;
  const urgent=m.urgency==="yüksek";
  switch(topic){
    case "playing_time": case "role_discussion": case "morale":
      return {topic,hasConsequence:true,urgent,text:`${p?p.name:"Oyuncu"} sadakati ${urgent?"-10":"-4"}, morali ${urgent?"-8":"-3"} düşer.`};
    case "transfer_request":
      return {topic,hasConsequence:true,urgent,text:`${p?p.name:"Oyuncu"} sadakati ${urgent?"-14":"-6"} düşer.`};
    case "rival_contact":
      return {topic,hasConsequence:true,urgent,text:`${p?p.name:"Oyuncu"} sadakati ${urgent?"-8":"-3"} düşer.`};
    case "transfer_interest": case "loan_interest": case "player_complaint": case "contract_renewal":
      return {topic,hasConsequence:true,urgent,text:`${c?c.name:"Kulüp"} ilişkisi ${urgent?"-8":"-3"} düşer.`};
    case "trust_problem": case "education": case "relocation":
      return {topic,hasConsequence:true,urgent,text:`${p?p.name+"'in ":""}aile güveni ${urgent?"-10":"-4"} düşer.`};
    case "social_obligation": case "morality_warning": case "contract_conflict": case "appearance_request":
      return {topic,hasConsequence:true,urgent,text:`Sponsor ilişkisi zedelenir${urgent?", yıllık bedel hafif düşer":""}.`};
    default:
      return {topic,hasConsequence:urgent,urgent,text:urgent?"Bu fırsat kaçırılmış olur.":""};
  }
}
function applyPhoneDismissConsequence(m){
  if(m._dismissApplied) return;
  m._dismissApplied=true;
  const impact=phoneDismissImpact(m);
  if(!impact.hasConsequence) return;
  const p=m.pid?S.world.players[m.pid]:null, c=m.cid?S.world.clubs[m.cid]:null;
  const k=impact.urgent?1:0.4;
  let text="";
  switch(impact.topic){
    case "playing_time": case "role_discussion": case "morale":
      if(p){ p.loyalty=clamp(p.loyalty-Math.round(10*k),0,100); p.morale=clamp(p.morale-Math.round(8*k),0,100); }
      text=`${p?p.name:"Oyuncu"} kapatılan mesaj yüzünden hayal kırıklığına uğradı.`; break;
    case "transfer_request":
      if(p) p.loyalty=clamp(p.loyalty-Math.round(14*k),0,100);
      text=`${p?p.name:"Oyuncu"} ayrılma talebi görmezden gelindi.`; break;
    case "rival_contact":
      if(p) p.loyalty=clamp(p.loyalty-Math.round(8*k),0,100);
      text=`${p?p.name:"Oyuncu"} yalnız hissetti.`; break;
    case "transfer_interest": case "loan_interest": case "player_complaint": case "contract_renewal":
      if(c) c.relation=clamp(c.relation-Math.round(8*k),0,100);
      text=`${c?c.name:"Kulüp"} yanıt alamadığı için ilgisini geri çekti.`; break;
    case "trust_problem": case "education": case "relocation":
      if(p) p.famTrust=clamp((p.famTrust||50)-Math.round(10*k),0,100);
      text=`${p?p.name+"'in ":""}ailesi görmezden gelindiğini hissetti.`; break;
    case "social_obligation": case "morality_warning": case "contract_conflict": case "appearance_request": {
      const deal=p&&p.brand?(p.brand.activeDeals||[]).find(d=>d.id===m.sponsorDealId):null;
      if(deal&&impact.urgent) deal.yearly=Math.round(deal.yearly*0.96);
      text="Sponsor konusu yanıtsız kapatıldı."; break; }
    default:
      text="Fırsat kapatılarak kaçırıldı.";
  }
  m.dismissConsequence=text;
  pushPhoneWeeklyEvent(`✖️ ${text}`, p?`openEntity('player','${p.id}')`:c?`openEntity('club','${c.id}')`:null);
}

function resolvePhoneConversation(id, optId){
  const m=(S.phoneInbox||[]).find(x=>x.id===id); if(!m) return;
  if(["delegated","resolved","dismissed","expired"].includes(m.status)){ openPhoneMsg(id); return; }
  if(optId==="delegate"){ openPhoneDelegation(id); return; }
  if(optId==="alt_player"){ openPhoneAlternatePlayer(id); return; }
  const ctx=phoneCtx(m);
  const opts=getPhoneConversationOptions(m,ctx);
  const opt=opts.find(o=>o.id===optId); if(!opt||!opt.run) return;
  if(opt.cashCost && S.cash<opt.cashCost){ toast("Yetersiz bakiye 💸"); return; }
  if(opt.attentionCost && !useAttention(opt.attentionCost)) return;
  if(opt.cashCost) ledger(`Telefon görüşmesi — ${m.subject}`,-opt.cashCost);
  const roll = opt.chance!=null ? rnd()<opt.chance : true;
  const result = opt.run(m,ctx,roll) || {text:"",status:"resolved"};
  completePhoneConversation(m, Object.assign({success:roll},result));
}
function completePhoneConversation(m, result){
  m.outcome=result.text||"";
  if(!result.status || !["awaiting_followup","delegated"].includes(result.status)) setPhoneStatus(m,"resolved");
  toast(result.text?String(result.text).slice(0,60):"Görüşüldü 💬", result.success===false?undefined:"green");
  pushPhoneWeeklyEvent(`📱 ${m.subject}: ${result.text||""}`.trim(), m.pid?`openEntity('player','${m.pid}')`:m.cid?`openEntity('club','${m.cid}')`:null);
  save();
  openPhoneMsg(m.id);
}

function getEligibleDelegates(message){

      cost:Math.round((DEPT_MAP[deptId].weekly||0)*0.05),
      downside:"Sonuç departman kalitesine bağlı; başarısızlık ilişkiyi biraz yıpratabilir."});

function resolveDelegatedConversation(task, ok){
  const m=(S.phoneInbox||[]).find(x=>x.id===task.sourceMessageId);

        resultText=`${deptName} ${c?c.name:"kulüp"} ile ilişkiyi olumlu yönetti.`; break;
      case "social_obligation": case "morality_warning": case "contract_conflict": case "appearance_request": {
        const deal=p&&p.brand?(p.brand.activeDeals||[]).find(d=>d.id===task.sponsorDealId):null;
        if(deal){ if(deal.socialObligation) deal.socialObligation.missed=Math.max(0,(deal.socialObligation.missed||0)-1); delete deal._moralWarn; }

      case "transfer_rumour": case "player_form": case "agency_strategy": case "controversy":

          rlog(rv.baseId,`${deptName} ile profesyonel bir görüşme yürüttü (ilişki +${delta})`);
          resultText=`${deptName}, ${rv.ownerName} ile ilişkiyi geliştirdi (ilişki +${delta}).`;
        } else resultText=`${deptName} konuyu idare etti.`;
        break; }
      case "threat": case "client_dispute": {
        if(p){ p.loyalty=clamp(p.loyalty+4,0,100); }
        if(rv){ const delta=Math.round(6+deptEff/12);
          S.rivalDiplomacy[rv.id]=clamp((S.rivalDiplomacy[rv.id]||0)+delta,-100,100); rv.relationWithPlayerAgency=S.rivalDiplomacy[rv.id];
          rlog(rv.baseId,`${deptName} gerilimi yatıştırdı (ilişki +${delta})`);
          resultText=`${deptName}, ${rv.ownerName} ile gerilimi bir miktar yatıştırdı (ilişki +${delta}).`;
        } else resultText=`${deptName} konuyu idare etti.`;
        break; }
      default:
        if(p) p.loyalty=clamp(p.loyalty+5,0,100);
        resultText=`${deptName} konuyu idare etti.`;
    }
  } else {
    switch(task.topic){
      case "playing_time": case "role_discussion": case "morale": case "rival_contact":
        if(p){ p.loyalty=clamp(p.loyalty-6,0,100); p.morale=clamp(p.morale-5,0,100); }
        resultText=`${deptName} istenen sonucu alamadı — memnuniyetsizlik sürüyor.`; break;
      case "trust_problem": case "education": case "relocation":
        if(p) p.famTrust=clamp((p.famTrust||50)-6,0,100);
        resultText=`${deptName} aileyi ikna edemedi.`; break;
      case "transfer_interest": case "loan_interest": case "player_complaint": case "contract_renewal":
        if(c) c.relation=clamp(c.relation-4,0,100);
        resultText=`${deptName} kulüple anlaşamadı.`; break;
      case "cooperation": case "information_exchange": case "transfer_partnership": case "truce": {
        if(rv){ const delta=-Math.round(4+((100-deptEff)/25));
          S.rivalDiplomacy[rv.id]=clamp((S.rivalDiplomacy[rv.id]||0)+delta,-100,100); rv.relationWithPlayerAgency=S.rivalDiplomacy[rv.id];
          rlog(rv.baseId,`${deptName} ile görüşme sonuçsuz kaldı (ilişki ${delta})`);
          resultText=`${deptName}, ${rv.ownerName} ile anlaşamadı (ilişki ${delta}).`;
        } else resultText=`${deptName} bu konuda sonuç alamadı.`;
        break; }
      case "threat": case "client_dispute": {
        if(rv){ const delta=-Math.round(8+((100-deptEff)/20));
          S.rivalDiplomacy[rv.id]=clamp((S.rivalDiplomacy[rv.id]||0)+delta,-100,100); rv.relationWithPlayerAgency=S.rivalDiplomacy[rv.id];
          rv.riskTolerance=clamp((rv.riskTolerance||0.4)+0.05,0,1);

          resultText=`${deptName}, tehdidi durduramadı — ${rv.ownerName} baskısını artırdı (ilişki ${delta}).`;
        } else resultText=`${deptName} bu konuda sonuç alamadı.`;
        break; }
      default: resultText=`${deptName} bu konuda sonuç alamadı.`;
    }
  }
  if(m){
    m.outcome=resultText; m.stage="resolved"; setPhoneStatus(m,"resolved");
    pushPhone({from:m.from,fromType:m.fromType,kind:"bilgi",pid:m.pid,cid:m.cid,rid:m.rid,sponsorDealId:m.sponsorDealId,
      topic:m.topic,urgency:"düşük",subject:`Sonuç: ${m.subject}`,body:resultText,parentMessageId:m.id,stage:"followup_result"});

  }
  notify("ajans",`${ok?"✅":"⚠️"} Telefon delegasyonu: ${m?m.subject:task.title}`,"agency","departman");

function openPhoneReminder(id){
  const m=(S.phoneInbox||[]).find(x=>x.id===id); if(!m) return;
  let h=`<div class="grab"></div><div style="text-align:center"><div class="tiny">HATIRLATMA</div>
    <div class="b" style="font-family:'Fraunces',serif;font-size:16px">${escapeHtml(m.subject)}</div></div><div class="card">`;
  const opts=[["1 hafta sonra",1],["2 hafta sonra",2]];
  opts.push(m.expiresAtTick!=null?["Son tarihten hemen önce",Math.max(1,m.expiresAtTick-nowTick()-1)]:["3 hafta sonra",3]);
  for(const [label,wk] of opts){
    let capped=wk; if(m.expiresAtTick!=null) capped=Math.max(1,Math.min(wk,m.expiresAtTick-nowTick()-1||1));
    h+=`<button class="opt" onclick="setPhoneReminder('${id}',${capped})"><div class="ot">⏰ ${label}</div><div class="oh">${capped} hafta sonra tekrar gündeme gelir</div></button>`;
  }
  h+=`</div><button class="btn block ghost" style="margin-top:8px" onclick="openPhoneMsg('${id}')">← Geri</button>`;
  openSheet(h);
}
function setPhoneReminder(id, weeks){

function applyPhoneExpiryConsequence(m){
  const p=m.pid?S.world.players[m.pid]:null; const c=m.cid?S.world.clubs[m.cid]:null;
  let text="";
  switch(inferPhoneTopic(m)){
    case "playing_time": case "role_discussion": case "morale":
      if(p){ p.loyalty=clamp(p.loyalty-10,0,100); p.morale=clamp(p.morale-8,0,100); if(!p.rivalId&&rnd()<0.3) p.rivalId=pick(RIVALS).id; }
      text=`${p?p.name:"Oyuncu"} yanıt bulamadığı için hayal kırıklığına uğradı.`; break;
    case "transfer_request":
      if(p){ p.loyalty=clamp(p.loyalty-14,0,100); if(!p.rivalId) p.rivalId=pick(RIVALS).id; }
      text=`${p?p.name:"Oyuncu"} ayrılma talebine yanıt alamadı — güven zedelendi.`; break;
    case "transfer_interest": case "loan_interest":
      if(c) c.relation=clamp(c.relation-8,0,100);
      text=`${c?c.name:"Kulüp"} yanıt alamadığı için ilgisini geri çekti.`; break;
    case "trust_problem": case "education": case "relocation":
      if(p) p.famTrust=clamp((p.famTrust||50)-10,0,100);
      text=`${p?p.name+"'in ":""}ailesi yanıtsız kaldığı için güvenini kaybetti.`; break;
    case "social_obligation": case "morality_warning": case "contract_conflict": {
      const deal=p&&p.brand?(p.brand.activeDeals||[]).find(d=>d.id===m.sponsorDealId):null;
      if(deal) deal.yearly=Math.round(deal.yearly*0.92);
      text="Sponsor konusu yanıtsız kaldı — sözleşme bedeli hafif düştü."; break; }
    default: text="Mesaj yanıtsız kaldığı için fırsat kaçtı.";
  }
  setPhoneStatus(m,"expired"); m.outcome=text;
  addNews("me",`Fırsat kaçtı: ${m.subject}`,text,"bad");
  pushPhoneWeeklyEvent(`⌛ ${text}`, p?`openEntity('player','${p.id}')`:c?`openEntity('club','${c.id}')`:null);
}
function simPhoneFollowUps(sum){
  const now=nowTick();
  for(const m of (S.phoneInbox||[]).slice()){
    if(m.followUpTick!=null && m.followUpTick<=now){
      if(m.stage==="reminder"||m.followUpKind==="contract_renewal_recheck"){
        m.followUpTick=null; m.stage="initial"; setPhoneStatus(m,"awaiting_response");
      } else if(m.status==="awaiting_followup"){
        resolvePhoneFollowUp(m);
      }
    }
    if(m.expiresAtTick!=null && now>m.expiresAtTick && (m.status==="unread"||m.status==="awaiting_response")){
      applyPhoneExpiryConsequence(m);
    }
  }
}

   ============================================================ */
function computeDeadlineDay(){
  const win=BAL.transferWindows.find(([a,b])=>S.week>=a&&S.week<=b);
  if(win && S.week===win[1]){ S.deadlineDayState={active:true,blocks:3,s:S.season,closes:win[1]}; }
  else if(S.deadlineDayState&&S.deadlineDayState.active&&!inWindow(S.week)) S.deadlineDayState=null;
}
function deadlineActive(){ return !!(S.deadlineDayState&&S.deadlineDayState.active&&inWindow(S.week)&&S.week===S.deadlineDayState.closes); }
function openDeadlineDay(){
  if(!deadlineActive()){ toast("Deadline Day aktif değil"); return; }
  const st=S.deadlineDayState; const blocks=st.blocks??3;
  const opsB=deptBonus("transferOps");
  let h=`<div class="grab"></div><div style="text-align:center"><div class="tiny">⏰ DEADLINE DAY</div>
   <div class="b" style="font-family:'Fraunces',serif;font-size:18px">Pencere bu hafta kapanıyor</div>
   <div class="tiny">Kalan zaman bloğu: ${"🟩".repeat(Math.max(0,blocks))}${"⬜".repeat(Math.max(0,3-blocks))} · her hamle 1 blok + dikkat</div></div>`;
  h+=`<div class="card alt tiny">Transfer Operasyonları departmanı evrakı hızlandırır (${Math.round(opsB*100)}% bonus). Her "hızlandır" kulüp kabulünü ve oynama süresini iyileştirir.</div>`;
  const offers=S.offers;
  if(!offers.length) h+=`<div class="empty">Masada aktif teklif yok. Son dakika sürprizi olabilir…</div>`;
  else h+=offers.map(o=>{ const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
    return `<div class="card"><div class="row"><div class="grow"><span class="b">${p.name}</span><div class="tiny">${c.name} · ${fmtM(o.fee)} · sabır ${o.patience??3}</div></div>
      <button class="btn sm ${blocks>0?'gold':'ghost'}" ${blocks>0?"":"disabled"} onclick="deadlinePush('${o.id}')">⚡ Hızlandır</button></div></div>`; }).join("");
  h+=`<button class="btn block ghost" style="margin-top:8px" onclick="closeSheet();navigateTo('transfer','teklif')">Teklif masasına git</button>`;
  openSheet(h);
}
function deadlinePush(oid){
  const st=S.deadlineDayState; if(!st||(st.blocks??0)<=0){ toast("Zaman bloğu kalmadı ⏳"); return; }
  if(!attentionLeft()){ toast("Yönetici dikkati kalmadı"); return; }
  const o=S.offers.find(x=>x.id===oid); if(!o){ openDeadlineDay(); return; }
  useAttention(1); st.blocks--;
  ensureOfferV6(o);
  const opsB=deptBonus("transferOps");
  o.patience=(o.patience??3)+1; // ekstra tur kazandır
  o.pkgOk=true;
  const p=S.world.players[o.pid];
  if(rnd()<0.5+opsB*0.4){ o.contract.playingTimePromise=true; o.contractOk=true;
    toast("Kulüp evrakı hızlandı, oynama garantisi koptu ✅","green");
    addNews("me",`Deadline hamlesi: ${p.name}`,`Son gün baskısıyla kulüp şartları iyileştirdi. İmzaya hazır.`,"good"); }
  else { o.fee=Math.round(o.fee*1.05/1000)*1000; o.comm=Math.round(o.fee*p.agentCommission);
    toast("Kulüp bonservisi biraz yükseltti","gold"); }
  save(); openDeadlineDay(); renderChrome();
}

function agDepartments(){
  recomputeDepartments(S);
  const tier=calculateAgencyTier();
  const totalCost=Object.values(S.departments).reduce((s,d)=>s+(d.unlocked?d.weeklyCost:0),0);
  const openN=Object.values(S.departments).filter(d=>d.unlocked).length;
  let h=renderMetricGrid([{label:"Açık",value:openN+"/"+DEPT_DEFS.length},{label:"Personel",value:(S.staffDirectory||[]).length},{label:"Haftalık",value:fmtM(totalCost)},{label:"Seviye",value:tier.lv}]);
  h+=`<div class="tiny" style="margin:2px 2px 10px">Departmanları aç, personel al, görev delege et. Her departman oyunu gerçekten değiştirir.</div>`;

UI.drawerGesture={active:false,pointerId:null,startX:0,startY:0,currentX:0,startTime:0,directionLocked:false,horizontal:false,mode:null};
function isTouchLikely(){ return window.matchMedia && (window.matchMedia("(pointer:coarse)").matches || window.innerWidth<1100); }
function reducedMotion(){ return (S&&S.settings&&S.settings.reduceAnim) || (window.matchMedia&&window.matchMedia("(prefers-reduced-motion:reduce)").matches); }
function drawerEl(){ return document.getElementById("drawer"); }
function drawerWidth(){ const d=drawerEl(); return d?d.getBoundingClientRect().width: Math.min(340,window.innerWidth*0.84); }
function setupDrawerGestures(){
  const dr=drawerEl(); const wrap=document.getElementById("drawerwrap");
  if(dr && !dr._gsetup){ dr._gsetup=true;
    dr.addEventListener("pointerdown",onDrawerPointerDown,{passive:true});
    dr.addEventListener("pointermove",onDrawerPointerMove,{passive:false});
    dr.addEventListener("pointerup",onDrawerPointerUp);
    dr.addEventListener("pointercancel",cancelDrawerGesture);
  }
  if(!document._edgeSetup){ document._edgeSetup=true;
    document.addEventListener("pointerdown",onEdgePointerDown,{passive:true});
    document.addEventListener("pointermove",onEdgePointerMove,{passive:false});
    document.addEventListener("pointerup",onEdgePointerUp);
    document.addEventListener("pointercancel",cancelDrawerGesture);
  }
}
function onDrawerPointerDown(e){
  if(!UI.menuOpen) return;
  if(e.target && e.target.closest && e.target.closest("input,textarea,select")) return;
  const g=UI.drawerGesture;
  g.active=true; g.mode="close"; g.pointerId=e.pointerId; g.startX=e.clientX; g.startY=e.clientY; g.currentX=e.clientX;
  g.startTime=Date.now(); g.directionLocked=false; g.horizontal=false;
  const dr=drawerEl(); if(dr) dr.style.transition="none";
}
function onDrawerPointerMove(e){
  const g=UI.drawerGesture; if(!g.active||g.mode!=="close"||e.pointerId!==g.pointerId) return;
  const dx=e.clientX-g.startX, dy=e.clientY-g.startY;
  if(!g.directionLocked){
    if(Math.abs(dx)<8&&Math.abs(dy)<8) return;
    g.directionLocked=true; g.horizontal=Math.abs(dx)>Math.abs(dy);
    if(!g.horizontal){ cancelDrawerGesture(); return; } // dikey → scroll'a bırak
  }
  if(!g.horizontal) return;
  if(e.cancelable) e.preventDefault();
  g.currentX=e.clientX;
  const move=Math.min(0,dx); // sadece sola
  animateDrawerToPosition(move,true);
}
function onDrawerPointerUp(e){
  const g=UI.drawerGesture; if(!g.active||g.mode!=="close") return;
  const dx=g.currentX-g.startX; const dt=Math.max(1,Date.now()-g.startTime); const vx=dx/dt;
  g.active=false;
  const dw=drawerWidth();
  const shouldClose = g.horizontal && (dx < -Math.max(70, dw*0.25) || vx < -0.45);
  completeDrawerGesture(!shouldClose);
}
function cancelDrawerGesture(){
  const g=UI.drawerGesture; if(!g.active) return; g.active=false;
  if(g.mode==="close") completeDrawerGesture(true);
  else { g.mode=null; animateEdgeReset(); }
}
function animateDrawerToPosition(x, dragging){
  const dr=drawerEl(); const bg=document.querySelector("#drawerwrap .drawer-bg"); if(!dr) return;
  const dw=drawerWidth();
  if(!dragging&&!reducedMotion()) dr.style.transition="transform .2s ease";
  dr.style.transform=`translateX(${x}px)`;
  if(bg){ const frac=1-Math.min(1,Math.abs(x)/dw); bg.style.opacity=String(0.28*frac/0.28*frac); bg.style.opacity=String(Math.max(0,frac)); }
}
function completeDrawerGesture(open){
  const dr=drawerEl(); const bg=document.querySelector("#drawerwrap .drawer-bg");
  if(dr) dr.style.transition= reducedMotion()?"none":"transform .2s ease";
  if(open){ if(dr) dr.style.transform="translateX(0)"; if(bg) bg.style.opacity=""; UI.drawerGesture.mode=null; }
  else { if(dr){ dr.style.transform=""; } if(bg) bg.style.opacity=""; UI.drawerGesture.mode=null; closeMainMenu(); }
}
/* kenardan aç */
function onEdgePointerDown(e){
  if(UI.menuOpen) return;
  if(!(S&&S.settings&&S.settings.edgeSwipeMenu!==false)) return;
  if(!isTouchLikely()) return;
  if(e.clientX>28) return;
  const g=UI.drawerGesture;
  g.active=true; g.mode="edge"; g.pointerId=e.pointerId; g.startX=e.clientX; g.startY=e.clientY; g.currentX=e.clientX;
  g.startTime=Date.now(); g.directionLocked=false; g.horizontal=false;
}
function onEdgePointerMove(e){
  const g=UI.drawerGesture; if(!g.active||g.mode!=="edge"||e.pointerId!==g.pointerId) return;
  const dx=e.clientX-g.startX, dy=e.clientY-g.startY;
  if(!g.directionLocked){ if(Math.abs(dx)<8&&Math.abs(dy)<8) return;
    g.directionLocked=true; g.horizontal=Math.abs(dx)>Math.abs(dy);
    if(!g.horizontal||dx<0){ cancelDrawerGesture(); return; } }
  if(!g.horizontal) return;
  if(e.cancelable) e.preventDefault();
  g.currentX=e.clientX;
}
function onEdgePointerUp(e){
  const g=UI.drawerGesture; if(!g.active||g.mode!=="edge") return;
  const dx=g.currentX-g.startX; const dt=Math.max(1,Date.now()-g.startTime); const vx=dx/dt;
  g.active=false; g.mode=null;
  if(g.horizontal && (dx>60 || vx>0.4)) openMainMenu();
}

function _hashSeed(str){ let h=2166136261>>>0; str=String(str); for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function generateClubIdentity(cid, city, seed, used){
  const words=REGION_WORD[cid]||REGION_WORD.generic;
  const idw=CLUB_IDENTITY[cid]||CLUB_IDENTITY.generic;
  srand(seed);
  let name, tries=0;
  do{
    const style=rnd();
    if(style<0.45) name=`${city} ${pick(words)}`;
    else if(style<0.75) name=`${city} ${pick(idw)}`;
    else name=`${pick(idw)} ${city}`;
    tries++;
  } while(used&&used.has(name)&&tries<12);
  // gerçek kulüp adı koruması
  if(typeof REAL_CLUB_BLOCKLIST!=="undefined" && REAL_CLUB_BLOCKLIST.indexOf(name)>=0) name=`${city} ${pick(words)} ${pick(idw)}`;
  if(used){ let n=name,k=2; while(used.has(n)){ n=`${name} ${["II","B","Nova","Sur","Norte"][k-2]||k}`; k++; } name=n; used.add(name); }
  const short=city.slice(0,3).toUpperCase();
  return {name, shortName:short};
}

}

function pickArchetype(tier, seed, isCurated){

function generateLeague(country, tier, cfg, seed){
  const drop=(tier-1);
  const loBase=country.topStr[0]-drop*12, hiBase=country.topStr[1]-drop*13;
  const str=[clamp(loBase,18,90), clamp(hiBase,24,92)];

    strength, facility:clamp(Math.round(league.prestige*0.6+prestige*0.35+ri(-12,16)),15,96),
    financialPower:finPower, financialStability, ownerWealth, debtLevel:A.debt?ri(30,70):ri(0,25),
    trainingQuality:clamp(Math.round(40+A.youth*22+prestige*0.3+ri(-8,10)),20,96),
    youthAcademy:clamp(Math.round(30+A.youth*30+country.youthQ*20+ri(-8,10)),15,98),
    scoutingQuality:clamp(Math.round(35+prestige*0.35+ri(-8,10)),15,95),

    youthPolicy:A.buys==="youth"?"yüksek":A.buys==="veteran"?"düşük":"orta",

function generateLeaguePlayers(world, league, country, cfg){

  for(const cid of league.clubIds){

      { const nm=(typeof makeNameV9==="function")?makeNameV9(country.np,country.id):null;

        else p.name=makeName(namePoolFor(country.np)); }

function generateCountry(world, country, cfg, seed){
  const tiers=Math.min(country.maxTiers, cfg.tierCap);
  const cities=(CITY_POOLS[country.id]||CITY_POOLS.en).slice();
  const used=world._usedNames||(world._usedNames=new Set());
  for(let tier=1;tier<=tiers;tier++){
    const lseed=_hashSeed(seed+":"+country.id+":"+tier);
    const league=generateLeague(country,tier,cfg,lseed);
    const nClubs=tier===1?cfg.clubsTop:cfg.clubsLow;
    for(let i=0;i<nClubs;i++){
      const cseed=_hashSeed(lseed+":c"+i);
      const city=cities[(i+ (tier-1)*3)%cities.length];
      const big=tier===1 && i<3; // üst ligde ilk 3 kulüp büyük
      const club=generateClub(league,country,city,cseed,{big},used);
      world.clubs[club.id]=club; league.clubIds.push(club.id);
    }
    world.leagues.push(league);
    generateLeaguePlayers(world,league,country,cfg);
  }
  // genç havuzu (keşif hedefleri)
  const topLeague=world.leagues.find(l=>l.countryId===country.id&&l.tier===Math.min(2,tiers))||world.leagues.find(l=>l.countryId===country.id);
  for(let i=0;i<cfg.youthPer;i++){
    const lg=topLeague;
    const p=makePlayer(lg,{age:ri(15,19),discovered:false,clubId:pick(lg.clubIds)});
    p.nat=country.np; p.natFlag=NAT_FLAG[country.np]||"🏳️"; p.name=makeName(namePoolFor(country.np));
    p.wage=ri(300,2000); p.ca=clamp(p.ca-ri(4,10),18,66);
    p.pa=clamp(p.ca+ri(8,34)+(p.gem?10:0),p.ca+5,97);
    p.dl="light"; p.countryId=country.id;
    world.players[p.id]=p; world.youthPool.push(p.id);
  }

function buildWorldIndexes(st){

function leagueTable(leagueId){

function moveClubBetweenLeagues(club, toLeague){
  const from=S.world.leagues.find(l=>l.id===club.leagueId);

function applyPromotionEffects(club, toLeague){
  club.prestige=clamp(club.prestige+ri(4,9),5,99); club.reputation=club.prestige;
  club.budget=Math.round(club.budget*1.6); club.transferBudget=Math.round(club.transferBudget*1.7);

function applyRelegationEffects(club, toLeague){
  club.prestige=clamp(club.prestige-ri(4,9),5,99); club.reputation=club.prestige;
  club.budget=Math.round(club.budget*0.6); club.transferBudget=Math.round(club.transferBudget*0.55);
  club.wageBudget=Math.round(club.wageBudget*0.72); club.seasonGoal="yükselme";

    if(p.agent==="you"){ p.morale=clamp(p.morale-6,5,99); addNews("me",`${club.name} düştü`,`${p.name}'in kulübü alt lige indi. Oyuncu ayrılmak isteyebilir.`,"bad"); } } }

function resolvePromotionRelegation(){
  S.promotionHistory=S.promotionHistory||[]; S.relegationHistory=S.relegationHistory||[];
  const byCountryTier={};
  for(const lg of S.world.leagues){ (byCountryTier[lg.countryId]=byCountryTier[lg.countryId]||{})[lg.tier]=lg; }
  for(const cid in byCountryTier){ const tiers=byCountryTier[cid];
    const tierNums=Object.keys(tiers).map(Number).sort((a,b)=>a-b);
    for(let ti=0;ti<tierNums.length-1;ti++){
      const upper=tiers[tierNums[ti]], lower=tiers[tierNums[ti+1]];
      if(!upper||!lower) continue;
      const slots=Math.min(upper.relegationSlots||2, lower.promotionSlots||2, Math.floor(lower.clubIds.length/3), Math.floor(upper.clubIds.length/3))||1;
      const upTable=leagueTable(upper.id), lowTable=leagueTable(lower.id);
      const relegated=upTable.slice(-slots), promoted=lowTable.slice(0,slots);
      for(const r of relegated){ const c=S.world.clubs[r.id]; if(c){ moveClubBetweenLeagues(c,lower); applyRelegationEffects(c,lower);
        S.relegationHistory.unshift({s:S.season,club:c.name,from:upper.name,to:lower.name}); } }
      for(const p of promoted){ const c=S.world.clubs[p.id]; if(c){ moveClubBetweenLeagues(c,upper); applyPromotionEffects(c,upper);
        S.promotionHistory.unshift({s:S.season,club:c.name,from:lower.name,to:upper.name}); } }
    }
  }
  S.promotionHistory=S.promotionHistory.slice(0,40); S.relegationHistory=S.relegationHistory.slice(0,40);
  // puanları sıfırla
  for(const id in S.world.clubs){ const c=S.world.clubs[id]; c.seasonPts=0; c.seasonGF=0; c.seasonGA=0; c._ptWeek=0; }
  buildWorldIndexes(S);
  addNews("","Sezon sonu: yükselme/düşme tamamlandı 🔀",`${S.promotionHistory.filter(x=>x.s===S.season).length} kulüp yükseldi, ${S.relegationHistory.filter(x=>x.s===S.season).length} kulüp düştü.`,"");
}

function syncPidCounter(world){
  world=world||(S&&S.world); if(!world) return;
  let mx=_pid;
  for(const id in world.players){ const n=parseInt(String(id).replace(/[^0-9]/g,""),10); if(isFinite(n)&&n>=mx)mx=n+1; }
  for(const id in world.clubs){ const m2=String(id).match(/_(\d+)_/); if(m2){ const n=parseInt(m2[1],10); if(isFinite(n)&&n>=mx)mx=n+1; } }
  _pid=mx;
}
/* ---------- emekli/serbest oyuncu budama + nüfus tavanı (dünya sınırlı kalsın) ---------- */
function pruneWorldPlayers(){
  const watch=new Set(S.watchlist||[]);
  const repRef=new Set((S.reports||[]).map(r=>r.pid));
  const protectedIds=new Set();
  for(const rv of (S.rivalAgencies||[])) for(const id of rv.playerIds) protectedIds.add(id);
  let removed=0;
  const canDrop=(id,p)=> p.agent!=="you" && !watch.has(id) && !repRef.has(id) && !protectedIds.has(id);
  // 1) emekli, bize ait olmayan oyuncular
  for(const id in S.world.players){ const p=S.world.players[id];
    if(p.retired && canDrop(id,p)){ delete S.world.players[id]; removed++; try{ const ag=(S.representationAgreements||{})[id]; if(ag&&ag.status!=="orphan_closed") ag.status="orphan_closed"; }catch(e){} }
  }
  // 2) nüfus tavanı: kulüp sayısının ~10 katını aşarsa, kulüpsüz serbest hafif oyuncuları sil
  const cap=Object.keys(S.world.clubs).length*10 + 400;
  let ids=Object.keys(S.world.players);
  if(ids.length>cap){
    for(const id of ids){ if(ids.length-removed<=cap) break; const p=S.world.players[id];
      if(!p) continue;
      const noClub=!p.clubId||!S.world.clubs[p.clubId];
      if(noClub && canDrop(id,p)){ delete S.world.players[id]; removed++; try{ const ag=(S.representationAgreements||{})[id]; if(ag&&ag.status!=="orphan_closed") ag.status="orphan_closed"; }catch(e){} }
    }
  }
  if(removed){ S.world.youthPool=(S.world.youthPool||[]).filter(id=>S.world.players[id]);
    S.reports=(S.reports||[]).filter(r=>S.world.players[r.pid]);
    S.watchlist=(S.watchlist||[]).filter(id=>S.world.players[id]); }
  return removed;
}
