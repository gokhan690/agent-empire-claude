function requestPlayerMeeting(pid){
  const p=S.world.players[pid]; if(!p||p.agent) return;
  if(p.retired){ toast("Bu oyuncu emekli oldu 👞"); return; }
  if(p.meetCooldown>0){ toast(`Aile ${p.meetCooldown} hafta sonra görüşür ⏳`); return; }
  if(myPlayers().length>=BAL.officeLevels[S.officeLevel].cap){ toast("Müşteri kapasiten dolu — ofisi büyüt 🏢"); return; }
  const cost=meetCost(p);
  if(S.cash<cost){ toast("Yetersiz bakiye 💸"); return; }
  ledger("Görüşme masrafı — "+p.name, -cost); taskDone("meet");
  const w=calculatePlayerWillingness(p);
  const cat=playerCategory(p);
  if(w < Math.max(Math.round(cat.minW*0.85), 27)){
    p.meetCooldown=ri(5,9);
    const why=getWillingnessReasons(p)[0];
    addNews("me",`${p.name} görüşme talebini reddetti`,why,"bad");
    toast("Görüşme reddedildi 😞");
    if(p.rivalId&&rnd()<0.25){ p.agent="rival"; S.trackRecord.lostPlayers++;
      const rv=RIVALS.find(x=>x.id===p.rivalId);
      if(rv) addNews("me",`${p.name}, ${rv.name} ile anlaştı 💔`,"Sen kapıdan dönerken rakip içeri girdi.","bad"); }
    save(); closeSheet(); renderAll(); return;
  }
  openNegotiation(pid,w);
}
function buildNegotiationOptions(p,w){
  const fam=p.family; const opts=[];
  const bonus=Math.round((p.value*0.03+4000)/500)*500;
  opts.push({t:"Standart teklif — %8 komisyon",h:"Düz, dürüst anlaşma.",risk:"mid",
    chance:clamp(w+4,5,95),comm:0.08,cost:0,loyB:0});
  opts.push({t:"Düşük komisyon — %5",h:"Güven kazan, gelirden feda et. Gençlerde etkili.",risk:"low",
    chance:clamp(w+16+(p.age<=19?6:0),5,97),comm:0.05,cost:0,loyB:6});
  opts.push({t:"Kariyer planı sun",h:"Kulüp / lig / süre yol haritası çiz.",risk:"low",
    chance:clamp(w+11+(S.scouts.length>=2?6:0)+(fam==="egitim"?9:0),5,96),comm:0.08,cost:0,loyB:8});
  if(p.age<=20) opts.push({t:"Aileye güvence paketi",h:"Eğitim + düzenli rapor + şehir planı.",risk:"low",
    chance:clamp(w+14+(fam==="koruyucu"||fam==="egitim"?10:0),5,97),comm:0.08,cost:5000,loyB:5,famB:12,led:"Aile güvence paketi — "+p.name});
  opts.push({t:`İmza bonusu ver (${fmtM(bonus)})`,h:"Para odaklılarda çok etkili.",risk:"mid",
    chance:clamp(w+10+(fam==="para"||p.char==="ego"?14:0),5,96),comm:0.08,cost:bonus,loyB:2,led:"İmza bonusu — "+p.name});
  if((S.trackRecord||{}).transfers>0) opts.push({t:"Başarı hikâyeni anlat",h:`${S.trackRecord.transfers} transferlik geçmişini göster.`,risk:"low",
    chance:clamp(w+8+Math.min(14,S.trackRecord.transfers*4)+(fam==="guvensiz"?8:0),5,96),comm:0.08,cost:0,loyB:4});
  opts.push({t:"Agresif pazarlık — %12 komisyon",h:"Yüksek getiri ama oyuncuyu tamamen kaçırabilirsin.",risk:"high",
    chance:clamp(w-14,3,85),comm:0.12,cost:0,loyB:-4});
  return opts;
}
function openNegotiation(pid,w){
  const p=S.world.players[pid];
  const opts=buildNegotiationOptions(p,w);
  window._nego={pid,opts};
  const fam=p.family?FAM_TYPES.find(f=>f.id===p.family):null;
  const ch=CHAR_TYPES.find(c=>c.id===p.char);
  let h=`<div class="grab"></div>
  <div style="text-align:center"><div class="tiny">TEMSİL GÖRÜŞMESİ</div>
  <div class="b" style="font-family:'Fraunces',serif;font-size:19px">${p.name} masada 🤝</div>
  <div class="muted">${ch.icon} ${ch.label}${fam?` · ${fam.icon} ${fam.label}`:""}</div></div>
  <div class="card alt" style="margin-top:8px"><span class="muted">${fam?fam.hint:"Kararı teklifin şekli belirleyecek."} Görüşme ilgisi: <b>%${w}</b></span></div>`;
  opts.forEach((o,i)=>{ h+=`<button class="opt" onclick="resolveNegotiation(${i})">
    <span class="risk ${o.risk}">${o.chance>=75?"GÜÇLÜ":o.chance>=50?"MAKUL":"ZAYIF"} %${o.chance}</span>
    <div class="ot">${o.t}</div><div class="oh">${o.h}${o.cost?` · Maliyet ${fmtM(o.cost)}`:""}</div></button>`;});
  h+=`<button class="btn block ghost" style="margin-top:10px" onclick="closeSheet()">Masadan kalk</button>`;
  openSheet(h);
}
function resolveNegotiation(i){
  const n=window._nego; if(!n) return;
  const p=S.world.players[n.pid]; const o=n.opts[i]; if(!p||!o) return;
  if(o.cost&&S.cash<o.cost){ toast("Yetersiz bakiye 💸"); return; }
  if(o.cost) ledger(o.led||("İkna masrafı — "+p.name), -o.cost);
  window._nego=null;
  if(rnd()*100 < o.chance){
    p.agent="you"; p.agentCommission=o.comm;
    p.loyalty=clamp(ri(58,72)+(o.loyB||0),5,99);
    p.agentWeeksLeft=ri(110,170); p.rivalId=null;
    p.famTrust=clamp((p.famTrust??40)+(o.famB||0)+10,0,99);
    (p.careerEvents=p.careerEvents||[]).push({s:S.season,w:S.week,t:"İmza",d:`${S.agencyName} ile menajerlik anlaşması`});
    bumpRep("playerTrust",2);
    addNews("me",`İMZA: ${p.name} → ${S.agencyName} ✍️`,`Görüşme masasından el sıkışarak kalktılar. Komisyon: %${Math.round(o.comm*100)}.`,"good");
    toast(`${p.name} portföyde! 🎉`,"gold");
    milestone("firstSign","İlk oyuncunu ikna ettin! 🔭");
    if(p.gem) milestone("gem","Bir gizli cevher yakaladın... henüz bilmiyorsun 💎");
  } else {
    p.meetCooldown=ri(4,8);
    p.famTrust=clamp((p.famTrust??40)-4,0,99);
    if(o.risk==="high"&&rnd()<0.4){
      p.agent="rival"; p.rivalId=p.rivalId||pick(RIVALS).id; S.trackRecord.lostPlayers++;
      const rv=RIVALS.find(x=>x.id===p.rivalId);
      addNews("me",`${p.name} ipleri kopardı 💔`,`Agresif pazarlık geri tepti — ${rv?rv.name:"bir rakip"} devreye girip imzayı aldı.`,"bad");
      toast("Oyuncuyu kaybettin 💔");
    } else {
      addNews("me",`${p.name} ikna olmadı`,`"Biraz daha düşünelim" dediler. ${p.meetCooldown} hafta sonra tekrar dene.`,"bad");
      toast("İkna edemedin 😞");
    }
  }
  save(); closeSheet(); renderAll();
}

 moral:[["destek","Destekle ve dinle","Moral +, güvenli","low"],["durust","Dürüst konuş: performans şart","Moral ↑↑ veya ↓ — karaktere bağlı","mid"]],

function givePromiseSilent(p,type){
  const def=PROMISE_TYPES.find(x=>x.id===type); if(!def) return;
  if((p.promises||[]).some(x=>x.status==="open"&&x.type===type)) return;
  let dw=S.week+def.weeks, ds=S.season;
  while(dw>BAL.weeksPerSeason){ dw-=BAL.weeksPerSeason; ds++; }
  (p.promises=p.promises||[]).push({id:"pr"+ri(1e4,9e4),type,createdSeason:S.season,createdWeek:S.week,deadlineSeason:ds,deadlineWeek:dw,status:"open",baseClub:p.clubId,basePrestige:S.world.clubs[p.clubId]?.prestige||0});
  p.loyalty=clamp(p.loyalty+6,5,99);
}
function resolveMeeting(pid,topic,app){
  if(typeof emitGameEvent==="function") emitGameEvent("PLAYER_MEETING_COMPLETED",{pid});
  const p=S.world.players[pid]; if(!p) return;
  let base=clamp(45+p.loyalty*0.3+((p.famTrust??40)-40)*0.2,10,90);
  if(p.char==="ego"&&(app==="durust"||app==="hedef")) base-=15;
  if(p.char==="kirilgan"&&app==="durust") base-=18;
  if(p.char==="prof") base+=8;
  if(focusOn("iliski")) base+=6;
  const ok=rnd()*100<base;
  let msg="";
  if(topic==="moral"){ if(ok){p.morale=clamp(p.morale+(app==="durust"?14:9),5,99); p.loyalty=clamp(p.loyalty+4,5,99); msg="Moral toparlandı 💪";}
    else {p.morale=clamp(p.morale-(app==="durust"?6:2),5,99); msg="Görüşme soğuk geçti 😕";} }
  else if(topic==="sure"){ if(app==="soz"){ givePromiseSilent(p,"minutes"); msg="Süre sözü verildi — takibe girdi 🤙"; }
    else if(ok){p.morale=clamp(p.morale+7,5,99); msg="Sabır telkini işe yaradı";} else msg="İkna olmadı — süre istiyor"; }
  else if(topic==="rakip"){ if(app==="yenile"){ if(ok){p.agentWeeksLeft=ri(120,170); p.rivalId=null; p.loyalty=clamp(p.loyalty+12,5,99); msg="Sözleşme yenilendi, rakip devre dışı 🤝";} else {p.loyalty=clamp(p.loyalty-4,5,99); msg="Yenilemeye yanaşmadı ⚠️";} }
    else { if(ok){p.loyalty=clamp(p.loyalty+8,5,99); if(rnd()<0.5)p.rivalId=null; msg="Güven tazelendi ✊";} else msg="Kafası hâlâ karışık";} }
  else if(topic==="aile"){ const cost=app==="plan"?3000:0;
    if(cost&&S.cash<cost){toast("Yetersiz bakiye 💸");return;}
    if(cost) ledger("Aile eğitim planı — "+p.name,-cost);
    if(ok){p.famTrust=clamp((p.famTrust??40)+(app==="plan"?14:8),0,99); p.loyalty=clamp(p.loyalty+5,5,99); msg="Aile memnun 🏡";}
    else {p.famTrust=clamp((p.famTrust??40)+2,0,99); msg="Aile temkinli yaklaştı";} }
  else if(topic==="transfer"){ if(app==="soz"){ givePromiseSilent(p,"transfer_up"); msg="Transfer sözü verildi — büyük söz 🤙"; }
    else if(ok){p.morale=clamp(p.morale+6,5,99); msg="Beklenti yönetildi";} else {p.morale=clamp(p.morale-3,5,99); msg="Transfer istiyor, sabrı azalıyor";} }
  else { if(ok){p.morale=clamp(p.morale+6,5,99); p.form=clamp(p.form+2,5,99); msg="Motivasyon tavan 🚀";} else msg="Sözlerin havada kaldı"; }
  (p.careerEvents=p.careerEvents||[]).push({s:S.season,w:S.week,t:"Görüşme",d:msg});
  if(p.careerEvents.length>20)p.careerEvents.shift();
  toast(msg, ok?"green":"");
  save(); closeSheet(); openPlayer(pid);
}

function runMeetingSimulation(n){

  try{
    for(let i=0;i<n;i++){
      const mp=myPlayers(); if(!mp.length) break;
      const p=pick(mp);
      const topics=meetingTopics(p);
      const tid=pick(topics)[0];
      const apps=MEET_APPROACHES[tid]||MEET_APPROACHES.motivasyon;
      p.meetCd=0; S.managerAttention={max:4,used:0};
      try{ resolveMeeting(p.id,tid,pick(apps)[0]); }catch(e){ errs++; console.error(e); break; }
      if([p.morale,p.loyalty,p.famTrust??40].some(v=>typeof v!=="number"||Number.isNaN(v))){ errs++; break; }
    }
  }catch(e){ errs++; console.error(e); }
  S=JSON.parse(snap); S.decisions=[]; renderAll();
  toast(errs?`Görüşme sim: ${errs} hata ⚠️`:`Görüşme sim (${n}) hatasız ✅`, errs?"":"green");

}

function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

let _ichartSeq=0; const _ichartReg=new Map();
/* series: [{label,color,points:[{y,ev?}]}, ...] veya sayı dizisi; options:{label,fmt,h,w,fmt2,xfmt} */
function interactiveChart(series, options){
  options=options||{};
  const key="ic"+(_ichartSeq++);
  _ichartReg.set(key,{series,options});
  const h=options.h||124;
  return `<div class="ichart" data-ic="${key}" style="height:${h}px" tabindex="0" role="img" aria-label="${escapeHtml(options.label||'grafik')}"><div class="ic-live" aria-live="polite"></div></div>`;
}
function _chartTipEl(){
  let t=document.getElementById("chartTip");
  if(!t){ t=document.createElement("div"); t.id="chartTip"; t.className="chart-tip"; t.style.display="none"; document.body.appendChild(t); }
  return t;
}
function mountCharts(){
  const els=document.querySelectorAll('.ichart[data-ic]');
  els.forEach(el=>{
    const key=el.getAttribute('data-ic'); if(!key) return;
    const cfg=_ichartReg.get(key); _ichartReg.delete(key); el.removeAttribute('data-ic');
    try{ buildInteractiveChart(el, cfg?cfg.series:[], cfg?cfg.options:{}); }catch(e){ el.innerHTML='<div class="empty">grafik yüklenemedi</div>'; }
  });
  if(_ichartReg.size>200) _ichartReg.clear();
}
function _normSeries(series){
  // sayı dizisini seriye çevir
  if(Array.isArray(series)&&series.length&&typeof series[0]==="number")
    series=[{label:"",color:"#4A7FB5",points:series.map(y=>({y}))}];
  return (series||[]).map(s=>({label:s.label||"",color:s.color||"#4A7FB5",points:(s.points||[]).map(p=>typeof p==="number"?{y:p}:p)}));
}
function buildInteractiveChart(el, series, options){
  options=options||{}; series=_normSeries(series);
  const prim=series[0]; const pts=prim?prim.points:[];
  const valid=pts.filter(p=>p&&p.y!=null&&isFinite(p.y));
  if(valid.length<2){ el.innerHTML='<div class="empty">Henüz yeterli veri yok — haftalar ilerledikçe grafik oluşur.</div>'; return; }
  const dual=!!options.dualAxis && series.length>=2;
  const W=options.w||320, H=options.h||124, PL=26, PR=dual?26:8, PT=10, PB=16;
  const fmt=options.fmt||(v=>Math.round(v));
  const fmt2=options.fmt2||fmt;
  const axisOf=(s,si)=> (dual && (s.axis==="right" || (si===1 && !s.axis))) ? "right":"left";
  function scaleFor(axis){ const ys=[]; series.forEach((s,si)=>{ if(axisOf(s,si)===axis) s.points.forEach(p=>{ if(p&&p.y!=null&&isFinite(p.y))ys.push(p.y); }); });
    if(!ys.length) return {min:0,max:1}; let mn=Math.min(...ys),mx=Math.max(...ys); if(mn===mx){mn-=1;mx+=1;} return {min:mn,max:mx}; }
  const scL=(options.min!=null||options.max!=null)?{min:options.min??Math.min(...series[0].points.filter(p=>p&&p.y!=null).map(p=>p.y)),max:options.max??Math.max(...series[0].points.filter(p=>p&&p.y!=null).map(p=>p.y))}:scaleFor("left");
  const scR=dual?scaleFor("right"):scL;
  let min=scL.min, max=scL.max;
  const n=pts.length;
  const X=i=> PL + (i*(W-PL-PR)/Math.max(1,n-1));
  const Y=(v,axis)=>{ const sc=(axis==="right")?scR:scL; return H-PB - ((v-sc.min)/(sc.max-sc.min))*(H-PT-PB); };
  const uid="g"+Math.random().toString(36).slice(2,8);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none" style="display:block;overflow:visible">`;
  // grid + sol y ekseni etiketleri (+ dual ise sağ eksen)
  const rcol=dual?(series.find((s,si)=>axisOf(s,si)==="right")||{}).color||"#B08A2E":null;
  [0,0.5,1].forEach(g=>{ const yy=PT+(H-PT-PB)*g; const valL=scL.max-(scL.max-scL.min)*g;
    svg+=`<line x1="${PL}" x2="${W-PR}" y1="${yy.toFixed(1)}" y2="${yy.toFixed(1)}" stroke="#E8E5DE" stroke-width="0.8" stroke-dasharray="3 4"/>`;
    svg+=`<text x="2" y="${(yy+3).toFixed(1)}" font-size="8" fill="#93A0B8" font-family="Manrope,system-ui">${escapeHtml(fmt(valL))}</text>`;
    if(dual){ const valR=scR.max-(scR.max-scR.min)*g; svg+=`<text x="${W-PR+2}" y="${(yy+3).toFixed(1)}" font-size="8" fill="${rcol}" font-family="Manrope,system-ui">${escapeHtml(fmt2(valR))}</text>`; } });
  // seriler
  series.forEach((s,si)=>{ const ax=axisOf(s,si);
    const sp=s.points; let d=""; let started=false;
    for(let i=0;i<sp.length;i++){ const p=sp[i]; if(!p||p.y==null||!isFinite(p.y)) continue;
      d+=(started?"L":"M")+X(i).toFixed(1)+" "+Y(p.y,ax).toFixed(1)+" "; started=true; }
    if(si===0){ const area=d+`L${X(n-1).toFixed(1)} ${(H-PB).toFixed(1)} L${X(0).toFixed(1)} ${(H-PB).toFixed(1)} Z`;
      svg+=`<path d="${area}" fill="${s.color}" opacity="0.10"/>`; }
    svg+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="${si===0?2.2:1.6}" stroke-linecap="round" stroke-linejoin="round" ${ax==="right"?'stroke-dasharray="4 3"':''}/>`;
  });
  // crosshair + focus dots
  svg+=`<line class="ic-cross" x1="0" x2="0" y1="${PT}" y2="${H-PB}" stroke="#1B2A4A" stroke-width="1" stroke-dasharray="2 3" opacity="0"/>`;
  series.forEach((s,si)=> svg+=`<circle class="ic-dot ic-dot-${si}" r="3.6" fill="${s.color}" stroke="#fff" stroke-width="1.5" opacity="0"/>`);
  svg+=`</svg>`;
  el.innerHTML=svg+(el.querySelector('.ic-live')?'':'<div class="ic-live" aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)"></div>');
  const live=el.querySelector('.ic-live')||(()=>{ const d=document.createElement('div'); d.className='ic-live'; el.appendChild(d); return d; })();
  const svgEl=el.querySelector('svg');
  const cross=el.querySelector('.ic-cross');
  const dots=[...el.querySelectorAll('.ic-dot')];
  let active=-1, pinned=false;
  function rectRatio(){ const r=el.getBoundingClientRect(); return {r, sx:r.width/W, sy:r.height/H}; }
  function idxFromClientX(cx){ const {r}=rectRatio(); const rel=(cx-r.left)/r.width*W; let best=0,bd=1e9;
    for(let i=0;i<n;i++){ const dx=Math.abs(X(i)-rel); if(dx<bd){bd=dx;best=i;} } return best; }
  function show(i){
    if(i<0||i>=n){ hide(); return; }
    active=i;
    const {r,sx,sy}=rectRatio();
    const cx=X(i)*sx, defaultY=(prim.points[i]&&prim.points[i].y!=null)?Y(prim.points[i].y,"left"):PT;
    cross.setAttribute("x1",X(i)); cross.setAttribute("x2",X(i)); cross.setAttribute("opacity","1");
    series.forEach((s,si)=>{ const p=s.points[i]; const dot=dots[si]; if(!dot) return;
      if(p&&p.y!=null&&isFinite(p.y)){ dot.setAttribute("cx",X(i)); dot.setAttribute("cy",Y(p.y,axisOf(s,si))); dot.setAttribute("opacity","1"); }
      else dot.setAttribute("opacity","0"); });
    // tooltip
    const tip=_chartTipEl();
    const p0=prim.points[i]; const prev=i>0?prim.points[i-1]:null;
    let head="";
    if(p0&&p0.s!=null&&p0.w!=null) head=`Sezon ${p0.s} · Hafta ${p0.w}`;
    else if(options.xlabels&&options.xlabels[i]!=null) head=escapeHtml(options.xlabels[i]);
    else head=`Nokta ${i+1}`;
    let body=`<div class="ct-h">${head}</div>`;
    series.forEach(s=>{ const p=s.points[i]; if(!p||p.y==null||!isFinite(p.y)) return;
      const f=s===prim?fmt:(options.fmt2||fmt);
      body+=`<div class="ct-row"><span class="ct-dot" style="background:${s.color}"></span><span>${escapeHtml(s.label||"değer")}</span><b>${escapeHtml(f(p.y))}</b></div>`; });
    if(p0&&prev&&prev.y!=null&&isFinite(prev.y)&&p0.y!=null){ const d=p0.y-prev.y; const base=Math.abs(prev.y)>1e-9?Math.abs(prev.y):1;
      const pct=Math.round(d/base*100);
      body+=`<div class="ct-delta ${d>=0?'up':'down'}">${d>=0?"▲":"▼"} ${escapeHtml(fmt(Math.abs(d)))} (%${Math.abs(pct)})</div>`; }
    if(p0&&p0.ev) body+=`<div class="ct-ev">📌 ${escapeHtml(p0.ev)}</div>`;
    tip.innerHTML=body; tip.style.display="block";
    // konumlandırma (ekrandan taşmasın)
    const tw=tip.offsetWidth, th=tip.offsetHeight;
    let left=r.left+cx-tw/2; let top=r.top+defaultY*sy-th-12;
    if(top<6) top=r.top+defaultY*sy+14;
    left=clamp(left,6,window.innerWidth-tw-6);
    top=clamp(top,6,window.innerHeight-th-6);
    tip.style.left=left+"px"; tip.style.top=top+"px";
    if(live) live.textContent=`${head}, ${series.map(s=>{const p=s.points[i]; return p&&p.y!=null?((s.label||"değer")+" "+fmt(p.y)):"";}).filter(Boolean).join(", ")}`;
  }
  function hide(){ active=-1; if(cross)cross.setAttribute("opacity","0"); dots.forEach(d=>d.setAttribute("opacity","0"));
    const tip=document.getElementById("chartTip"); if(tip) tip.style.display="none"; }
  el.addEventListener("pointermove",e=>{ if(pinned&&e.pointerType==="touch") return; show(idxFromClientX(e.clientX)); });
  el.addEventListener("pointerdown",e=>{ if(e.pointerType==="touch"){ pinned=true; show(idxFromClientX(e.clientX)); } });
  el.addEventListener("pointerleave",e=>{ if(!pinned) hide(); });
  el.addEventListener("pointerup",e=>{ if(e.pointerType!=="touch"&&!pinned) {} });
  el.addEventListener("keydown",e=>{
    let i=active<0?(n-1):active;
    if(e.key==="ArrowLeft"){ i=Math.max(0,i-1); show(i); e.preventDefault(); }
    else if(e.key==="ArrowRight"){ i=Math.min(n-1,i+1); show(i); e.preventDefault(); }
    else if(e.key==="Home"){ show(0); e.preventDefault(); }
    else if(e.key==="End"){ show(n-1); e.preventDefault(); }
    else if(e.key==="Escape"){ hide(); el.blur&&el.blur(); }
  });
  el.addEventListener("blur",()=>{ if(!pinned) hide(); });
  // grafik dışına dokununca sabit tooltip'i kapat
  if(!window._chartTapClose){ window._chartTapClose=true;
    document.addEventListener("pointerdown",e=>{ if(!e.target.closest||!e.target.closest(".ichart")){ const t=document.getElementById("chartTip"); if(t)t.style.display="none"; } },true); }
}

function makeStaff(role, deptId, q){
  q=q??ri(35,70);
  const lvl=q>=80?4:q>=65?3:q>=48?2:1;
  return { id:"st"+(_staffSeq++)+"_"+ri(100,999), name:pick(STAFF_NAMES_FIRST)+" "+pick(NAMES.tr.last),
    role, departmentId:deptId, level:lvl, quality:clamp(q,10,99),
    specialty:role, salary: 170+q*5+lvl*70, morale:ri(60,85), loyalty:ri(45,80),
    workload:0, contractEndTick: nowTick()+ri(60,150), fatigue:0,
    performanceHistory:[], traits:[pick(STAFF_TRAITS)] };
}
function initDepartments(st){
  st.departments={}; st.staffDirectory=st.staffDirectory||[];
  for(const d of DEPT_DEFS){
    st.departments[d.id]={ id:d.id, level:1, unlocked:(d.unlockTier<=1), budget:0, weeklyCost:d.weekly,
      staffIds:[], managerId:null, workload:0, efficiency:40, morale:70,
      activeTasks:0, bonuses:{}, risks:[], history:[], valueProduced:0, successCount:0, failCount:0 };
  }
  // başlangıç kadrosu: 1 baş scout, 1 ilişki direktörü
  const s1=makeStaff("Baş Scout","scouting",58); const s2=makeStaff("Oyuncu İlişkileri Direktörü","relations",54);
  st.staffDirectory.push(s1,s2);
  st.departments.scouting.staffIds.push(s1.id); st.departments.scouting.managerId=s1.id;
  st.departments.relations.staffIds.push(s2.id); st.departments.relations.managerId=s2.id;
  recomputeDepartments(st);
}
function deptStaff(st, id){ st=st||S; return (st.staffDirectory||[]).filter(s=>s.departmentId===id); }
function recomputeDepartments(st){
  st=st||S;
  for(const id in st.departments){ const d=st.departments[id]; const staff=deptStaff(st,id);
    d.weeklyCost = Math.round(DEPT_MAP[id].weekly*0.75*(d.unlocked?1:0)) + staff.reduce((s,x)=>s+Math.round(x.salary),0);
    const staffPow = staff.reduce((s,x)=>s+ x.quality*(0.6+x.level*0.12),0);
    const cap = d.level*1.6; // beklenen personel gücü
    const staffScore = clamp(staffPow/Math.max(1,cap*30)*100,0,100);
    const moraleAvg = staff.length? staff.reduce((s,x)=>s+x.morale,0)/staff.length : 55;
    d.morale = clamp(Math.round(moraleAvg),0,100);
    const workloadPenalty = Math.max(0,d.workload-70)*0.5;
    d.efficiency = d.unlocked? clamp(Math.round(18 + d.level*10 + staffScore*0.45 + (d.morale-55)*0.25 - workloadPenalty),0,100) : 0;
  }
}
/* departman verim çarpanı: 0 (kilitli) .. ~1.4 (tam) */
function deptBonus(id){ if(!S||!S.departments||!S.departments[id]||!S.departments[id].unlocked) return 0; return S.departments[id].efficiency/100; }
function deptUnlocked(id){ return !!(S&&S.departments&&S.departments[id]&&S.departments[id].unlocked); }
function deptWorkloadFor(id){
  // portföy + aktif görev bazlı iş yükü
  const mp=myPlayers().length; const tasks=(S.departmentTasks||[]).filter(t=>t.deptId===id&&t.status==="active").length;
  const staff=deptStaff(S,id).length||1;
  const base={scouting:mp*3+ (S.scouts.length*6), relations:mp*6, legal:S.offers.length*10+ (S.negotiationSessions?Object.keys(S.negotiationSessions).length*6:0),
    transferOps:S.offers.length*12, media:mp*4, sponsor:(S.sponsorDeals.length+ (S.sponsorPipeline||[]).length)*8,
    finance:12+ (S.bankLoans||[]).length*10, performance:mp*5, international:mp*3, academy:mp*4}[id]||mp*4;
  return clamp(Math.round((base + tasks*18)/staff),0,100);
}
function simDepartments(sum){
  recomputeDepartments(S);
  let totalCost=0;
  for(const id in S.departments){ const d=S.departments[id]; if(!d.unlocked) continue;
    d.workload=deptWorkloadFor(id);
    // moral: aşırı yük moral düşürür, rahat yük toparlar
    const staff=deptStaff(S,id);
    for(const s of staff){ s.workload=d.workload;
      if(d.workload>90){ s.morale=clamp(s.morale-ri(1,3),10,100); s.fatigue=clamp(s.fatigue+2,0,100); }
      else if(d.workload<45){ s.morale=clamp(s.morale+1,10,100); s.fatigue=clamp(s.fatigue-2,0,100); }
      // ayrılma riski
      if(s.morale<28 && rnd()<0.04){ addNews("me",`Personel ayrıldı: ${s.name}`,`${DEPT_MAP[id].name} departmanından ${s.role} ${s.name} aşırı iş yükü nedeniyle istifa etti.`,"bad");
        notify("ajans",`${s.name} istifa etti`,"agency","departman");
        d.staffIds=d.staffIds.filter(x=>x!==s.id); if(d.managerId===s.id)d.managerId=d.staffIds[0]||null;
        S.staffDirectory=S.staffDirectory.filter(x=>x.id!==s.id); }
    }
    totalCost+=d.weeklyCost;
    // haftalık geçmiş
    d.history.push({t:nowTick(), eff:d.efficiency, wl:d.workload, cost:d.weeklyCost, val:Math.round(d.valueProduced)});
    if(d.history.length>13) d.history=d.history.slice(-13);
    d.valueProduced*=0.9;
  }
  // Finans departmanı genel departman giderini kısar
  if(totalCost>0){ const fin=deptBonus("finance"); totalCost=Math.round(totalCost*(1-fin*0.15));
    ledger("Departman giderleri", -totalCost); }
  recomputeDepartments(S);
  processDepartmentTasks(sum);
}
function processDepartmentTasks(sum){
  const t=nowTick();
  for(const task of (S.departmentTasks||[])){
    if(task.status!=="active") continue;
    if(task.dueTick>t) continue;
    const d=S.departments[task.deptId];
    const eff=d?d.efficiency:30;
    // aşırı yük hata riskini artırır
    const wlPen=Math.max(0,(d?d.workload:0)-85)*0.004;
    const succ=clamp(task.baseSucc + eff/250 - wlPen, 0.15, 0.96);
    if(rnd()<succ){ task.status="done"; if(d){d.successCount++; d.valueProduced+=task.value||0;}
      applyDeptTaskResult(task,true); }
    else { task.status="failed"; if(d)d.failCount++; applyDeptTaskResult(task,false); }
  }
  S.departmentTasks=(S.departmentTasks||[]).filter(x=> x.status==="active" || (t-x.dueTick)<6);
}
function applyDeptTaskResult(task, ok){
  const label=task.title;
  if(task.kind==="second-look"){
    const rep=S.reports.find(r=>r.pid===task.pid);
    if(ok&&rep){ rep.reliability=clamp((rep.reliability||55)+ri(12,22),10,99); rep.confirmed=true;
      addNews("me",`İkinci gözlem tamam: ${label}`,`Scout ekibi raporu doğruladı, güven aralığı daraldı.`,"good"); }
    else addNews("me",`İkinci gözlem sonuçsuz`,`${label} için ek rapor beklenen netliği vermedi.`,"");
  } else if(task.kind==="renewal"){
    const p=S.world.players[task.pid];
    if(ok&&p){ p.agentWeeksLeft=clamp((p.agentWeeksLeft||0)+ri(40,80),0,220); p.loyalty=clamp(p.loyalty+6,0,100);
      addNews("me",`Temsil yenilendi: ${p.name}`,`Hukuk ekibi temsil sözleşmesini uzattı.`,"good"); }
    else if(p) addNews("me",`Yenileme gecikti: ${p.name}`,`Temsil görüşmesi bu tur sonuç vermedi.`,"");
  } else if(task.kind==="sponsor-filter"){
    if(ok){ S.sponsorNetwork=clamp((S.sponsorNetwork||0)+2,0,100); addNews("me","Sponsor teklifleri elendi","Pazarlama ekibi zayıf teklifleri ayıkladı, ağ güçlendi."); }
  } else if(task.kind==="scout-region"){
    if(ok){ const rep=makeScoutReportForRegion(task.leagueId); if(rep){ addNews("me",`Bölge taraması: yeni hedef`,`${DEPT_MAP.scouting.name} ekibi ${rep._name} adını rapora ekledi.`,"good"); } }
  }
  notify("ajans",`${ok?"✅":"⚠️"} Görev: ${task.title}`,"agency","departman");
}
function makeScoutReportForRegion(leagueId){
  const L=S.world.leagues.find(l=>l.id===leagueId)|| S.world.leagues[1];
  if(!L) return null;
  const cands=Object.values(S.world.players).filter(p=>!p.discovered && p.clubId && S.world.clubs[p.clubId] && S.world.clubs[p.clubId].leagueId===L.id);
  const p=cands.length?pick(cands):null; if(!p) return null;
  p.discovered=true;
  const rep={id:"r"+ri(1e4,9e4), pid:p.id, week:S.week, season:S.season, opened:false,
    reliability: clamp(50+ri(-10,20),20,95), lo:clamp(p.pa-ri(6,14),20,99), hi:clamp(p.pa+ri(2,8),20,99), confirmed:false, _name:p.name};
  S.reports.unshift(rep); S.reports=S.reports.slice(0,30);
  return rep;
}
/* departman görevi oluştur (delegasyon) */
function createDeptTask(kind, deptId, opts){
  opts=opts||{};
  const d=S.departments[deptId]; if(!d||!d.unlocked){ toast("Bu departman kilitli"); return; }
  const dur=opts.dur||ri(2,4);
  const task={ id:"dt"+ri(1e4,9e4), kind, deptId, title:opts.title||kind, pid:opts.pid||null, leagueId:opts.leagueId||null,
    createdTick:nowTick(), dueTick:nowTick()+dur, baseSucc:opts.baseSucc??0.55, value:opts.value||6,
    status:"active", attentionSaved:opts.attentionSaved||1, cost:opts.cost||0 };
  S.departmentTasks=S.departmentTasks||[]; S.departmentTasks.push(task);
  d.activeTasks=(S.departmentTasks||[]).filter(t=>t.deptId===deptId&&t.status==="active").length;
  if(task.cost) ledger("Departman görev bütçesi", -task.cost);
  toast(`Görev ${DEPT_MAP[deptId].icon} ${DEPT_MAP[deptId].name} ekibine verildi`,"green");
  recomputeDepartments(S); save(); renderAll();
}
function unlockDepartment(id){
  const def=DEPT_MAP[id]; const d=S.departments[id]; if(!def||!d||d.unlocked) return;
  if(calculateAgencyTier().lv<def.unlockTier){ toast(`${TIERS[def.unlockTier-1].name} seviyesi gerekli`); return; }
  if(S.cash<def.cost){ toast("Yetersiz kasa"); return; }
  ledger("Departman açılışı — "+def.name, -def.cost);
  d.unlocked=true; d.level=1; d.efficiency=35;
  addNews("me",`Yeni departman: ${def.icon} ${def.name}`,`${def.desc}`,"good");
  notify("ajans",`Departman açıldı: ${def.name}`,"agency","departman");
  toast(`${def.icon} ${def.name} açıldı!`,"gold");
  recomputeDepartments(S); save(); renderAll();
}
function upgradeDepartment(id){
  const d=S.departments[id]; const def=DEPT_MAP[id]; if(!d||!d.unlocked) return;
  if(d.level>=5){ toast("Departman maks seviyede"); return; }
  const cost=Math.round((def.cost||14000)*0.6*(d.level+1) + 8000*d.level);
  if(S.cash<cost){ toast(`Yükseltme: ${fmtM(cost)} gerekli`); return; }
  if(deptStaff(S,id).length < d.level){ toast("Önce yeterli personel al (seviye kadar personel gerekir)"); return; }
  ledger("Departman yükseltme — "+def.name, -cost);
  d.level++;
  addNews("me",`${def.icon} ${def.name} → Seviye ${d.level}`,`Departman kapasitesi ve verimliliği arttı.`,"good");
  toast(`${def.name} seviye ${d.level} ✅`,"gold");
  recomputeDepartments(S); save(); renderAll();
}
function hireDeptStaff(id){
  const d=S.departments[id]; const def=DEPT_MAP[id]; if(!d||!d.unlocked) return;
  const cap=BAL.officeLevels[S.officeLevel].scoutCap+ d.level+1;
  if(deptStaff(S,id).length>=cap+1){ toast("Departman personel kapasitesi dolu"); return; }
  const cands=[0,1,2].map(()=>{ const q=ri(38,72)+d.level*4; return makeStaff(pick(def.roles),id,clamp(q,20,95)); });
  window._staffCands={deptId:id,list:cands};
  let h=`<div class="grab"></div><div style="text-align:center"><div class="tiny">PERSONEL ADAYLARI</div>
    <div class="b" style="font-family:'Fraunces',serif;font-size:18px">${def.icon} ${def.name}</div></div>`;
  cands.forEach((s,i)=>{ h+=`<button class="opt" onclick="doHireStaff(${i})">
    <div class="ot">${s.name} <span class="tiny">· ${s.role}</span></div>
    <div class="oh">Kalite ${s.quality} · Sv ${s.level} · Maaş ${fmtM(s.salary)}/hf · ${s.traits.join(", ")}</div></button>`; });
  openSheet(h);
}
function doHireStaff(i){
  const ctx=window._staffCands; if(!ctx) return; const s=ctx.list[i]; const d=S.departments[ctx.deptId]; if(!s||!d) return;
  S.staffDirectory.push(s); d.staffIds.push(s.id); if(!d.managerId)d.managerId=s.id;
  recomputeDepartments(S);
  toast(`${s.name} kadroda 🤝`,"green"); save(); closeSheet(); renderAll();
}
function fireDeptStaff(sid){
  const s=(S.staffDirectory||[]).find(x=>x.id===sid); if(!s) return;
  const d=S.departments[s.departmentId];
  if(d){ d.staffIds=d.staffIds.filter(x=>x!==sid); if(d.managerId===sid)d.managerId=d.staffIds[0]||null; }
  S.staffDirectory=S.staffDirectory.filter(x=>x.id!==sid);
  recomputeDepartments(S); toast(`${s.name} ile yollar ayrıldı`); save(); renderAll();
}

const RIVAL_STRATEGIES=[
 {id:"genc", label:"Genç Yetenek Avcısı", targetAge:[15,20], comm:0.06, risk:0.6, ethics:70},
 {id:"yildiz", label:"Yıldız Toplayıcı", targetAge:[23,30], comm:0.10, risk:0.5, ethics:55},
 {id:"para", label:"Para Odaklı", targetAge:[20,29], comm:0.14, risk:0.7, ethics:35},
 {id:"kulup", label:"Kulüp Bağlantıcısı", targetAge:[19,28], comm:0.08, risk:0.4, ethics:60},
 {id:"etik", label:"Etik Kariyer Planlayıcısı", targetAge:[17,24], comm:0.07, risk:0.3, ethics:85},
 {id:"medya", label:"Medya Odaklı", targetAge:[20,27], comm:0.10, risk:0.6, ethics:50},
 {id:"bolge", label:"Bölgesel Uzman", targetAge:[18,26], comm:0.08, risk:0.45, ethics:60},
 {id:"agresif", label:"Agresif Oyuncu Kapıcı", targetAge:[18,29], comm:0.11, risk:0.9, ethics:25},
 {id:"dusuk", label:"Düşük Komisyon Stratejisi", targetAge:[18,28], comm:0.05, risk:0.4, ethics:65},
 {id:"global", label:"Global Süper Ajans", targetAge:[19,30], comm:0.10, risk:0.6, ethics:55},
];
function initRivalAgencies(st){
  st=st||S; st.rivalAgencies=[]; st.rivalDiplomacy={};
  const seeds=[
    {base:RIVALS[0], strat:"para", tier:2, cash:400000, office:1, region:"tr1"},
    {base:RIVALS[1], strat:"genc", tier:2, cash:300000, office:1, region:"tr2"},
    {base:RIVALS[2], strat:"bolge", tier:1, cash:180000, office:0, region:"tr2"},
    {base:RIVALS[3], strat:"medya", tier:3, cash:900000, office:2, region:"en1"},
    {base:RIVALS[4], strat:"global", tier:5, cash:4200000, office:3, region:"en1"},
    {base:{id:"lena",name:"Lena Fischer"}, strat:"etik", tier:3, cash:750000, office:2, region:"nl1"},
    {base:{id:"paulo",name:"Paulo Mendes"}, strat:"yildiz", tier:4, cash:2100000, office:2, region:"en1"},
  ];
  for(const sd of seeds){
    const strat=RIVAL_STRATEGIES.find(x=>x.id===sd.strat)||RIVAL_STRATEGIES[0];
    const rv={ id:"ra_"+sd.base.id, name:sd.base.name+" Ajansı", ownerName:sd.base.name, baseId:sd.base.id,
      tier:sd.tier, power:clamp(sd.tier*14+ri(-6,8),10,95), cash:sd.cash,
      reputationProfile:{player:ri(40,70),club:ri(40,70),media:strat.id==="medya"?75:ri(35,65),ethical:strat.ethics},
      status:"aktif", officeLevel:sd.office, playerIds:[], scoutIds:[], staffCount:sd.tier+ri(0,3),
      regionPresence:{[sd.region]: 60+ri(0,25)}, clubRelations:ri(30,60), sponsorDeals:ri(0,sd.tier),
      strategy:strat.id, riskTolerance:strat.risk, ethics:strat.ethics,
      weeklyIncome:0, weeklyExpense: 2000+sd.tier*1500, history:[], powerTrend:[], valueTrend:[],
      relationWithPlayerAgency:0, targetPlayerIds:[] };
    st.rivalAgencies.push(rv);
    st.rivalDiplomacy[rv.id]=0;
  }
  // portföy dağıt: keşfedilmiş, sahipsiz oyunculardan
  const pool=Object.values(st.world.players).filter(p=>!p.agent && p.discovered);
  for(const rv of st.rivalAgencies){
    const strat=RIVAL_STRATEGIES.find(x=>x.id===rv.strategy);
    const want=clamp(rv.tier+ri(1,3),2,7);
    const cands=pool.filter(p=>!p.agent && p.age>=strat.targetAge[0]-2 && p.age<=strat.targetAge[1]+3).sort((a,b)=>b.pa-a.pa);
    for(const p of cands.slice(0,want)){ if(p.agent) continue; assignPlayerToRival(st,p,rv); }
  }
  recomputeRivalValues(st);
}
function assignPlayerToRival(st, p, rv){
  if(p.agent) return false; // çift temsil engeli
  p.agent="rival"; p.rivalAgencyId=rv.id; p.rivalId=rv.baseId; p.agentWeeksLeft=ri(60,160);
  if(!rv.playerIds.includes(p.id)) rv.playerIds.push(p.id);
  return true;
}
function releasePlayerFromRival(st, p){
  if(p.rivalAgencyId){ const rv=(st.rivalAgencies||[]).find(r=>r.id===p.rivalAgencyId); if(rv) rv.playerIds=rv.playerIds.filter(id=>id!==p.id); }
  p.rivalAgencyId=null;
}
function recomputeRivalValues(st){
  st=st||S;
  for(const rv of (st.rivalAgencies||[])){
    let val=0; rv.playerIds=rv.playerIds.filter(id=>{ const p=st.world.players[id]; return p&&p.agent==="rival"&&p.rivalAgencyId===rv.id; });
    for(const id of rv.playerIds){ const p=st.world.players[id]; if(p) val+= (p.value||0); }
    rv.portfolioValue=val;
  }
}
function rivalById(id){ return (S.rivalAgencies||[]).find(r=>r.id===id); }
function simRivalAgencies(sum){
  if(!S.rivalAgencies||!S.rivalAgencies.length) return;
  const diffM=DIFF().rival;
  recomputeRivalValues(S);
  for(const rv of S.rivalAgencies){
    if(rv.status==="çekildi") continue;
    const strat=RIVAL_STRATEGIES.find(x=>x.id===rv.strategy)||RIVAL_STRATEGIES[0];
    // finans: portföyden tahmini komisyon + gider
    rv.weeklyIncome=Math.round((rv.portfolioValue||0)*0.0006*strat.comm*10 + rv.tier*400);
    rv.cash += rv.weeklyIncome - rv.weeklyExpense;
    // scout & imza (sahipsiz keşfedilmiş oyuncu kap) — portföy tavanına kadar
    const portCap=rv.tier*3+4;
    if(rv.playerIds.length<portCap && rnd()<0.07*diffM*(0.6+rv.riskTolerance*0.6)){
      const pool=Object.values(S.world.players).filter(p=>!p.agent && p.discovered && p.age>=strat.targetAge[0]-2 && p.age<=strat.targetAge[1]+4);
      if(pool.length){ const p=pool.sort((a,b)=>b.pa-a.pa)[ri(0,Math.min(4,pool.length-1))];
        if(p&&!p.agent && rv.cash>50000){ assignPlayerToRival(S,p,rv); rv.cash-=ri(2000,8000);
          rlog(rv.baseId,`${p.name} ile temsil imzaladı`); } }
    }
    // churn: ara sıra oyuncu ayrılır (dünya likit kalsın)
    if(rv.playerIds.length>2 && rnd()<0.015){ const p=S.world.players[pick(rv.playerIds)];
      if(p){ p.agent=null; releasePlayerFromRival(S,p); rlog(rv.baseId,`${p.name} ile yollar ayrıldı`); } }
    // transfer yap (portföyden) — komisyon kazan
    if(inWindow(S.week) && rv.playerIds.length && rnd()<0.14*diffM){
      const pid=pick(rv.playerIds); const p=S.world.players[pid];
      if(p){ const fee=Math.round((p.value||1e5)*(0.9+rnd()*0.5)/1000)*1000; const comm=Math.round(fee*strat.comm);
        rv.cash+=comm; rv.power=clamp(rv.power+Math.min(1,fee/6e6),0,96); rv.portfolioValue=(rv.portfolioValue||0);
        // yeni kulüp
        const clubs=Object.values(S.world.clubs); const to=pick(clubs); if(to)p.clubId=to.id;
        p.value=Math.round(p.value*(1+rnd()*0.15));
        rv.history.push({t:nowTick(),txt:`${p.name} transferinden ${fmtM(comm)} komisyon`});
        if(fee>4e6){ addNews("",`${rv.ownerName} büyük vurgun 💼`,`${rv.name}, ${p.name} transferini ${fmtM(fee)} bandında bitirdi. Piyasadaki gücü arttı.`,"");
          rv.reputationProfile.media=clamp(rv.reputationProfile.media+2,0,100); } }
    }
    // diplomasi ilişkisi kapma davranışını belirler
    const dip=S.rivalDiplomacy[rv.id]||0;
    const dipPoachM = dip>40?0.25 : dip>0?0.7 : dip<-40?2.0 : dip<0?1.3 : 1;
    // benim oyuncularımı kapma (nadir; düşman rakip daha agresif, dost rakip dokunmaz)
    if(rnd()<0.02*diffM*(0.5+rv.riskTolerance)*dipPoachM){
      const weak=myPlayers().filter(p=>p.loyalty<42 && (p.agentWeeksLeft||0)<40);
      if(weak.length){ const p=pick(weak);
        if(!p.rivalId) p.rivalId=rv.baseId; p.rivalAgencyId=p.rivalAgencyId||null;
        rlog(rv.baseId,`${p.name} ile temsil için görüşüyor`);
        notify("oyuncu",`${rv.ownerName}, ${p.name}'e yanaşıyor`,"players");
        addNews("me",`Rakip tehdidi: ${p.name} 🦈`,`${rv.name} oyuncuna temsil teklif ediyor. Sadakatini güçlendir.`,"bad"); }
    }
    // dost/ortak rakip ara sıra ortak transfer geliri getirir
    if(dip>=60 && inWindow(S.week) && rnd()<0.05){ const gain=ri(8000,45000);
      ledger(`Ortak transfer payı — ${rv.ownerName}`, gain); rv.cash-=Math.round(gain*0.4);
      addNews("me",`İş ortağı hamlesi 🤝`,`${rv.name} ile ortak yürütülen transferden ${fmtM(gain)} pay kasaya girdi.`,"good");
      notify("transfer",`${rv.ownerName} ile ortak transfer geliri`,"agency","rakip"); }
    // düşman rakip ara sıra scout hedeflerine yanaşır
    if(dip<=-40 && rnd()<0.06){ const tgt=S.reports.map(r=>S.world.players[r.pid]).filter(p=>p&&!p.agent&&!p.rivalId);
      if(tgt.length){ const p=pick(tgt); p.rivalId=rv.baseId; rlog(rv.baseId,`scout hedefin ${p.name}'e yanaştı`); } }
    // büyüme/gerileme: tier tavanına doğru ortalamaya dönüş (monoton tırmanma yok)
    const tierCeil=[0,42,56,70,82,90,96][rv.tier]||88;
    const target=clamp(rv.tier*12 + Math.min(18,(rv.portfolioValue||0)/1e6*1.1)
        + (rv.cash>rv.weeklyExpense*10? clamp(rv.cash/2e6*4,0,8) : -10), 8, tierCeil);
    rv.power=clamp(rv.power + (target-rv.power)*0.05 + gauss()*0.5, 6, tierCeil);
    if(rv.cash<0 && rnd()<0.05){ rv.status="krizde"; rv.power=clamp(rv.power-2,4,tierCeil);
      if(rnd()<0.15){ rv.tier=Math.max(1,rv.tier-1); rlog(rv.baseId,`finansal kriz — küçüldü`);
        addNews("",`${rv.ownerName} zor durumda`,`${rv.name} finansal sıkıntı yaşıyor, birkaç oyuncusu ayrıldı.`,"");
        // bir oyuncu serbest kalsın
        if(rv.playerIds.length){ const p=S.world.players[pick(rv.playerIds)]; if(p){ p.agent=null; releasePlayerFromRival(S,p); } } } }
    else if(rv.status==="krizde" && rv.cash>rv.weeklyExpense*10){ rv.status="aktif"; }
    // trend kaydı (haftalık, budaanır)
    if(S.week%2===0){ rv.powerTrend.push({y:Math.round(rv.power),s:S.season,w:S.week});
      rv.valueTrend.push({y:Math.round((rv.portfolioValue||0)/1000),s:S.season,w:S.week}); }
  }
  recomputeRivalValues(S);
  pruneRivalHistory(S);
}

function dipLabel(r){ return r<=-60?"Düşman":r<=-20?"Sert rakip":r<20?"Nötr":r<60?"Profesyonel ilişki":"Stratejik ortak"; }
function doRivalDiplomacy(rid, aid){
  const rv=rivalById(rid); const a=RIVAL_DIP_ACTIONS.find(x=>x.id===aid); if(!rv||!a) return;
  let delta=a.effect;
  const backfire=rnd()<a.risk;
  if(backfire){ delta=a.effect>0? -Math.abs(a.effect)*0.6 : a.effect*1.4; toast("Hamle ters tepti 😬"); }
  else toast("Hamle işledi","green");
  S.rivalDiplomacy[rid]=clamp((S.rivalDiplomacy[rid]||0)+delta,-100,100);
  rv.relationWithPlayerAgency=S.rivalDiplomacy[rid];
  if(aid==="ortak"&&!backfire){ ledger("Ortak transfer payı", ri(4000,20000)); }
  if(aid==="scoutbaris"&&!backfire){ /* rakip senin scout hedeflerinden çekilir */
    for(const p of Object.values(S.world.players)) if(p.rivalId===rv.baseId && !p.agent && rnd()<0.5) p.rivalId=null; }
  if(aid==="tehdit"||aid==="sikayet"){ if(rnd()<0.4){ bumpRep("ethical",-2); } }
  rlog(rv.baseId, `${a.label} (${S.player? "":""}ajansınla)`);
  save(); closeSheet(); renderAll();
}

function initRepresentationAgreements(st){
  st=st||S; st.representationAgreements={};
  for(const p of Object.values(st.world.players)){ if(p.agent==="you") st.representationAgreements[p.id]=defaultRepAgreement(p,st); }
}
function defaultRepAgreement(p, st){
  st=st||S; const t=(st.season-1)*BAL.weeksPerSeason+st.week;
  return { pid:p.id, durationWeeks:p.agentWeeksLeft||120, transferCommission:p.agentCommission||0.08,
    wageCommission:0.05, sponsorCommission:0.15, exclusiveTransferRights:true, contractNegotiationRights:true,
    mediaRights:false, terminationClause:true, servicePromises:1, signedTick:t, endTick:t+(p.agentWeeksLeft||120) };
}
function repValid(pid){
  const p=S.world.players[pid]; if(!p||p.agent!=="you") return false;
  const ag=(S.representationAgreements||{})[pid];
  if(!ag){ // eski müşteriler için otomatik oluştur
    S.representationAgreements[pid]=defaultRepAgreement(p); return true; }
  return (p.agentWeeksLeft||0)>0 || ag.endTick>nowTick();
}
/* ---------- offer V6 alanları ---------- */
const SQUAD_ROLES=["Rotasyon","İlk 11 adayı","Kilit oyuncu","Yıldız/lider","Gelişim (genç)"];
const RELEASE_PRESETS=[["Yok",0],["%120",1.2],["%150",1.5],["%200",2.0]];
function ensureOfferV6(o){
  const p=S.world.players[o.pid];
  if(o.pkgOk==null) o.pkgOk=true; // kulüp paketi masaya geldi
  if(!o.contract){
    o.contract={ weeklyWage:o.wage, durationYears:3, signingBonus:o.signBonus||0, annualWageRise:5,
      squadRole: p.age<=20?"Gelişim (genç)":"İlk 11 adayı", playingTimePromise:false,
      releasePct:1.5, releaseClause: Math.round((p.value||1e5)*1.5/1000)*1000,
      loyaltyBonus:0, appearanceBonus:0, goalBonus:0 };
    o.contractOk=false;
  }
  if(!S.negotiationSessions[o.id]) S.negotiationSessions[o.id]=newNegoSession(o);
  return o;
}
function newNegoSession(o){
  const p=S.world.players[o.pid];
  return { oid:o.id, clubConcessionBudget:2.4+rnd()*1.2, playerConcessionBudget:2.0+rnd()*1.0,
    agencyInfluence: clamp(0.4 + S.rep/300 + (repProfile().negotiation-50)/300 + deptBonus("legal")*0.2,0.2,1.4),
    clubPatience:3, playerPatience:4, familyPatience: p.family?3:5, rounds:0, maxRounds:8, history:[], revealed:{} };
}
function playerRedLines(p){
  // kısmen gizli; scout/hukuk/ilişki ile açılır
  const cat=playerCategory(p);
  return {
    minWage: Math.round((p.wage*1.05 + cat.minW*120)/100)*100,
    minSquadRole: p.age<=20?"Gelişim (genç)": (p.char==="ego"||cat.tier>=4)?"Kilit oyuncu":"İlk 11 adayı",
    maxDuration: p.age>=30?2 : p.char==="ego"?3 : 5,
    wantsRelease: (cat.tier>=4 || p.char==="ego" || p.family==="avrupa"),
    releaseMaxPct: p.char==="ego"?1.5 : cat.tier>=5?1.5 : 2.0,
  };
}
function contractDemandLoad(o, session){
  const p=S.world.players[o.pid]; const c=o.contract; const rl=playerRedLines(p);
  let load=0;
  // maaş düşükse oyuncu zorlanır
  if(c.weeklyWage < rl.minWage) load += (rl.minWage-c.weeklyWage)/Math.max(1,rl.minWage)*3;
  // süre çok uzunsa memnuniyet düşer
  if(c.durationYears > rl.maxDuration) load += (c.durationYears-rl.maxDuration)*0.8;
  // squad role düşükse
  const roleRank=SQUAD_ROLES.indexOf(c.squadRole), wantRank=SQUAD_ROLES.indexOf(rl.minSquadRole);
  if(roleRank<wantRank && rl.minSquadRole!=="Gelişim (genç)") load += (wantRank-roleRank)*0.9;
  // release clause: yıldız çıkış yolu ister; düşük clause oyuncuyu memnun eder ama kulübü sıkabilir
  if(rl.wantsRelease && c.releasePct===0) load += 1.2;
  if(rl.wantsRelease && c.releasePct> rl.releaseMaxPct) load += (c.releasePct-rl.releaseMaxPct)*1.5;
  // oynama garantisi memnuniyeti artırır
  if(c.playingTimePromise) load -= 0.6;
  if(c.signingBonus>0) load -= Math.min(0.8, c.signingBonus/Math.max(1,p.value)*4);
  if(c.loyaltyBonus>0) load -= 0.3;
  return load;
}
function clubContractLoad(o){
  // kulüp açısından: yüksek maaş/imza/oynama garantisi/düşük release clause zorlar
  const c=o.contract; const p=S.world.players[o.pid]; const club=S.world.clubs[o.cid];
  const prof=PROFILE_W[club.profile]||{};
  let load=0;
  load += Math.max(0, c.weeklyWage-o.wage)/Math.max(1,o.wage) * (prof.wage??1) * 1.5;
  load += (c.signingBonus/Math.max(1,p.value)) * 2 * (prof.signBonus??1);
  if(c.playingTimePromise) load += 0.8*(prof.playGuar??1);
  if(c.releasePct>0 && c.releasePct<1.5) load += (1.5-c.releasePct)*1.2; // düşük clause kulübü sıkar
  if(c.durationYears<=1) load += 0.6; // çok kısa kontrat kulüp sabrını düşürür
  return load;
}
function persuadePlayerContract(oid){
  const o=S.offers.find(x=>x.id===oid); if(!o) return; ensureOfferV6(o);
  const p=S.world.players[o.pid]; const s=S.negotiationSessions[o.id];
  const rl=playerRedLines(p);
  s.rounds++; s.playerPatience--; if(p.family) s.familyPatience--;
  // kırmızı çizgi ihlali → net ret
  const c=o.contract;
  if(c.weeklyWage < rl.minWage*0.85){ s.revealed.minWage=true; save();
    return openContractLayer(oid, `"Bu maaş beklentimin çok altında. En az ${fmtM(rl.minWage)} konuşuruz." ❌`); }
  if(rl.wantsRelease && c.releasePct> rl.releaseMaxPct){ s.revealed.release=true; save();
    return openContractLayer(oid, `"Bu kadar yüksek bir serbest kalma bedelini kabul etmem — çıkış yolu istiyorum." ❌`); }
  if(c.durationYears> rl.maxDuration+1){ s.revealed.duration=true; save();
    return openContractLayer(oid, `"${c.durationYears} yıl bana göre fazla uzun." ❌`); }
  const load=contractDemandLoad(o,s);
  const clubLoad=clubContractLoad(o);
  // oyuncu ikna + kulüp onayı birlikte
  const pSucc=clamp(0.7 - load*0.16 + s.agencyInfluence*0.2 + (p.famTrust-40)/200 + deptBonus("relations")*0.15, 0.05,0.95);
  const cSucc=clamp(0.75 - clubLoad*0.14 + s.agencyInfluence*0.15 + deptBonus("legal")*0.15, 0.05,0.95);
  const roll=rnd(), roll2=rnd();
  s.history.push({round:s.rounds, wage:c.weeklyWage, dur:c.durationYears, releasePct:c.releasePct, role:c.squadRole,
    playerPatience:s.playerPatience, load:Math.round(load*100)/100, t:nowTick()});
  if(s.history.length>12) s.history=s.history.slice(-12);
  if(s.playerPatience<=0 || s.familyPatience<=0){
    s.revealed.patience=true;
    toast("Oyuncu tarafı masadan kalktı 😬");
    o.contractOk=false; save(); openContractLayer(oid,`"Bu görüşme tıkandı. Yeni bir teklifle gelin." Sabır tükendi.`); return;
  }
  if(roll<pSucc && roll2<cSucc){
    o.contractOk=true;
    s.clubConcessionBudget=Math.max(0,s.clubConcessionBudget-clubLoad*0.7);
    s.playerConcessionBudget=Math.max(0,s.playerConcessionBudget-Math.max(0,load)*0.7);
    bumpRep("negotiation",1); if(p.age<=21)bumpRep("youthDevelopment",1);
    toast("Kontrat şartlarında anlaşıldı! ✅","green");
    save(); openContractLayer(oid,`"Anlaştık — imzaya hazırız. İyi iş." 🤝`);
  } else if(roll<pSucc){
    o.contractOk=false;
    save(); openContractLayer(oid,`"Oyuncu ikna oldu ama kulüp bu maddede geri adım istiyor." Maaş/imza/clause ayarla.`);
  } else {
    o.contractOk=false;
    // oyuncu karşı talep
    const ask= rl.wantsRelease&&c.releasePct===0? "serbest kalma maddesi" : c.weeklyWage<rl.minWage? "daha yüksek maaş" : !c.playingTimePromise? "oynama garantisi" : "daha kısa süre";
    save(); openContractLayer(oid,`"${ask} olmadan imzalamam." 😤 (${s.playerPatience} tur sabır kaldı)`);
  }
}
/* ---------- transfer tamamlama kontrolleri (idempotent) ---------- */
function validateTransferCompletion(oid){
  const o=S.offers.find(x=>x.id===oid); const reasons=[];
  if(!o) return {ok:false,reasons:["Teklif bulunamadı"]};
  const p=S.world.players[o.pid];
  ensureOfferV6(o);
  if(o._completed) return {ok:false,reasons:["Bu transfer zaten tamamlandı"]};
  if(!o.pkgOk) reasons.push("Kulüpler arası paket kabul edilmedi");
  if(!o.contractOk) reasons.push("Oyuncu kontrat şartları kabul edilmedi");
  if(!repValid(o.pid)) reasons.push("Geçerli temsil yetkin yok");
  if(!p) reasons.push("Oyuncu yok");
  const c=o.contract||{};
  for(const v of [o.fee,o.wage,o.comm,c.weeklyWage,c.durationYears,c.releaseClause]) if(v!=null&&(!isFinite(v)||Number.isNaN(v))) reasons.push("Geçersiz sayısal değer");
  const club=S.world.clubs[o.cid];
  if(club && o.fee>club.budget*1.6) reasons.push("Kulüp bütçesi yetersiz");
  if(p && S.offers.some(x=>x.pid===o.pid&&x._completed)) reasons.push("Oyuncu aynı anda başka transferde");
  if(p && p.agent==="rival") reasons.push("Oyuncu rakip ajansla sözleşmeli");
  if(o.expires!=null && o.season===S.season && o.expires<S.week) reasons.push("Teklif süresi doldu");
  return {ok:reasons.length===0, reasons};
}
function signTransfer(oid){
  const o=S.offers.find(x=>x.id===oid); if(!o) return;
  ensureOfferV6(o);
  const v=validateTransferCompletion(oid);
  if(!v.ok){ toast("İmza engellendi: "+v.reasons[0]); openOffer(oid); return; }
  if(o._completed) return;
  o._completed=true;
  const p=S.world.players[o.pid]; const c=o.contract;
  // temel transferi işle
  acceptOffer(o);
  // V6 kontrat maddelerini uygula

    p.contractEndWeek=S.week; p.squadRole=c.squadRole; p.wageRise=c.annualWageRise;

}

function computeDeadlineDay(){

  else if(S.deadlineDayState&&S.deadlineDayState.active&&!inWindow(S.week)) S.deadlineDayState=null;
}

  const seen=new Set(); for(const rv of S.rivalAgencies) for(const id of rv.playerIds){ if(seen.has(id)) return false; seen.add(id); }
  return true; })); }
function runRivalFinanceSimulation(seasons){ seasons=seasons||10; return _t("RivalFinance("+seasons+"s)",_withSnapshot(()=>{
  for(let i=0;i<seasons*BAL.weeksPerSeason;i++){ simRivalAgencies({}); }
  return S.rivalAgencies.every(rv=>isFinite(rv.cash)&&!Number.isNaN(rv.cash)); })); }
function runRivalPoachingTest(){ return _t("RivalPoaching",_withSnapshot(()=>{
  const p=myPlayers()[0]; if(!p)return true; p.loyalty=20; p.agentWeeksLeft=10; let contacted=false;
  for(let i=0;i<300&&!contacted;i++){ simRivalAgencies({}); if(myPlayers().some(x=>x.rivalId)) contacted=true; }
  return true; })); }
function runRivalDiplomacyTest(){ return _t("RivalDiplomacy",_withSnapshot(()=>{
  const rv=S.rivalAgencies[0]; if(!rv)return false; const before=S.rivalDiplomacy[rv.id]||0;
  doRivalDiplomacy(rv.id,"gorusme"); const after=S.rivalDiplomacy[rv.id];
  return after!==before && after>=-100 && after<=100; })); }
/* ---- save/migration ---- */
function runSaveV5ToV6MigrationTest(){ return _t("SaveV5ToV6",(function(){ try{
  const j=JSON.parse(JSON.stringify({...S,decisions:[]})); j.v=5;
  delete j.departments; delete j.rivalAgencies; delete j.phoneInbox; delete j.representationAgreements;
  const m=migrateSaveState(j);
  return validateSaveState(m)&&m.v>=6&&m.departments&&Array.isArray(m.rivalAgencies)&&m.rivalAgencies.length>0;
  }catch(e){ console.error(e); return false; } })()); }
function runV1ToV6FullMigrationTest(){ return _t("V1ToV6",(function(){ try{

  delete j.departments; delete j.rivalAgencies; delete j.representationAgreements; delete j.phoneInbox;
  delete j.reputationProfile; delete j.uiState; delete j.weeklyFocus; delete j.managerAttention;
  delete j.notifications; delete j.history; delete j.settings;

  return validateSaveState(m)&&m.v>=6&&m.departments&&Array.isArray(m.rivalAgencies);
  }catch(e){ console.error(e); return false; } })()); }
function runSaveRoundTripTest(){ return _t("SaveRoundTrip",(function(){ try{
  const j=JSON.stringify({...S,decisions:[],_idx:null}); const back=JSON.parse(j);
  return validateSaveState(back)&&back.v>=6&&back.week===S.week&&Object.keys(back.world.players).length===Object.keys(S.world.players).length;
  }catch(e){ return false; } })()); }
function runSaveSizeTest(){ let kb=0; try{ kb=Math.round(JSON.stringify({...S,decisions:[],_idx:null}).length/1024); }catch(e){}
  const ok=kb<6144; console.log("Save size:",kb,"KB"); _t("SaveSize<6MB ("+kb+"KB)",ok); return kb; }
/* ---- performans ---- */
function runPerformanceBenchmark(n){ n=n||1000; return _withSnapshot(()=>{
  const t0=(performance&&performance.now)?performance.now():Date.now();
  for(let i=0;i<n;i++){ recomputeDepartments(S); simDepartments({}); if(i%3===0)simRivalAgencies({}); }
  const t1=(performance&&performance.now)?performance.now():Date.now();
  const ms=Math.round(t1-t0); console.log("PerfBenchmark",n,"iter:",ms,"ms"); _t("PerfBenchmark ("+ms+"ms)",ms<8000); return ms; }); }
/* ---- toplu ---- */
function runAllV6Tests(){
  const R=[];
  const push=(name,fn)=>{ let ok; try{ ok=fn(); }catch(e){ console.error(name,e); ok=false; } R.push([name, ok===true||(typeof ok==="number")]); };
  push("DrawerSwipeClose",runDrawerSwipeCloseTest);

  push("ContractTradeOff",runContractTradeOffTest);
  push("Representation",runRepresentationAgreementTest);
  push("NegotiationIdempotency",runNegotiationIdempotencyTest);
  push("DepartmentUnlock",runDepartmentUnlockTest);
  push("DepartmentWorkload",runDepartmentWorkloadTest);
  push("DepartmentDelegation",runDepartmentDelegationTest);
  push("DepartmentErrorRisk",runDepartmentErrorRiskTest);
  push("StaffContract",runStaffContractTest);
  push("ChartHoverTooltip",runChartHoverTooltipTest);
  push("ChartTouchTooltip",runChartTouchTooltipTest);
  push("ChartKeyboard",runChartKeyboardNavigationTest);
  push("ChartOverflow",runChartOverflowTest);
  push("ChartDualAxis",runChartDualAxisTest);
  push("DeadlineDay",runDeadlineDayTest);
  push("DiplomacyEffect",runDiplomacyEffectTest);
  push("RivalPortfolio500",()=>runRivalPortfolioSimulation(500));
  push("RivalTransfer500",()=>runRivalTransferSimulation(500));
  push("RivalScouting500",()=>runRivalScoutingSimulation(500));
  push("RivalFinance10s",()=>runRivalFinanceSimulation(10));
  push("RivalPoaching",runRivalPoachingTest);
  push("RivalDiplomacy",runRivalDiplomacyTest);
  push("SaveV5ToV6",runSaveV5ToV6MigrationTest);
  push("V1ToV6",runV1ToV6FullMigrationTest);
  push("SaveRoundTrip",runSaveRoundTripTest);
  push("SaveSize",runSaveSizeTest);
  push("PerfBenchmark1000",()=>runPerformanceBenchmark(1000));
  const pass=R.filter(r=>r[1]).length;
  console.table(R.map(r=>({test:r[0],sonuc:r[1]?"PASS":"FAIL"})));
  const kb=runSaveSizeTest();
  toast(`🧪 V6 testleri: ${pass}/${R.length} PASS`, pass===R.length?"green":"");
  notify("ajans",`V6 testleri: ${pass}/${R.length} PASS · save ${kb}KB`,"agency","ayar");
  return {pass,total:R.length,results:R};
}

function _hashSeed(str){ let h=2166136261>>>0; str=String(str); for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function generateClubIdentity(cid, city, seed, used){
  const words=REGION_WORD[cid]||REGION_WORD.generic;

  let name, tries=0;
  do{

    if(style<0.45) name=`${city} ${pick(words)}`;
    else if(style<0.75) name=`${city} ${pick(idw)}`;
    else name=`${pick(idw)} ${city}`;

  if(used){ let n=name,k=2; while(used.has(n)){ n=`${name} ${["II","B","Nova","Sur","Norte"][k-2]||k}`; k++; } name=n; used.add(name); }

}

function generateLeague(country, tier, cfg, seed){
  const drop=(tier-1);
  const loBase=country.topStr[0]-drop*12, hiBase=country.topStr[1]-drop*13;
  const str=[clamp(loBase,18,90), clamp(hiBase,24,92)];
  const salLo=Math.max(400,Math.round(country.topSal[0]*Math.pow(0.5,drop)));
  const salHi=Math.max(1200,Math.round(country.topSal[1]*Math.pow(0.42,drop)));
  const prestige=clamp(Math.round(country.prestige - drop*22),6,99);
  const visibility=clamp(Math.round((country.prestige) - drop*26),4,100);
  const scoutValue=clamp(10+tier*22 - Math.round(country.prestige*0.08),8,90);
  return {
    id:`${country.id}${tier}`, country:country.name, countryId:country.id, flag:country.flag,
    name:`${country.name} ${leagueTierName(country.id,tier)}`, tier, prestige, str,
    salary:[salLo,salHi], scoutValue, visibility, namePool:country.np, clubIds:[],
    promotionSlots: tier>1?2:0, relegationSlots: tier<country.maxTiers?2:0,
    youthOpportunity: clamp(30+tier*14,20,90), table:null, seasonWeeks:BAL.weeksPerSeason,
    dataVersion:WORLD_DATA_VERSION,
  };
}

    foundedYear, colors:generateClubPalette(seed), crestSeed:(seed>>>0),
    stadiumName:generateStadium(city,stadCap,seed), stadiumCapacity:stadCap,
    prestige, reputation:prestige, fanBase, mediaPressure:clamp(prestige*(big?1.05:0.6)+ri(-6,8),5,100),
    strength, facility:clamp(Math.round(league.prestige*0.6+prestige*0.35+ri(-12,16)),15,96),
    financialPower:finPower, financialStability, ownerWealth, debtLevel:A.debt?ri(30,70):ri(0,25),
    trainingQuality:clamp(Math.round(40+A.youth*22+prestige*0.3+ri(-8,10)),20,96),
    youthAcademy:clamp(Math.round(30+A.youth*30+country.youthQ*20+ri(-8,10)),15,98),
    scoutingQuality:clamp(Math.round(35+prestige*0.35+ri(-8,10)),15,95),
    archetype:arch, profile:ARCH_PROFILE[arch]||"Yerli odaklı",
    playingTimeReliability:clamp(A.roleTrust*100+ri(-8,8),20,98),
    youthPolicy:A.buys==="youth"?"yüksek":A.buys==="veteran"?"düşük":"orta",
    transferPolicy:A.buys, foreignPlayerPreference:clamp(country.fpref*100+ri(-10,10),10,90),
    needs:makeClubNeeds(), relation:ri(5,25), trust:ri(30,55), negotiationPatience:A.patience,

    rivals:[], history:HIST_TEMPLATES[(seed>>>3)%HIST_TEMPLATES.length]({city,foundedYear}), lastResult:null,
  };
  // finans: lige + prestije + sahibe bağlı bütçe
  const base=league.prestige*strength*ri(700,1600);
  club.budget=Math.round(base*finPower/1000)*1000;
  club.transferBudget=Math.round(club.budget*(0.4+ownerWealth/250)*(financialStability/100));
  club.wageBudget=Math.round(league.salary[1]*(6+prestige/12));
  if(A.debt){ club.transferBudget=Math.round(club.transferBudget*0.5); }
  return club;
}
/* ---------- lig oyuncuları ---------- */
function generateLeaguePlayers(world, league, country, cfg){
  const perClub=league.tier<=2?cfg.playersPerClub:Math.max(3,cfg.playersPerClub-1);
  const dl=league.tier<=2?"full":"light";
  for(const cid of league.clubIds){
    const club=world.clubs[cid];
    for(let i=0;i<perClub;i++){
      const p=makePlayer(league,{clubId:cid});
      p.nat=country.np; p.natFlag=NAT_FLAG[country.np]||"🏳️";
      p.name=makeName(namePoolFor(country.np));
      p.wage=ri(league.salary[0],league.salary[1]);
      p.dl=dl; p.countryId=country.id;
      // alt lig: daha kısa kontrat, daha çok serbest
      if(league.tier>=3){ p.contractSeasons=ri(1,2); p.contractEndSeason=1+ri(0,2); }
      world.players[p.id]=p;
    }
  }
}
/* ---------- ülke üretimi ---------- */
function generateCountry(world, country, cfg, seed){
  const tiers=Math.min(country.maxTiers, cfg.tierCap);
  const cities=(CITY_POOLS[country.id]||CITY_POOLS.en).slice();
  const used=world._usedNames||(world._usedNames=new Set());
  for(let tier=1;tier<=tiers;tier++){
    const lseed=_hashSeed(seed+":"+country.id+":"+tier);
    const league=generateLeague(country,tier,cfg,lseed);
    const nClubs=tier===1?cfg.clubsTop:cfg.clubsLow;
    for(let i=0;i<nClubs;i++){
      const cseed=_hashSeed(lseed+":c"+i);
      const city=cities[(i+ (tier-1)*3)%cities.length];
      const big=tier===1 && i<3; // üst ligde ilk 3 kulüp büyük
      const club=generateClub(league,country,city,cseed,{big},used);
      world.clubs[club.id]=club; league.clubIds.push(club.id);
    }
    world.leagues.push(league);
    generateLeaguePlayers(world,league,country,cfg);
  }
  // genç havuzu (keşif hedefleri)
  const topLeague=world.leagues.find(l=>l.countryId===country.id&&l.tier===Math.min(2,tiers))||world.leagues.find(l=>l.countryId===country.id);
  for(let i=0;i<cfg.youthPer;i++){
    const lg=topLeague;
    const p=makePlayer(lg,{age:ri(15,19),discovered:false,clubId:pick(lg.clubIds)});
    p.nat=country.np; p.natFlag=NAT_FLAG[country.np]||"🏳️"; p.name=makeName(namePoolFor(country.np));
    p.wage=ri(300,2000); p.ca=clamp(p.ca-ri(4,10),18,66);
    p.pa=clamp(p.ca+ri(8,34)+(p.gem?10:0),p.ca+5,97);
    p.dl="light"; p.countryId=country.id;
    world.players[p.id]=p; world.youthPool.push(p.id);
  }
}

function generateWorldFromPreset(presetId, seed){
  const preset=WORLD_PRESETS[presetId]||WORLD_PRESETS.standard;

  const world={ seed:seed>>>0, dataVersion:WORLD_DATA_VERSION, preset:preset.id,
    leagues:[], clubs:{}, players:{}, youthPool:[], countries:[] };
  for(const cid of preset.countries){

function buildRivalries(world){
  const byCity={};
  for(const id in world.clubs){ const c=world.clubs[id]; (byCity[c.countryId+"|"+c.city]=byCity[c.countryId+"|"+c.city]||[]).push(id); }
  for(const k in byCity){ const ids=byCity[k]; if(ids.length>=2){
    for(const a of ids) world.clubs[a].rivals=ids.filter(x=>x!==a).slice(0,3); } }
}

function buildWorldIndexes(st){
  st=st||S; const w=st.world;
  const byClub={}, byLeague={}, byCountry={}, byAgency={you:[],rival:[],free:[]};
  for(const id in w.players){ const p=w.players[id];
    if(p.clubId) (byClub[p.clubId]=byClub[p.clubId]||[]).push(id);
    const c=w.clubs[p.clubId]; if(c){ (byLeague[c.leagueId]=byLeague[c.leagueId]||[]).push(id);
      (byCountry[c.countryId]=byCountry[c.countryId]||[]).push(id); }
    if(p.agent==="you") byAgency.you.push(id); else if(p.agent==="rival") byAgency.rival.push(id); else byAgency.free.push(id);
  }
  st._idx={byClub,byLeague,byCountry,byAgency,builtWeek:st.week,builtSeason:st.season};
  return st._idx;
}

function accrueLeaguePoints(sum){
  for(const id in S.world.clubs){ const c=S.world.clubs[id]; const r=c.lastResult;
    if(!r) continue;
    if(c._ptWeek===S.week) continue; c._ptWeek=S.week;
    c.seasonPts=c.seasonPts||0; c.seasonGF=c.seasonGF||0; c.seasonGA=c.seasonGA||0;
    if(r.gf>r.ga){ c.seasonPts+=3; } else if(r.gf===r.ga){ c.seasonPts+=1; }
    c.seasonGF+=r.gf; c.seasonGA+=r.ga;
  }
}
function leagueTable(leagueId){
  const lg=S.world.leagues.find(l=>l.id===leagueId); if(!lg) return [];
  return lg.clubIds.map(id=>S.world.clubs[id]).filter(Boolean)
    .map(c=>({id:c.id,name:c.name,pts:c.seasonPts||0,gd:(c.seasonGF||0)-(c.seasonGA||0),str:c.strength}))
    .sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.str-a.str);
}
function moveClubBetweenLeagues(club, toLeague){
  const from=S.world.leagues.find(l=>l.id===club.leagueId);
  if(from) from.clubIds=from.clubIds.filter(x=>x!==club.id);
  if(!toLeague.clubIds.includes(club.id)) toLeague.clubIds.push(club.id);
  club.leagueId=toLeague.id; club.tier=toLeague.tier;
}
function applyPromotionEffects(club, toLeague){
  club.prestige=clamp(club.prestige+ri(4,9),5,99); club.reputation=club.prestige;
  club.budget=Math.round(club.budget*1.6); club.transferBudget=Math.round(club.transferBudget*1.7);
  club.wageBudget=Math.round(club.wageBudget*1.4); club.seasonGoal="lig'de kalıcılık";
  for(const pid of (worldIdx().byClub[club.id]||[])){ const p=S.world.players[pid]; if(p){ p.value=Math.round(p.value*1.15); if(p.agent==="you") addNews("me",`${club.name} yükseldi!`,`${p.name}'in kulübü üst lige çıktı — değeri ve görünürlüğü arttı.`,"good"); } }
}
function applyRelegationEffects(club, toLeague){
  club.prestige=clamp(club.prestige-ri(4,9),5,99); club.reputation=club.prestige;
  club.budget=Math.round(club.budget*0.6); club.transferBudget=Math.round(club.transferBudget*0.55);
  club.wageBudget=Math.round(club.wageBudget*0.72); club.seasonGoal="yükselme";
  for(const pid of (worldIdx().byClub[club.id]||[])){ const p=S.world.players[pid]; if(p){ p.value=Math.round(p.value*0.85);
    if(p.agent==="you"){ p.morale=clamp(p.morale-6,5,99); addNews("me",`${club.name} düştü`,`${p.name}'in kulübü alt lige indi. Oyuncu ayrılmak isteyebilir.`,"bad"); } } }
}
function resolvePromotionRelegation(){
  S.promotionHistory=S.promotionHistory||[]; S.relegationHistory=S.relegationHistory||[];
  const byCountryTier={};
  for(const lg of S.world.leagues){ (byCountryTier[lg.countryId]=byCountryTier[lg.countryId]||{})[lg.tier]=lg; }
  for(const cid in byCountryTier){ const tiers=byCountryTier[cid];
    const tierNums=Object.keys(tiers).map(Number).sort((a,b)=>a-b);
    for(let ti=0;ti<tierNums.length-1;ti++){
      const upper=tiers[tierNums[ti]], lower=tiers[tierNums[ti+1]];
      if(!upper||!lower) continue;
      const slots=Math.min(upper.relegationSlots||2, lower.promotionSlots||2, Math.floor(lower.clubIds.length/3), Math.floor(upper.clubIds.length/3))||1;
      const upTable=leagueTable(upper.id), lowTable=leagueTable(lower.id);
      const relegated=upTable.slice(-slots), promoted=lowTable.slice(0,slots);
      for(const r of relegated){ const c=S.world.clubs[r.id]; if(c){ moveClubBetweenLeagues(c,lower); applyRelegationEffects(c,lower);
        S.relegationHistory.unshift({s:S.season,club:c.name,from:upper.name,to:lower.name}); } }
      for(const p of promoted){ const c=S.world.clubs[p.id]; if(c){ moveClubBetweenLeagues(c,upper); applyPromotionEffects(c,upper);
        S.promotionHistory.unshift({s:S.season,club:c.name,from:lower.name,to:upper.name}); } }
    }
  }
  S.promotionHistory=S.promotionHistory.slice(0,40); S.relegationHistory=S.relegationHistory.slice(0,40);
  // puanları sıfırla
  for(const id in S.world.clubs){ const c=S.world.clubs[id]; c.seasonPts=0; c.seasonGF=0; c.seasonGA=0; c._ptWeek=0; }
  buildWorldIndexes(S);

/* ---------- oyuncu ID sayacı senkronu (çakışma önleme) ---------- */
function syncPidCounter(world){
  world=world||(S&&S.world); if(!world) return;
  let mx=_pid;
  for(const id in world.players){ const n=parseInt(String(id).replace(/[^0-9]/g,""),10); if(isFinite(n)&&n>=mx)mx=n+1; }
  for(const id in world.clubs){ const m2=String(id).match(/_(\d+)_/); if(m2){ const n=parseInt(m2[1],10); if(isFinite(n)&&n>=mx)mx=n+1; } }
  _pid=mx;
}
/* ---------- emekli/serbest oyuncu budama + nüfus tavanı (dünya sınırlı kalsın) ---------- */
function pruneWorldPlayers(){
  const watch=new Set(S.watchlist||[]);
  const repRef=new Set((S.reports||[]).map(r=>r.pid));
  const protectedIds=new Set();
  for(const rv of (S.rivalAgencies||[])) for(const id of rv.playerIds) protectedIds.add(id);
  let removed=0;
  const canDrop=(id,p)=> p.agent!=="you" && !watch.has(id) && !repRef.has(id) && !protectedIds.has(id);
  // 1) emekli, bize ait olmayan oyuncular
  for(const id in S.world.players){ const p=S.world.players[id];
    if(p.retired && canDrop(id,p)){ delete S.world.players[id]; removed++; }
  }
  // 2) nüfus tavanı: kulüp sayısının ~10 katını aşarsa, kulüpsüz serbest hafif oyuncuları sil
  const cap=Object.keys(S.world.clubs).length*10 + 400;
  let ids=Object.keys(S.world.players);
  if(ids.length>cap){
    for(const id of ids){ if(ids.length-removed<=cap) break; const p=S.world.players[id];
      if(!p) continue;
      const noClub=!p.clubId||!S.world.clubs[p.clubId];
      if(noClub && canDrop(id,p)){ delete S.world.players[id]; removed++; }
    }
  }
  if(removed){ S.world.youthPool=(S.world.youthPool||[]).filter(id=>S.world.players[id]);
    S.reports=(S.reports||[]).filter(r=>S.world.players[r.pid]);
    S.watchlist=(S.watchlist||[]).filter(id=>S.world.players[id]); }
  return removed;
}
/* ---------- kadro tazeleme (kulüpler boşalmasın) ---------- */
function replenishSquads(){
  pruneWorldPlayers();
  syncPidCounter(S.world);
  const idx=(buildWorldIndexes(S),S._idx);
  for(const cid in S.world.clubs){ const c=S.world.clubs[cid];
    const lg=S.world.leagues.find(l=>l.id===c.leagueId); if(!lg) continue;
    const count=(idx.byClub[cid]||[]).length;
    const min=lg.tier<=2?4:3; // yalnızca boşalmaya yaklaşan kulüpleri kurtar
    if(count>=min) continue;
    const country=COUNTRY_BY_ID[c.countryId]||{np:"tr"};
    for(let i=count;i<min;i++){
      const p=makePlayer(lg,{clubId:cid,age:ri(16,23)});
      p.nat=c.countryId; p.natFlag=NAT_FLAG[c.countryId]||"🏳️"; p.name=makeName(namePoolFor(country.np));
      p.wage=ri(lg.salary[0],lg.salary[1]); p.dl=lg.tier<=2?"full":"light"; p.countryId=c.countryId;
      p.value=calcValue(p,S.world);
      S.world.players[p.id]=p;
    }
  }
  buildWorldIndexes(S);
}

      c.history=c.history??`${c.city} kentinin köklü kulübü.`; c.seasonPts=c.seasonPts??0;
    }
    for(const id in st.world.players){ const p=st.world.players[id]; p.dl=p.dl??"full";
      const c=st.world.clubs[p.clubId]; p.countryId=p.countryId??(c?c.countryId:"tr"); }

function pushHistory(route){
  if(UI._suppressPush) return;
  S.uiState=S.uiState||{}; S.uiState.entityHistory=S.uiState.entityHistory||[];
  const h=S.uiState.entityHistory;
  const snap={screen:route.screen,entityType:route.entityType||null,entityId:route.entityId||null,section:route.section||null,
    filters:captureScreenFilters(route.screen),scroll:(window.scrollY||0)};
  if(!h.length || routeKey(h[h.length-1])!==routeKey(snap)) h.push(snap);
  if(h.length>30) h.splice(0,h.length-30);
}

function scoreAction(a){
  return (a.score||0) + (a.deadline||0) + (a.fin||0) + (a.player||0) + (a.loyalty||0) + (a.contract||0) + (a.rival||0) + (a.irr||0);
}
function applyDelegationToActions(actions){
  // ajans büyüdükçe rutin/düşük riskli işleri delege et (action center'dan düşür)
  const tier=calculateAgencyTier().lv;
  const d=S.delegation||{};
  const relOk=deptUnlocked&&deptUnlocked("relations")&&deptBonus("relations")>0.4;
  const legalOk=deptUnlocked&&deptUnlocked("legal")&&deptBonus("legal")>0.4;
  return actions.filter(a=>{
    if(!a.deleg) return true;
    // delege koşulu: ilgili departman güçlü VEYA ajans tier yüksek
    if(a.key==="low_offers" && (d.autoReject|| tier>=4)) return false;
    if(a.key==="reports" && relOk) return false;
    if((a.key==="club_contract_grp"||a.key==="rep_grp") && legalOk && tier>=4) return false;
    return true;
  });
}
function buildScoredActions(){
  let cand=buildActionCandidates();
  cand=applyDelegationToActions(cand);
  cand.forEach(a=>a._score=scoreAction(a));
  cand.sort((x,y)=>y._score-x._score);
  // kategoriye göre sınırla: 3 kritik + 3 önerilen + 3 yaklaşan
  const out=[]; const caps={crit:0,sugg:0,soon:0};
  for(const a of cand){ const cat=a.cat||"sugg"; if(caps[cat]>=3) continue; caps[cat]++;
    out.push({t:a.title,cls:cat,btn:a.btn,fn:a.fn,score:a._score,category:cat,deleg:!!a.deleg}); }
  return out;
}
/* geriye dönük uyum: buildActions artık puanlı motoru kullanır */
function buildActions(){ try{ return buildScoredActions(); }catch(e){ console.error("buildActions",e); return []; } }

const ROUTE_FALLBACKS={player:"players",country:"world",league:"world",club:"world",rivalAgency:"agency",negotiation:"transfer",department:"agency",finance:"agency"};
const VALID_SCREENS=["home","players","scout","transfer","agency","world","news","settings","career","calendar","weeklyBriefing","entity"];
function normalizeRoute(route){
  route=route||{}; const r={screen:route.screen||"home",entityType:route.entityType||null,entityId:route.entityId!=null?route.entityId:null,
    section:route.section||null,filters:route.filters||null};

  if(!VALID_SCREENS.includes(r.screen)) r.screen="home";
  return r;
}
function serializeSafeRoute(route){
  const r=normalizeRoute(route);
  return {screen:r.screen,entityType:r.entityType,entityId:(typeof r.entityId==="string"||typeof r.entityId==="number")?r.entityId:null,
    section:r.section,filters:captureScreenFilters(r.entityType?null:r.screen)};
}

function ensureDeliveryRegistry(){ if(!S.eventDeliveryRegistry) S.eventDeliveryRegistry={}; return S.eventDeliveryRegistry; }
function canDeliverEvent(channel,key){
  if(!key) return true;
  const reg=ensureDeliveryRegistry(); const rec=reg[key];
  if(!rec) return true;
  // aynı olay (aynı key) aynı hafta hangi kanaldan olursa tekrar üretilmez (telefon↔bildirim dedup + tekrar önleme)
  if(rec.week===S.week && rec.season===S.season) return false;
  return true;
}
function markEventDelivered(channel,key){
  if(!key) return; const reg=ensureDeliveryRegistry();
  reg[key]={channel,week:S.week,season:S.season,t:nowTick()};
  pruneDeliveryRegistry();
}
function pruneDeliveryRegistry(){
  const reg=S.eventDeliveryRegistry||{}; const keys=Object.keys(reg);
  if(keys.length<=120) return;
  // en eski kayıtları at
  keys.map(k=>[k,reg[k].t||0]).sort((a,b)=>a[1]-b[1]).slice(0,keys.length-120).forEach(([k])=>delete reg[k]);
}
function deliverPhoneEvent(message,dedupMeta){
  const key=dedupMeta?phoneDedupKey(dedupMeta.sourceType,dedupMeta.entityId,dedupMeta.eventStage):null;
  if(key && !canDeliverEvent("phone",key)) return false;
  _pushPhoneRaw(message); if(key) markEventDelivered("phone",key); return true;
}
function deliverNotificationEvent(notif,dedupMeta){
  const key=dedupMeta?phoneDedupKey(dedupMeta.sourceType,dedupMeta.entityId,dedupMeta.eventStage):null;
  if(key && !canDeliverEvent("notification",key)) return false;
  _notifyRaw(notif.cat,notif.txt,notif.screen,notif.seg); if(key) markEventDelivered("notification",key); return true;
}

function handleTutorialEvent(type,payload){
  const tf=S.tutorialFlow; if(!tf||!tf.active||tf.skipped) return;
  tf.completedSteps=tf.completedSteps||[];
  const step=TUTORIAL_STEPS.find(s=>s.completionEvent===type&&!tf.completedSteps.includes(s.id));

function buildWeeklyBriefing(before,after,sum){
  sum=sum||{};
  const B={s:after.s,w:after.w,important:[],players:[],transfer:[],scout:[],agency:[],world:[],next:[]};
  // önemli gelişmeler: haftanın yıldızı/düşüşü
  const perfs=(sum.performances||[]).slice().sort((a,b)=>(b.rating||0)-(a.rating||0));
  if(perfs.length){ const top=perfs[0]; B.important.push({text:`⭐ Haftanın yıldızı: ${top.p?top.p.name:"?"} — rating ${top.rating}`,route:top.p?`openEntity('player','${top.p.id}')`:null});
    const low=perfs[perfs.length-1]; if(perfs.length>1&&low.rating<6) B.important.push({text:`📉 Zor hafta: ${low.p?low.p.name:"?"} — rating ${low.rating}`,route:low.p?`openEntity('player','${low.p.id}')`:null}); }
  for(const p of myPlayers()){ if(p.injury&&p.injury.weeks>=1&&(!before.players[p.id]||true)) { } }
  const injured=myPlayers().filter(p=>p.injury&&p.injury.weeks>0);
  if(injured.length) B.important.push({text:`🤕 Sakatlık: ${injured.map(p=>p.name).slice(0,3).join(", ")}`,route:`navigateTo('players')`});
  // oyuncular: değer/moral/sadakat farkları
  for(const pid in after.players){ const a=after.players[pid],b=before.players[pid]; if(!b) continue;
    const dv=a.v-b.v; if(Math.abs(dv)>=a.v*0.03&&Math.abs(dv)>20000) B.players.push({text:`${dv>0?"📈":"📉"} ${a.name}: değer ${dv>0?"+":""}${fmtM(dv)}`,route:`openEntity('player','${pid}')`});
    if(a.mor-b.mor<=-8) B.players.push({text:`😔 ${a.name}: moral düştü (${b.mor}→${a.mor})`,route:`openEntity('player','${pid}')`});
    if(a.loy-b.loy<=-8) B.players.push({text:`⚠️ ${a.name}: sadakat düştü`,route:`openEntity('player','${pid}')`}); }
  B.players=B.players.slice(0,6);
  // transfer
  if((sum.newOffers||0)>0) B.transfer.push({text:`📩 ${sum.newOffers} yeni teklif`,route:`navigateTo('transfer')`});
  const expSoon=S.offers.filter(o=>o.season===S.season&&o.expires-S.week<=1).length;
  if(expSoon) B.transfer.push({text:`⏰ ${expSoon} teklif bu hafta bitiyor`,route:`navigateTo('transfer')`});
  // scout
  if((sum.newReports||0)>0) B.scout.push({text:`🔭 ${sum.newReports} yeni scout raporu`,route:`navigateTo('scout')`});
  const goodRep=S.reports.filter(r=>!r.opened&&(r.conf||r.reliability||0)>75).length;
  if(goodRep) B.scout.push({text:`💎 ${goodRep} yüksek güvenli hedef`,route:`navigateTo('scout')`});
  // ajans: gelir/gider
  const net=(after.cash-before.cash); B.agency.push({text:`${net>=0?"🟢":"🔴"} Haftalık net: ${net>=0?"+":""}${fmtM(net)}`,route:`openEntity('finance','agency')`});
  const failedTasks=(S.departmentTasks||[]).filter(t=>t.status==="failed").length;
  if(failedTasks) B.agency.push({text:`⚠️ ${failedTasks} departman görevi başarısız`,route:`gotoAgency('operasyon')`});
  // dünya: rakip güç değişimi, yükselme/düşme
  for(const rid in after.rivalPower){ const d=after.rivalPower[rid]-(before.rivalPower[rid]||after.rivalPower[rid]); if(d>=4){ const rv=rivalById(rid); B.world.push({text:`🦈 ${rv?rv.ownerName:"Rakip"} güçleniyor (+${d})`,route:rv?`openEntity('rivalAgency','${rid}')`:null}); break; } }
  const recentProm=(S.promotionHistory||[]).filter(x=>x.s===S.season).length;
  if(recentProm) B.world.push({text:`🔀 Sezon sonu: ${recentProm} kulüp yükseldi/düştü`,route:`navigateTo('world')`});
  // gelecek hafta: en yüksek puanlı 3 aksiyon
  try{ buildScoredActions().slice(0,3).forEach(a=>B.next.push({text:a.t,route:a.fn})); }catch(e){}
  return B;
}

const NEGO_STEPS=[["package","Paket"],["contract","Kontrat"],["representation","Temsil"],["eligibility","Uygunluk"],["review","Son Kontrol"]];
function negoStepStatus(o,step){
  if(step==="package") return o.pkgOk?"done":"active";
  if(step==="contract") return o.contractOk?"done":(o.pkgOk?"active":"warn");
  if(step==="representation") return repValid(o.pid)?"done":"warn";
  if(step==="eligibility"){ const v=validateTransferCompletion(o.id); return v.ok?"done":"warn"; }
  if(step==="review") return (o.pkgOk&&o.contractOk&&repValid(o.pid))?"active":"locked";
  return "locked";
}
function negoStepIcon(st){ return st==="done"?"✅":st==="active"?"🔵":st==="warn"?"⚠️":st==="locked"?"🔒":""; }

}

/* ---------- boot ---------- */
if(typeof document.addEventListener==="function") document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ if(UI.menuOpen) closeMainMenu(); else if($("sheetwrap")&&$("sheetwrap").classList.contains("open")) closeSheet(); else if(TAB==="entity") goBack(); return; }
  if(e.key==="Tab"&&UI.menuOpen){
    const w=$("drawerwrap"); if(!w||!w.querySelectorAll) return;
    const f=[...w.querySelectorAll("button")]; if(!f.length) return;
    const first=f[0], last=f[f.length-1];
    if(e.shiftKey&&document.activeElement===first){ e.preventDefault&&e.preventDefault(); last.focus(); }
    else if(!e.shiftKey&&document.activeElement===last){ e.preventDefault&&e.preventDefault(); first.focus(); }
  }
});
(async function(){
  let saved=null;
  try{ saved=await load(); }catch(e){ saved=null; }
  saved=migrateSaveState(saved);
  if(saved && saved.v===8 && validateSaveState(saved)){ S=saved; S.decisions=S.decisions||[]; repairSaveState(S); syncPidCounter(S.world); buildWorldIndexes(S);
    try{ restoreRouteAfterLoad(); }catch(e){ renderAll(); } toast("Kariyer yüklendi — kaldığın yerden 👋"); }
  else renderOnboarding();
  try{ setupBrowserBack(); }catch(e){}
})();
