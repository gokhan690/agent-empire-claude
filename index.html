<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agent Empire — Futbolcu Menajerliği</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   AGENT EMPIRE — AYDINLIK PREMIUM TASARIM SİSTEMİ
   Kural: hiçbir yerde koyu arka plan yok.
   ============================================================ */
:root{
  --bg:#FAF8F4; --bg2:#F2EFE9; --card:#FFFFFF; --card-alt:#F7F6F3;
  --ink:#1B2A4A; --ink2:#5A6B8C; --ink3:#93A0B8;
  --blue:#7FB3E8; --blue-soft:#EAF3FC;
  --green:#5FBF87; --green-soft:#E9F7EF;
  --gold:#D9AE54; --gold-soft:#FBF3DF; --gold-grad:linear-gradient(135deg,#F3DFA8,#E2BC62);
  --red:#E08A8A; --red-soft:#FCEEEE;
  --div:#E8E5DE;
  --shadow:0 2px 10px rgba(27,42,74,.07);
  --shadow-lg:0 8px 28px rgba(27,42,74,.12);
  --r:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Manrope',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.45;
  overscroll-behavior:none;
}
#app{max-width:520px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}

/* ---------- üst şerit ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(250,248,244,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--div);
  padding:10px 16px 8px;
}
.topbar-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.week-label{font-family:'Fraunces',serif;font-weight:700;font-size:17px}
.week-sub{font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.res-chips{display:flex;gap:6px}
.chip{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--div);
  border-radius:999px;padding:4px 10px;font-size:12.5px;font-weight:700;box-shadow:var(--shadow)}
.chip.cash{color:#3E8E63}.chip.rep{color:var(--gold)}
.chip small{font-weight:600;color:var(--ink3);font-size:10px}

/* ---------- içerik ---------- */
.screen{flex:1;padding:14px 14px 120px;display:none;animation:fadein .18s ease}
.screen.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

h2.sec{font-family:'Fraunces',serif;font-size:19px;font-weight:700;margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
h2.sec:first-child{margin-top:2px}
h2.sec .cnt{font-family:'Manrope';font-size:11px;background:var(--bg2);color:var(--ink2);border-radius:999px;padding:2px 8px;font-weight:700}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:10px;border:1px solid rgba(232,229,222,.6)}
.card.alt{background:var(--card-alt)}
.card.urgent{border:1.5px solid var(--red);background:linear-gradient(0deg,var(--red-soft) 0%,#fff 60%)}
.card.gold{border:1.5px solid var(--gold);background:linear-gradient(0deg,var(--gold-soft) 0%,#fff 65%)}
.card.tappable{cursor:pointer;transition:transform .12s}
.card.tappable:active{transform:scale(.985)}

.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.muted{color:var(--ink2);font-size:12.5px}
.tiny{color:var(--ink3);font-size:11px;font-weight:600}
.b{font-weight:700}
.pos-delta{color:#3E8E63;font-weight:700}.neg-delta{color:#C96A6A;font-weight:700}

/* ---------- oyuncu kartı ---------- */
.avatar{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;color:#fff;flex-shrink:0;box-shadow:inset 0 -8px 14px rgba(0,0,0,.08)}
.avatar.sm{width:36px;height:36px;font-size:13px;border-radius:11px}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.02em}
.badge.pos{background:var(--blue-soft);color:#4A7FB5}
.badge.inj{background:var(--red-soft);color:#C96A6A}
.badge.hot{background:var(--gold-soft);color:#B08A2E}
.badge.sad{background:var(--bg2);color:var(--ink2)}
.badge.ok{background:var(--green-soft);color:#3E8E63}
.stars{color:var(--gold);letter-spacing:1px;font-size:13px}
.stars .off{color:#E4DFD4}
.spark{display:flex;align-items:flex-end;gap:2px;height:22px}
.spark i{width:5px;border-radius:2px;background:var(--blue);opacity:.75}
.spark i.good{background:var(--green)}
.spark i.bad{background:var(--red)}

/* stat bar */
.sb{margin:7px 0}
.sb .lbl{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:3px}
.sb .track{height:7px;background:var(--bg2);border-radius:99px;overflow:hidden}
.sb .fill{height:100%;border-radius:99px;background:var(--blue);transition:width .5s ease}
.sb .fill.g{background:var(--green)}.sb .fill.au{background:var(--gold-grad)}.sb .fill.r{background:var(--red)}

/* ---------- butonlar ---------- */
.btn{border:none;border-radius:13px;font-family:inherit;font-weight:700;font-size:14px;
  padding:11px 16px;cursor:pointer;transition:transform .1s,filter .15s;color:var(--ink)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(95,191,135,.35)}
.btn.blue{background:var(--blue);color:#fff}
.btn.gold{background:var(--gold-grad);color:#6B5220}
.btn.ghost{background:var(--card);border:1.5px solid var(--div)}
.btn.danger{background:var(--red-soft);color:#C96A6A}
.btn.sm{padding:8px 12px;font-size:12.5px;border-radius:11px}
.btn.block{width:100%}
.btn:disabled{opacity:.45;pointer-events:none}
.btnrow{display:flex;gap:8px;margin-top:10px}
.btnrow .btn{flex:1}

/* ---------- HAFTAYI OYNAT ---------- */
.playbar{position:fixed;bottom:64px;left:0;right:0;z-index:45;display:flex;justify-content:center;pointer-events:none}
.playbar-inner{max-width:520px;width:100%;padding:0 14px 10px;pointer-events:auto}
.playbtn{width:100%;background:linear-gradient(135deg,#6FCB95,#4FAE78);color:#fff;border:none;
  border-radius:18px;padding:15px;font-family:'Fraunces',serif;font-size:17px;font-weight:700;cursor:pointer;
  box-shadow:0 8px 24px rgba(79,174,120,.4);display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .12s}
.playbtn:active{transform:scale(.97)}
.playbtn:disabled{filter:grayscale(.5);opacity:.6}

/* ---------- alt tab bar ---------- */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-top:1px solid var(--div)}
.tabbar-inner{max-width:520px;width:100%;display:flex}
.tab{flex:1;padding:8px 0 max(8px,env(safe-area-inset-bottom));border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;
  font-size:10px;font-weight:700;color:var(--ink3);position:relative}
.tab.active{color:var(--ink)}
.tab .ic{font-size:19px;line-height:1}
.tab .dot{position:absolute;top:5px;right:calc(50% - 16px);width:8px;height:8px;border-radius:99px;background:var(--red);display:none}
.tab.notify .dot{display:block}

/* ---------- modal / sheet ---------- */
.sheet-wrap{position:fixed;inset:0;z-index:100;display:none;align-items:flex-end;justify-content:center}
.sheet-wrap.open{display:flex}
.sheet-bg{position:absolute;inset:0;background:rgba(27,42,74,.32);backdrop-filter:blur(2px)}
.sheet{position:relative;background:var(--bg);width:100%;max-width:520px;max-height:88dvh;overflow-y:auto;
  border-radius:24px 24px 0 0;padding:10px 16px calc(24px + env(safe-area-inset-bottom));
  animation:slideup .25s cubic-bezier(.2,.8,.3,1);box-shadow:var(--shadow-lg)}
@keyframes slideup{from{transform:translateY(40%);opacity:.4}to{transform:none;opacity:1}}
.sheet .grab{width:40px;height:4px;background:var(--div);border-radius:99px;margin:4px auto 12px}

/* scout raporu zarfı */
.envelope{background:var(--gold-grad);border-radius:var(--r);padding:18px 14px;text-align:center;
  color:#6B5220;font-weight:700;cursor:pointer;box-shadow:var(--shadow);margin-bottom:10px;
  transition:transform .12s}
.envelope:active{transform:scale(.97)}
.envelope .env-ic{font-size:28px;margin-bottom:4px}
.range-bar{position:relative;height:12px;background:var(--bg2);border-radius:99px;margin:8px 0 2px}
.range-bar .rng{position:absolute;top:0;bottom:0;background:var(--gold-grad);border-radius:99px}
.range-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--ink3);font-weight:700}
.confring{font-size:12px;font-weight:800;color:#B08A2E}

/* haber ---------- */
.news{border-left:3px solid var(--blue);padding:10px 12px;background:var(--card);border-radius:12px;
  margin-bottom:8px;box-shadow:var(--shadow)}
.news.me{border-left-color:var(--gold);background:linear-gradient(90deg,var(--gold-soft),#fff 40%)}
.news.bad{border-left-color:var(--red)}
.news.good{border-left-color:var(--green)}
.news .src{font-size:10px;font-weight:800;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase}
.news .hl{font-weight:700;font-size:13.5px;margin:2px 0}
.news .bd{font-size:12.5px;color:var(--ink2)}

/* toast */
#toasts{position:fixed;top:60px;left:0;right:0;z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--ink);color:#fff;font-weight:700;font-size:13px;padding:10px 18px;border-radius:99px;
  box-shadow:var(--shadow-lg);animation:toastin .3s ease;max-width:88%}
.toast.gold{background:var(--gold-grad);color:#6B5220}
.toast.green{background:var(--green);color:#fff}
@keyframes toastin{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}

/* varlık grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.asset{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:12px;text-align:center;border:1px solid rgba(232,229,222,.6)}
.asset .aic{font-size:30px}
.asset.locked{opacity:.55;background:var(--card-alt)}

/* pazarlık masası */
.nego-line{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px dashed var(--div);font-size:13.5px}
.nego-line:last-child{border:0}
.patience{height:8px;border-radius:99px;background:var(--bg2);overflow:hidden;margin-top:6px}
.patience .pf{height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));border-radius:99px;transition:width .4s}

/* seçim satırları (karar modalı) */
.opt{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--div);border-radius:13px;
  padding:12px;margin-top:8px;cursor:pointer;font-family:inherit;transition:transform .1s}
.opt:active{transform:scale(.98)}
.opt .ot{font-weight:700;font-size:14px}
.opt .oh{font-size:11.5px;color:var(--ink2);margin-top:2px}
.opt .risk{float:right;font-size:10px;font-weight:800;padding:2px 7px;border-radius:99px}
.risk.low{background:var(--green-soft);color:#3E8E63}
.risk.mid{background:var(--gold-soft);color:#B08A2E}
.risk.high{background:var(--red-soft);color:#C96A6A}

/* onboarding hero */
.hero{background:linear-gradient(150deg,#FFFFFF,#F4EFE3 70%,#EFE4C8);border-radius:22px;padding:26px 20px;
  text-align:center;box-shadow:var(--shadow-lg);margin-bottom:14px;border:1px solid var(--gold-soft)}
.hero h1{font-family:'Fraunces',serif;font-size:26px;font-weight:700;margin:6px 0}
.hero .tag{font-size:12px;font-weight:800;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
input.txt{width:100%;border:1.5px solid var(--div);border-radius:13px;padding:12px;font-family:inherit;
  font-size:15px;font-weight:600;background:var(--card);color:var(--ink);margin-top:8px;outline:none}
input.txt:focus{border-color:var(--blue)}

/* haftalık özet */
.sumline{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--div);font-size:13.5px}
.sumline:last-child{border:0}
.lockcard{border:1.5px dashed var(--gold);background:var(--gold-soft);text-align:center;color:#8A6E2F;font-weight:700}
.filterrow{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px}
.fchip{flex-shrink:0;border:1.5px solid var(--div);background:var(--card);border-radius:999px;padding:6px 13px;
  font-size:12px;font-weight:700;cursor:pointer;color:var(--ink2);font-family:inherit}
.fchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.divider{height:1px;background:var(--div);margin:12px 0}
.empty{color:var(--ink3);text-align:center;padding:26px 10px;font-weight:600;font-size:13px}

/* ============ V3: design tokens + responsive shell ============ */
:root{
  --surface-primary:#FFFFFF;--surface-secondary:#F7F6F3;--surface-elevated:#FFFFFF;--surface-highlight:#FBF3DF;
  --text-primary:#1B2A4A;--text-secondary:#5A6B8C;--text-muted:#93A0B8;
  --border-soft:#E8E5DE;--border-strong:#D5D0C4;
  --success:#3E8E63;--success-soft:#E9F7EF;--warning:#B08A2E;--warning-soft:#FBF3DF;
  --danger:#C96A6A;--danger-soft:#FCEEEE;--info:#4A7FB5;--info-soft:#EAF3FC;
  --premium:#D9AE54;--premium-soft:#FBF3DF;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;--space-6:32px;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:22px;
  --shadow-sm:0 1px 4px rgba(27,42,74,.06);--shadow-md:0 2px 10px rgba(27,42,74,.07)
}
.seg{display:flex;gap:6px;overflow-x:auto;margin:2px 0 12px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.seg button{flex-shrink:0;border:1.5px solid var(--border-soft);background:var(--card);border-radius:999px;
  padding:9px 15px;min-height:38px;font-size:12.5px;font-weight:700;color:var(--ink2);font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:6px}
.seg button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.icon{display:inline-block;vertical-align:-4px;flex-shrink:0}
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px}
.kpi .cell{background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius-md);padding:10px 6px;text-align:center;box-shadow:var(--shadow-sm)}
.kpi .cell .v{font-weight:800;font-size:14.5px}
.kpi .cell .l{font-size:9.5px;color:var(--ink3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.chartbox{background:var(--card);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:12px;box-shadow:var(--shadow-sm);margin-bottom:10px}
.chartbox .cnote{font-size:11.5px;color:var(--ink2);margin-top:6px;font-weight:600}
.action-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border-soft);
  border-radius:var(--radius-md);margin-bottom:8px;box-shadow:var(--shadow-sm);font-size:13px;font-weight:600}
.action-item .btn{margin-left:auto;flex-shrink:0}
.action-item.crit{border-left:3px solid var(--danger)}
.action-item.sugg{border-left:3px solid var(--info)}
.action-item.soon{border-left:3px solid var(--premium)}
input.search{width:100%;border:1.5px solid var(--border-soft);border-radius:12px;padding:11px 13px;font-family:inherit;font-size:14px;background:var(--card);color:var(--ink);outline:none;margin-bottom:8px}
input.search:focus{border-color:var(--blue)}
select.sel{border:1.5px solid var(--border-soft);border-radius:10px;padding:9px;min-height:38px;font-family:inherit;font-weight:700;font-size:12px;background:var(--card);color:var(--ink)}
.btn{min-height:40px}
.tl{border-left:2px solid var(--border-soft);margin-left:8px;padding-left:14px}
.tl .tli{position:relative;padding-bottom:12px}
.tl .tli:before{content:"";position:absolute;left:-19px;top:4px;width:8px;height:8px;border-radius:99px;background:var(--gold)}
body.reduceanim *{animation:none!important;transition:none!important}
@media(min-width:1100px){.mobile-only{display:none!important}}

/* ============ V5: hamburger, hero, portre, kanban, plan ============ */
.menu-trigger{border:none;background:var(--card);border-radius:12px;min-width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink);flex-shrink:0}
.tb-title{display:flex;align-items:center;gap:10px;min-width:0}
.tb-title .tname{font-family:'Fraunces',serif;font-weight:700;font-size:16.5px;white-space:nowrap}
.tb-title .tsub{font-size:10.5px;color:var(--ink2);font-weight:700}
.tb-center{display:none}
.bellbtn{position:relative;border:none;background:var(--card);border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink)}
.bellbtn .bb{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:9.5px;font-weight:800;border-radius:99px;padding:1px 5px;min-width:16px}
.drawer-wrap{position:fixed;inset:0;z-index:130;display:none}
.drawer-wrap.open{display:block}
.drawer-bg{position:absolute;inset:0;background:rgba(27,42,74,.28);backdrop-filter:blur(2px)}
.drawer{position:absolute;top:0;bottom:0;left:0;width:84%;max-width:340px;background:var(--bg);box-shadow:var(--shadow-lg);
  transform:translateX(-100%);transition:transform .22s ease;overflow-y:auto;padding:12px 12px calc(24px + env(safe-area-inset-bottom))}
.drawer-wrap.open .drawer{transform:none}
@media (prefers-reduced-motion:reduce){.drawer{transition:none}}
.drawer .dhead{background:linear-gradient(140deg,#FFFFFF,#F4EFE3 75%,#EFE4C8);border:1px solid var(--gold-soft);border-radius:16px;padding:14px;margin-bottom:6px}
.dsec{font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--ink3);text-transform:uppercase;padding:12px 10px 4px}
.ditem{display:flex;align-items:center;gap:11px;width:100%;border:none;background:none;border-radius:12px;padding:11px 12px;
  font-family:inherit;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer;text-align:left;min-height:44px}
.ditem.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
.ditem .bcount{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:2px 7px}
.hero-page{border-radius:20px;padding:18px 16px;margin-bottom:12px;border:1px solid var(--border-soft);position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.hero-page .eyebrow{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.7}
.hero-page h1{font-family:'Fraunces',serif;font-size:21px;font-weight:700;margin:2px 0 4px}
.hero-page .hdesc{font-size:12.5px;color:var(--ink2);max-width:430px;position:relative}
.hero-page .hmetrics{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;position:relative}
.hero-page .hm b{font-size:15px;display:block}
.hero-page .hm span{font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.hero-page svg.hart{position:absolute;right:-12px;bottom:-16px;pointer-events:none}
.tone-gold{background:linear-gradient(135deg,#FFFDF7,#FBF3DF 70%,#F3E4BC)}
.tone-blue{background:linear-gradient(135deg,#FCFEFF,#EAF3FC 70%,#D8E9F9)}
.tone-earth{background:linear-gradient(135deg,#FFFEFA,#F7F1E3 70%,#EFE3C9)}
.tone-green{background:linear-gradient(135deg,#FBFFFC,#E9F7EF 70%,#D5EFDF)}
.tone-corp{background:linear-gradient(135deg,#FDFDFF,#F0F2F7 70%,#E2E7F0)}
.portrait{border-radius:14px;flex-shrink:0;display:block}
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.kcol{min-width:190px;flex:1;background:var(--bg2);border-radius:14px;padding:8px}
.kcol h4{font-size:10.5px;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;padding:2px 6px 8px}
.kcard{background:var(--card);border-radius:12px;padding:9px 10px;margin-bottom:8px;box-shadow:var(--shadow-sm);font-size:12px;cursor:pointer}
.slotdots{display:inline-flex;gap:5px;vertical-align:middle}
.slotdots i{width:12px;height:12px;border-radius:99px;background:var(--gold);display:inline-block}
.slotdots i.used{background:var(--border-soft)}
.focus-chip{border:1.5px solid var(--border-soft);background:var(--card);border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700;font-size:12.5px;display:flex;gap:8px;align-items:flex-start;min-height:44px;width:100%;font-family:inherit;color:var(--ink2);margin-bottom:6px;text-align:left}
.focus-chip.on{border-color:var(--gold);background:var(--gold-soft);color:var(--ink)}
.focus-chip .fd{font-size:11px;font-weight:600;color:var(--ink3)}
body.noscroll{overflow:hidden}

/* ============ V6: etkileşimli grafik + departman + rakip ============ */
.ichart{position:relative;width:100%;touch-action:pan-y;cursor:crosshair;border-radius:8px;outline:none}
.ichart:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.ichart svg{width:100%;height:100%}
.chart-tip{position:fixed;z-index:250;background:var(--ink);color:#fff;border-radius:10px;padding:7px 10px;
  font-size:11.5px;font-weight:600;box-shadow:var(--shadow-lg);pointer-events:none;max-width:200px;line-height:1.35}
.chart-tip .ct-h{font-weight:800;font-size:11px;opacity:.85;margin-bottom:3px}
.chart-tip .ct-row{display:flex;align-items:center;gap:5px;white-space:nowrap}
.chart-tip .ct-row b{margin-left:auto}
.chart-tip .ct-dot{width:8px;height:8px;border-radius:3px;display:inline-block;flex-shrink:0}
.chart-tip .ct-delta{margin-top:3px;font-size:10.5px;font-weight:700}
.chart-tip .ct-delta.up{color:#8BE0AE}.chart-tip .ct-delta.down{color:#F0A9A9}
.chart-tip .ct-ev{margin-top:3px;font-size:10.5px;font-weight:600;color:#F3DFA8}
.dept-grid{display:grid;grid-template-columns:1fr;gap:10px}
/* V8 Phase B/B2: full-page entity ekranı */
.ent-head{position:sticky;top:54px;z-index:35;display:flex;align-items:center;gap:10px;padding:8px 0;margin:-8px 0 8px;
  background:var(--bg);border-bottom:1px solid var(--div)}
.ent-crumb{color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;font-weight:600}
.ent-crumb a{text-decoration:none}
.ent-body{padding-bottom:24px}
.grouped .card{margin-bottom:6px}
/* V8-B2 pazarlık stepper */
.nego-stepper{display:flex;gap:5px;overflow-x:auto;padding:6px 0 10px;-webkit-overflow-scrolling:touch}
.nstep{flex-shrink:0;display:flex;align-items:center;gap:5px;border:1.5px solid var(--border-soft);background:var(--card);
  border-radius:999px;padding:6px 11px;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink2);cursor:pointer;min-height:36px}
.nstep.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.nstep .nstep-n{background:var(--bg2);color:var(--ink2);border-radius:999px;width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.nstep.on .nstep-n{background:rgba(255,255,255,.25);color:#fff}
.nstep.st-done{border-color:var(--green)}.nstep.st-warn{border-color:var(--gold)}.nstep.st-locked{opacity:.55}
@media(min-width:1100px){ .entity-screen{grid-column:2;grid-row:2} .ent-head{top:66px} }
@media(min-width:1100px){
  .tb-center{display:flex;gap:16px;align-items:center;font-size:12px;font-weight:700;color:var(--ink2)}

.sidebar{display:none}

  .sidebar button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}

  .screen{grid-column:2;grid-row:2;background:var(--bg);min-height:calc(100dvh - 62px);padding:20px 28px 150px;border-left:1px solid var(--border-soft);border-right:1px solid var(--border-soft)}
  .context-panel{display:block;grid-column:3;grid-row:2;position:sticky;top:70px;padding:16px 16px;max-height:calc(100dvh - 70px);overflow:auto}
  .tabbar{display:none}

  .sheet{border-radius:24px;max-height:86dvh}
}

/* ============================================================

const fmtM = n => {
  const neg = n<0; n=Math.abs(n);
  let s;
  if(n>=1e6) s="€"+(n/1e6).toFixed(n>=1e7?1:2).replace(/\.0+$/,"")+"M";
  else if(n>=1e3) s="€"+Math.round(n/1e3)+"K";
  else s="€"+Math.round(n);
  return (neg?"-":"")+s;
};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function icon(name,size=20){
  const p=ICONS[name]||ICONS.doc;
  return `<svg class="icon" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${p}</svg>`;
}
function renderLineChart(data,opt={}){
  const vals=(data||[]).map(d=>typeof d==="number"?d:(d?d.y:null)).filter(v=>v!=null);
  if(vals.length<2) return `<div class="empty">Henüz yeterli veri yok — haftalar ilerledikçe grafik oluşur.</div>`;
  const W=opt.w||320,H=opt.h||110,P=8;
  const min=opt.min??Math.min(...vals), max=opt.max??Math.max(...vals);
  const sp=(max-min)||1;
  const pts=vals.map((v,i)=>[P+i*(W-2*P)/Math.max(1,vals.length-1), H-P-(v-min)/sp*(H-2*P)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L${pts[pts.length-1][0].toFixed(1)} ${H-P} L${pts[0][0].toFixed(1)} ${H-P} Z`;
  const up=vals[vals.length-1]>=vals[0];
  const col=opt.color||(up?"#3E8E63":"#C96A6A");
  const last=vals[vals.length-1];
  const fmt=opt.fmt||(v=>Math.round(v));
  const grid=[0.25,0.5,0.75].map(g=>`<line x1="${P}" x2="${W-P}" y1="${(P+(H-2*P)*g).toFixed(1)}" y2="${(P+(H-2*P)*g).toFixed(1)}" stroke="#E8E5DE" stroke-width="0.8" stroke-dasharray="3 4"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="${opt.label||"trend"}: son değer ${fmt(last)}, en düşük ${fmt(min)}, en yüksek ${fmt(max)}" style="display:block">
    ${grid}
    <path d="${area}" fill="${col}" opacity="0.12"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="3.4" fill="${col}"/>
    <text x="${P}" y="${P+7}" font-size="8.5" fill="#93A0B8" font-family="Manrope,system-ui">${fmt(max)}</text>
    <text x="${P}" y="${H-P-2}" font-size="8.5" fill="#93A0B8" font-family="Manrope,system-ui">${fmt(min)}</text></svg>
  <div class="row" style="justify-content:space-between;margin-top:4px">
    <span class="tiny">son ${vals.length} hafta</span>
    <span class="b" style="font-size:13px;color:${up?'#3E8E63':'#C96A6A'}">${up?"▲":"▼"} ${fmt(last)}</span></div>`;
}
function renderRatingBars(rats){
  const vals=(rats||[]).slice(-12);
  if(!vals.some(v=>v!=null)) return `<div class="empty">Henüz maç verisi yok.</div>`;
  let h='<div style="display:flex;align-items:flex-end;gap:4px;height:64px">';
  for(const r of vals){
    if(r==null){h+='<div style="flex:1;height:4px;background:var(--border-soft);border-radius:3px" title="oynamadı"></div>';continue;}
    const hh=clamp((r-3)/7*64,6,64);
    h+=`<div style="flex:1;height:${hh.toFixed(0)}px;border-radius:4px;background:${r>=7.5?'var(--success)':r<6?'var(--danger)':'var(--blue)'}" title="${r}"></div>`;
  }
  h+='</div><div class="row" style="justify-content:space-between;margin-top:4px"><span class="tiny">son 12 hafta</span>';
  const played=vals.filter(v=>v!=null);
  const avg=played.length?(played.reduce((a,b)=>a+b,0)/played.length).toFixed(2):"—";
  h+=`<span class="tiny b">ort. ${avg}</span></div>`;
  return h;
}
function renderDonut(parts,opt={}){
  const total=parts.reduce((t,p)=>t+p.v,0);
  if(total<=0) return `<div class="empty">Henüz veri yok.</div>`;
  const R=38,C=2*Math.PI*R; let off=0; let segs="";
  for(const p of parts){ const fr=p.v/total;
    segs+=`<circle r="${R}" cx="50" cy="50" fill="none" stroke="${p.color}" stroke-width="15" stroke-dasharray="${(fr*C).toFixed(1)} ${C.toFixed(1)}" stroke-dashoffset="${(-off*C).toFixed(1)}" transform="rotate(-90 50 50)"/>`;
    off+=fr; }
  const fmt=opt.fmt||fmtM;
  const legend=parts.map(p=>`<div class="row" style="gap:6px;font-size:11.5px;margin-bottom:3px"><span style="width:9px;height:9px;border-radius:3px;background:${p.color};display:inline-block;flex-shrink:0"></span><span class="muted">${p.label}</span><span class="b" style="margin-left:auto">${fmt(p.v)}</span></div>`).join("");
  return `<div class="row" style="gap:14px;align-items:center"><svg viewBox="0 0 100 100" width="88" height="88" role="img" aria-label="${opt.label||"dağılım grafiği"}">${segs}</svg><div class="grow">${legend}</div></div>`;
}
function chartComment(vals,name,fmtPct){
  if(!vals||vals.length<5) return "";
  const a=vals[vals.length-5],b=vals[vals.length-1];
  const base=Math.abs(a)>1e-9?Math.abs(a):1;
  const pct=Math.round((b-a)/base*100);
  if(Math.abs(pct)<3) return `${name} son 4 haftada yatay seyrediyor.`;
  return `${name} son 4 haftada %${Math.abs(pct)} ${pct>0?"arttı":"azaldı"}.`;
}

/* ---------- RNG (seedli — aynı dünya tekrar üretilebilir) ---------- */
let _seed = Date.now()>>>0;
function srand(s){_seed=s>>>0}
function rnd(){ _seed|=0; _seed=_seed+0x6D2B79F5|0; let t=Math.imul(_seed^_seed>>>15,1|_seed);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }
const ri=(a,b)=>Math.floor(rnd()*(b-a+1))+a;
const pick=a=>a[Math.floor(rnd()*a.length)];
const gauss=()=> (rnd()+rnd()+rnd()+rnd()-2)/2;

function makePlayer(league, opts={}){
  const age = opts.age ?? ri(16,33);
  const [lo,hi]=league.str;
  let ca = opts.ca ?? clamp(ri(lo-8,hi-2)+ri(-4,4), 22, 92);
  const youthBonus = age<21 ? ri(4,22) : ri(0,8);
  let pa = clamp(ca + youthBonus + (rnd()<0.12?ri(6,14):0), ca, 96);
  const gem = opts.gem ?? (rnd()<0.05 && age<=19);
  if(gem) pa = clamp(pa+ri(6,12),ca,97);
  const nat = opts.nat ?? (league.namePool==="nl" && rnd()<0.3 ? pick(["br","af"]) : league.namePool);
  const natFlag = {tr:"🇹🇷",en:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",nl:"🇳🇱",br:"🇧🇷",af:"🇸🇳"}[nat];
  return {
    id:"p"+(_pid++), name:makeName(nat), age, nat, natFlag,
    pos:opts.pos??pick(POSITIONS), foot:pick(["Sağ","Sağ","Sol","Çift"]),
    height:ri(168,196),
    ca, pa, form:ri(42,62), morale:ri(50,75), fitness:100,

    prof:ri(30,90), ambition:ri(30,95), discipline:ri(25,95),

    clubId: opts.clubId??null, wage:0, contractSeasons: ri(1,3),
    mediaPop: clamp(Math.round(ca*0.6+ri(-15,15)),2,95), followers: 0,
    interest: {}, // clubId -> 0..100
    value:0, discovered: opts.discovered??true,
    gem, breakout:false, breakoutWeeks:0,

    ratings:[], // son 6

function calcValue(p, world){
  let base=15000;
  for(const [c,v] of BAL.valueTable){ if(p.ca>=c) base=v; else break; }
  // ara interpolasyon
  for(let i=0;i<BAL.valueTable.length-1;i++){const [c1,v1]=BAL.valueTable[i],[c2,v2]=BAL.valueTable[i+1];
    if(p.ca>=c1&&p.ca<c2){base=v1+(v2-v1)*(p.ca-c1)/(c2-c1);break}}
  const ageM = p.age<=18?1.45: p.age<=21?1.35: p.age<=24?1.2: p.age<=27?1.0: p.age<=30?0.65:0.32;
  const formM = 0.85+ (p.form/100)*0.4;
  const lg = leagueOf(p, world); const visM = lg?0.7+ (lg.visibility/100)*0.6:0.8;
  const popM = 1+p.mediaPop/500;
  const brk = p.breakout?1.6:1;
  return Math.round(base*ageM*formM*visM*popM*brk/1000)*1000;
}
function leagueOf(p, world){ if(!p.clubId) return null; const c=world.clubs[p.clubId]; return c?world.leagues.find(l=>l.id===c.leagueId):null; }

/* ---------- AJANS SKORU / SEVİYE / OYUNCU İSTEKLİLİĞİ ---------- */
const statusTotal=()=> clamp(S.status+S.assets.reduce((s,a)=>s+a.st,0),0,100);
const officePrestige=()=> [10,32,58,82][S.officeLevel]??82;
function clubRelAvg(){ const cs=Object.values(S.world.clubs); return cs.length? cs.reduce((s,c)=>s+c.relation,0)/cs.length:0; }
function calculateTrackRecordScore(){
  const t=S.trackRecord||{};
  return clamp( Math.min(28,S.totalCommission/6e4)
    + Math.min(18,(t.biggestFee||0)/1e6*2.2)
    + Math.min(16,(t.transfers||0)*3)
    + Math.min(12,(t.gems||0)*6)
    + Math.min(10,(t.topMoves||0)*3.5)
    - Math.min(14,(t.lostPlayers||0)*3.5), 0, 84);
}
function calculateAgencyScore(){
  if(!S) return 0;
  const score=
    S.rep*0.26 + statusTotal()*0.14 + officePrestige()*0.11
   + (S.mediaPower||0)*0.08 + (S.sponsorNetwork||0)*0.07
   + clamp(S.scouts.reduce((s,x)=>s+x.quality*9,0),0,100)*0.08
   + (S.staff.lawyer?55:12)*0.05 + clubRelAvg()*0.08
   + calculateTrackRecordScore()*0.16
   + (Object.values(repProfile()).reduce((a,b)=>a+b,0)/7-50)*0.06
   - (S.shady||0)*0.08 - (S.cash<0? clamp(-S.cash/15000,0,10):0);
  return clamp(Math.round(score),0,100);
}
function calculateAgencyTier(){ const sc=calculateAgencyScore(); let t=TIERS[0];
  for(const x of TIERS) if(sc>=x.min) t=x; return t; }
function playerCategory(p){
  const L=leagueOf(p,S.world); const top=L&&L.tier===1; const pres=L?L.prestige:30;
  if(p.ca>=84||(pres>=85&&p.ca>=80)) return PLAYER_CATS[8];
  if(top&&p.ca>=76) return PLAYER_CATS[7];
  if(top&&p.age<=21&&p.pa>=82) return PLAYER_CATS[6];
  if(top&&p.ca>=68) return PLAYER_CATS[5];
  if(top&&p.ca>=58) return PLAYER_CATS[4];
  if(top&&p.age<=21) return PLAYER_CATS[3];
  if(p.age>21&&p.ca>=45) return PLAYER_CATS[2];
  if(L&&L.tier===2&&p.age<=21) return PLAYER_CATS[1];
  return p.age<=21? PLAYER_CATS[0]:PLAYER_CATS[2];
}
function calculatePlayerWillingness(p){
  const cat=playerCategory(p);
  let w = S.rep*0.30 + statusTotal()*0.13 + officePrestige()*0.10
    + (S.mediaPower||0)*0.06 + (S.sponsorNetwork||0)*0.06
    + calculateTrackRecordScore()*0.30
    + (p.nat==="tr"?6:0) + (p.age<=19?7:0)
    + (p.famTrust!=null? (p.famTrust-40)*0.16:0)
    - Math.max(0,p.mediaPop-52)*0.30
    - (p.rivalId? (RIVALS.find(r=>r.id===p.rivalId)?.power??30)*0.22:0)
    - (S.shady||0)*0.2 - (S.cash<0?5:0);
  const _rp=repProfile();
  w+=(_rp.playerTrust-50)*0.06 + (p.age<=20?(_rp.youthDevelopment-50)*0.06:0) + (_rp.ethical-55)*0.03;
  if(cat.tier>=5) w+=(_rp.international-30)*0.12;
  if(p.char==="ego") w-=9;
  if(p.char==="aile") w+= p.famTrust>52? 5:-5;
  if(p.char==="sokak") w+=4;
  if(p.family==="guvensiz") w-= ((S.trackRecord||{}).transfers?2:9);
  if(p.family==="avrupa"&&S.officeLevel<2) w-=6;
  const tier=calculateAgencyTier().lv;
  if(tier<cat.tier) w-=(cat.tier-tier)*13;
  if(tier>=cat.tier) w+=10;
  if(S.approach==="genc"&&p.age<=19) w+=5;
  if(focusOn("iliski")) w+=4;
  if(S.assets.some(a=>a.type==="Villa")&&p.age<=19) w+=4;
  if(S.assets.some(a=>a.type==="Spor Salonu")&&p.age<=21) w+=3;
  return clamp(Math.round(w),0,100);
}
function getWillingnessReasons(p){
  const out=[]; const cat=playerCategory(p);
  const tier=calculateAgencyTier();
  if(tier.lv<cat.tier) out.push(`Ajans seviyen düşük — ${cat.label} için en az ${TIERS[cat.tier-1].name} olmalısın.`);
  if(S.rep<45&&cat.minW>=35) out.push("İtibarın bu seviye bir oyuncu için henüz yetersiz.");
  if(!(S.trackRecord||{}).transfers) out.push("Kanıtlanmış transfer geçmişin yok — aile 'kim bu?' diyor.");
  if(p.rivalId){const r=RIVALS.find(x=>x.id===p.rivalId); if(r) out.push(`${r.name} (${r.style.toLowerCase()}) oyuncuyla önceden temas kurmuş.`);}
  if(p.famTrust!=null&&p.famTrust<40) out.push("Aile sana henüz güvenmiyor.");
  if(p.family==="avrupa"&&S.officeLevel<2) out.push("Aile global bağlantısı olan bir ajans istiyor — ofisini büyüt.");
  if((S.shady||0)>20) out.push("Hakkındaki şaibe söylentileri aileyi ürkütüyor.");
  if(S.cash<0) out.push("Borçtaki bir ajansa kimse kariyerini emanet etmez.");
  if(!out.length) out.push("Genel profilini yükselt: itibar, ofis, başarı hikâyesi.");
  return out;
}
function calculateCareerFit(p,c){
  const gap=c.strength-p.ca;
  const play=Math.round(clamp(0.35+(p.ca-c.strength+12)/40+p.form/300,0.05,0.95)*100);
  let score=55 - Math.max(0,gap-6)*3.2 - Math.max(0,-gap-14)*1.5
    + (c.facility-60)*0.25 + (p.age<=21&&gap>0&&gap<=8?10:0);
  return {score:clamp(Math.round(score),0,100), play, gap};
}

/* ---------- dünya kurulumu ---------- */
function buildWorld(seed){
  srand(seed); _pid=0;
  const world = {seed, leagues:[], clubs:{}, players:{}, youthPool:[]};
  for(const L of SEED_LEAGUES){
    const league={...L, clubIds:[]}; delete league.clubs;
    for(const cname of L.clubs){
      const cid="c"+cname.replace(/\W/g,"");
      const club={id:cid,name:cname,leagueId:L.id,strength:ri(L.str[0],L.str[1]),
        prestige:clamp(L.prestige+ri(-12,12),5,99), budget:0, relation:ri(5,25),
        facility: clamp(L.prestige+ri(-15,20),15,95),
        needs:makeClubNeeds(), profile:pick(CLUB_PROFILES),
        lastResult:null};
      club.budget = Math.round(club.prestige*club.strength*ri(800,2000));
      world.clubs[cid]=club; league.clubIds.push(cid);
      // kulüp başına 5 bilinen oyuncu
      for(let i=0;i<5;i++){const p=makePlayer(L,{clubId:cid});
        p.wage=ri(L.salary[0],L.salary[1]); world.players[p.id]=p;}
    }
    world.leagues.push(league);
  }
  // keşfedilmemiş genç havuzu (scouting hedefleri)
  for(let i=0;i<70;i++){
    const L = pick(world.leagues.filter(l=>l.scoutValue>25).concat([world.leagues[1],world.leagues[3]]));
    const p = makePlayer(L,{age:ri(15,19), discovered:false, clubId:pick(L.clubIds)});
    p.wage = ri(300, 2000); p.ca=clamp(p.ca-ri(4,10),20,70);
    p.pa=clamp(p.ca+ri(8,34)+(p.gem?10:0),p.ca+5,97);
    world.players[p.id]=p; world.youthPool.push(p.id);
  }
  for(const id in world.players) world.players[id].value=calcValue(world.players[id],world);
  return world;
}

/* ---------- maç + gelişim simülasyonu ---------- */
function simMatches(sum){
  const W=S.world;
  for(const L of W.leagues){
    const ids=[...L.clubIds]; // basit eşleşme: karıştır, ikişer eşle
    for(let i=ids.length-1;i>0;i--){const j=ri(0,i);[ids[i],ids[j]]=[ids[j],ids[i]]}
    for(let i=0;i+1<ids.length;i+=2){
      const A=W.clubs[ids[i]], B=W.clubs[ids[i+1]];
      const diff=(A.strength-B.strength)/10 + gauss()*1.6;
      const ga=clamp(Math.round(1.2+diff/2+gauss()),0,5), gb=clamp(Math.round(1.2-diff/2+gauss()),0,5);
      A.lastResult={vs:B.name,gf:ga,ga:gb}; B.lastResult={vs:A.name,gf:gb,ga:ga};
    }
  }
  for(const p of Object.values(W.players)){
    if(p.injury){ p.injury.weeks--; if(p.injury.weeks<=0){p.injury=null; addNewsIfMine(p,`${p.name} sahalara döndü`,`Sakatlığını atlatan oyuncu takımla çalışmalara başladı.`,"good");} continue; }
    const club=W.clubs[p.clubId]; if(!club) continue;
    const ct=(p.coachTrust??50);
    let playChance = clamp(0.18 + (p.ca-club.strength+12)/45 + p.form/400 + (ct-50)/120, 0.05, 0.95);
    if(p.suspension>0) playChance=0;
    const played = rnd()<playChance;
    let rating=0, mins=0, goals=0, assists=0, ev=[];
    if(played){
      mins = rnd()<0.75? ri(58,90): ri(12,40);
      const oppStr=club.strength+ri(-12,12);
      rating = clamp(p.ca/10*0.72 + (p.form-50)/55 + (p.morale-50)/95 + (club.strength-oppStr)/38 + gauss()*1.05, 3, 10);
      if(p.breakout) rating=clamp(rating+0.9,3,10);
      const atk = p.pos==="ST"?0.42: p.pos==="W"?0.3: p.pos==="AM"?0.26: p.pos==="CM"?0.1: 0.04;
      if(rnd()< atk*(rating/7)) {goals=rnd()<0.15?2:1; ev.push("gol");}
      if(rnd()< (atk*0.8+0.05)*(rating/7)) {assists=1; ev.push("asist");}
      if(goals) rating=clamp(rating+goals*0.7,3,10);
      const _cs=club.lastResult && club.lastResult.ga===0;
      rating=clamp(rating+posFlavor(p,rating,ev,_cs),3,10);
      if(rnd()< 0.015+(100-p.discipline)/2500){ ev.push("kırmızı"); p.suspension=2; p.coachTrust=clamp((p.coachTrust??50)-5,5,97); }
      if(rnd()< BAL.injuryBase*(0.5+p.injProne/60)*(mins/90)){
        const sev=rnd(); const wks= sev<0.6?ri(1,3): sev<0.9?ri(4,9): ri(10,22);
        p.injury={weeks:wks,label:wks<4?"Hafif":wks<10?"Orta":"Ağır"}; ev.push("sakatlık");
        addNewsIfMine(p,`${p.name} sakatlandı`,`${p.injury.label} sakatlık — tahmini ${wks} hafta yok.`,"bad");
      }
      rating=Math.round(rating*10)/10;
      p.seasonStats.apps++; p.seasonStats.goals+=goals; p.seasonStats.assists+=assists;
      p.seasonStats.ratSum+=rating; p.seasonStats.ratN++;
      p.form=clamp(Math.round(p.form*0.7+rating*10*0.3),5,99);
      p.coachTrust=clamp((p.coachTrust??50)+(rating>=7.2?2: rating<5.8?-2:0.4),5,97);
      p.morale=clamp(p.morale+(rating>=7.5?4:rating<5.8?-4:1),5,99);
      if(p.agent==="you"){
        sum.performances.push({p,rating,goals,assists,mins,ev});
        if(rating>=8.3) addNews("me",`${p.name} sahneyi salladı! ⭐${rating}`, matchLine(p,rating,goals,assists),"good");
        if(!p.breakout && p.age<=21 && rating>=8.5 && rnd()<0.5){ p.breakout=true; p.breakoutWeeks=ri(4,6);
          addNews("me",`PATLAMA: ${p.name} 🔥`,`Genç yıldız art arda parlıyor — piyasa hareketlendi, kulüpler hattı ısıttı.`,"good"); }
      }
    } else {
      p.morale=clamp(p.morale-(p.ambition>60?3:1.5),5,99);
      p.form=clamp(p.form-1,5,99);
      p.coachTrust=clamp((p.coachTrust??50)-0.3,5,97);
      mins=0;
    }
    // gelişim
    const ageM = p.age<=17?1.6: p.age<=21?1.3: p.age<=24?1.0: p.age<=27?0.4: p.age<=30?0.05:-0.06*(p.age-30);
    const minsM = clamp(mins/85,0.12,1.2);
    const facM = 0.7+ (club.facility/200);
    const gap = clamp((p.pa-p.ca)/28,0,1.15);
    let d = BAL.devBase*ageM*minsM*facM*(0.8+p.prof/300)*(p.devSpeed/50)*gap*(p.devMod||1)*(focusOn("genc")&&p.age<=21?1.08:1);
    if(p.injury) d=-0.02;
    if(p.breakout) d*=1.8;
    p.ca=clamp(p.ca+d, 15, p.pa);
    if(p.devMod && p.devMod!==1) p.devMod += (1-p.devMod)*0.02;
    if(p.breakout){ p.breakoutWeeks--; if(p.breakoutWeeks<=0) p.breakout=false; }
    p.value = calcValue(p,W);
    p.ratings.push(played?rating:null); p.ratings=p.ratings.slice(-6);
    if(p.agent==="you"){
      p.mediaPop=clamp(p.mediaPop+(rating>=8?2:0)-(0.2),1,99);
      p.followers=Math.round(p.mediaPop**2*35);
      // kulüp ilgisi
      for(const L of W.leagues){ if(rnd()<0.2) continue;
        for(let k=0;k<2;k++){
          const cid=pick(L.clubIds); if(cid===p.clubId) continue;
          const c=W.clubs[cid];
          let d2=(p.ca-c.strength+14)*0.6 + (rating>=7.5?8:0) + (p.breakout?9:0) + c.relation/25 - (p.value>c.budget?10:0) + ((c.needs?.[p.pos]??50)-50)/12;
          p.interest[cid]=clamp((p.interest[cid]||0)+d2, 0, 100);
        }
      }
      p.lastMatch=played?{r:rating,mins,goals,assists,ev:ev.slice(0,4)}:null;
      (p.ratingHistory=p.ratingHistory||[]).push(played?rating:null); if(p.ratingHistory.length>16)p.ratingHistory.shift();
      (p.minutesHistory=p.minutesHistory||[]).push(mins); if(p.minutesHistory.length>16)p.minutesHistory.shift();
      p.agentWeeksLeft--;
      const _fRel=focusOn("iliski")?0.5:1;
      p.loyalty=clamp(p.loyalty + (p.morale>65?0.3:-0.5*_fRel) - (mins===0?0.6*_fRel:0),5,99);
    }
  }
}
function matchLine(p,r,g,a){
  if(g>=2) return `${p.name} attığı ${g} golle maça damga vurdu. Tribünler ismini haykırdı.`;
  if(g===1) return `${p.name} golüyle takımını sırtladı, rating ${r}.`;
  if(a) return `${p.name} asistiyle oyunu çözdü, maçın en iyilerindendi.`;
  return `${p.name} bütün maç boyunca sahanın en formda ismiydi (${r}).`;
}

/* ---------- scouting ---------- */
function simScouts(sum){
  for(const sc of S.scouts){
    if(!sc.assign) continue;
    ledger("Scout maaşı — "+sc.name, -sc.cost);
    if(sc.need<=0) sc.need = ri(2,4)-Math.floor(sc.quality/3);
    sc.progress+= (focusOn("scout")?1.5:1) + deptBonus("scouting")*0.6;
    if(sc.progress>=sc.need){
      sc.progress=0; sc.need=0;
      let pool = S.world.youthPool.map(id=>S.world.players[id])
        .filter(p=>!p.discovered && !p.retired && S.world.clubs[p.clubId]?.leagueId===sc.assign.leagueId);
      const typ=sc.assign.type||(sc.assign.youth?"u19":"genel");
      if(typ==="u19") pool=pool.filter(p=>p.age<=19);
      if(pool.length===0){ addNews("","Scout raporu boş döndü",`${sc.name}: "Bölgede taranmadık kimse kalmadı, beni başka lige ata."`); continue; }
      const sorted= typ==="gem"? [...pool].sort((a,b)=>(b.pa-b.ca)-(a.pa-a.ca))
        : typ==="ucuz"? [...pool].sort((a,b)=>a.value-b.value)
        : [...pool].sort((a,b)=>b.pa-a.pa);
      const mk=(p)=>{
        p.discovered=true;
        const err = Math.max(3, 20*(1-sc.reliability/100)*(p.age<=16?1.5:p.age<=18?1.2:1))*(focusOn("scout")?0.85:1);
        const shift = p.gem? -err*0.5 : 0;
        const lo=clamp(Math.round(p.pa-err+shift),20,97), hi=clamp(Math.round(p.pa+err*0.7+shift),lo+3,97);
        const conf = clamp(Math.round(100-err*2.6),20,93);
        S.reports.unshift({id:"r"+ri(1e4,9e4), pid:p.id, scout:sc.name, week:S.week, lo, hi, conf, opened:false,
          note: pick(["Topa ilk dokunuşu sıra dışı.","Fiziği daha oturmamış ama oyun zekâsı parlıyor.","Bölgedeki herkes ondan bahsediyor.","Sessiz bir çocuk ama sahada başka biri oluyor.","Antrenmanda gördüklerim maçta gördüklerimden bile iyiydi."])});
        sum.newReports++;
      };
      mk(sorted[ri(0, Math.min(sorted.length-1, 6-sc.quality))]);
      const rest=sorted.filter(p=>!p.discovered);
      if(sc.quality>=3 && rest.length && rnd()<0.35){ mk(rest[0]);
        addNews("me",`${sc.name} kısa liste getirdi 📋`,"Bu görev iki adaylı döndü — raporları karşılaştır.","good"); }
      notify("scout","Yeni scout raporu geldi","scout","rapor");
    }
  }
}

/* ---------- transfer teklifleri ---------- *//* ---------- transfer teklifleri ---------- */
function simOffers(sum){
  S.offers = S.offers.filter(o=>o.expires> S.week + (o.season<S.season? -100:0));
  if(!inWindow(S.week)) return;
  let made=0;
  for(const p of myPlayers()){
    if(made>=3 || p.injury || p.loan) continue;
    const hot = Object.entries(p.interest).filter(([cid,v])=>v>=55).sort((a,b)=>b[1]-a[1]).slice(0,2);
    for(const [cid] of hot){
      if(made>=3) break;
      if(rnd()<0.4) continue;
      if(S.offers.filter(o=>o.pid===p.id).length>=2) continue;
      if(S.offers.some(o=>o.pid===p.id&&o.cid===cid)) continue;
      const c=S.world.clubs[cid];
      const needM=((c.needs?.[p.pos]??50)/100)*0.4+0.8;
      const _lowball=p.value*(0.8+(rnd()<0.15?0.15:0));
      let fee=Math.round(p.value*(1.0+rnd()*0.6)*needM/1000)*1000;
      if(contractWeeksLeft(p)<40) fee=Math.round(fee*0.7/1000)*1000;
      if(fee>c.budget*1.4) continue;
      if(S.delegation&&S.delegation.autoReject&&S.staff.lawyer&&fee<_lowball){
        addNews("","Hukuk ekibi düşük teklifi eledi",`${c.name} → ${p.name} (${fmtM(fee)}) teklifi otomatik reddedildi.`); continue; }
      const L=S.world.leagues.find(l=>l.id===c.leagueId);
      const wage=clamp(Math.round((p.wage*1.4+L.salary[1]*0.3)/100)*100, L.salary[0], L.salary[1]);
      const comm=Math.round(fee*p.agentCommission);
      S.offers.push({id:"o"+ri(1e4,9e4), pid:p.id, cid, fee, wage, comm,
        sellOn: rnd()<0.5? 10:0, signBonus: rnd()<0.4? Math.round(fee*0.03/1000)*1000:0,
        playGuar: rnd()<0.45, patience:3,
        expires:S.week+2, season:S.season, countered:false});
      sum.newOffers++; made++;
      addNews("me",`${c.name}, ${p.name} için resmen devrede`,`Kulüp ${fmtM(fee)} bandında bir teklif iletti. Pencere kapanmadan karar gerekiyor.`);
      notify("transfer",`${p.name} için teklif: ${c.name} (${fmtM(fee)})`,"transfer","teklif");
    }
  }
}
function acceptOffer(o){
  const p=S.world.players[o.pid], from=S.world.clubs[p.clubId], to=S.world.clubs[o.cid];
  const toL=S.world.leagues.find(l=>l.id===to.leagueId);
  let _commPay=o.comm;
  // Transfer Operasyonları departmanı komisyon verimini artırır (doğrudan gelir etkisi)
  const _opsBonus=Math.round(o.comm*deptBonus("transferOps")*0.08);
  if(_opsBonus>0){ _commPay+=_opsBonus; }
  if((S.advanceCount||0)>0){ S.advanceCount--; _commPay=Math.round(_commPay/2);
    addNews("me","Avans kesintisi",`${p.name} komisyonunun yarısı avans geri ödemesine gitti.`,""); }
  ledger(`Transfer komisyonu — ${p.name} → ${to.name}${_opsBonus>0?" (+ops verimi)":""}`, _commPay);
  S.totalCommission+=o.comm;
  p.clubId=o.cid; p.wage=o.wage; p.interest={};
  const fit = calculateCareerFit(p,to);
  if(fit.score<38){ p.morale=clamp(p.morale-10,5,99); p.devMod=0.75; p.loyalty=clamp(p.loyalty-6,5,99);
    addNews("me",`Riskli hamle mi?`,`${p.name} ${to.name} kadrosunda kendine yer bulmakta zorlanabilir. Gelişimi yavaşlarsa fatura menajere kesilir.`,"bad"); }
  else if(fit.score>=65){ p.morale=clamp(p.morale+12,5,99); p.loyalty=clamp(p.loyalty+10,5,99); p.devMod=1.2;
    addNews("me",`Kariyer mühendisliği ✅`,`${p.name} için doğru adres: düzenli süre, iyi tesis. Aile ve medya hamleyi övüyor.`,"good"); }
  else { p.morale=clamp(p.morale+8,5,99); p.loyalty=clamp(p.loyalty+5,5,99); p.devMod=1; }
  if(o.signBonus) ledger("İmza parası payı — "+p.name, Math.round(o.signBonus*0.1));
  S.trackRecord.transfers++; S.trackRecord.biggestFee=Math.max(S.trackRecord.biggestFee,o.fee);
  if(fit.score>=65) S.trackRecord.topMoves++;
  if(p.gem) S.trackRecord.gems++;
  S.mediaPower=clamp((S.mediaPower||0)+2+Math.min(5,o.fee/8e6),0,100);
  S.status=clamp(S.status+1,0,60);
  bumpRep("negotiation",2); bumpRep("clubTrust",1);
  if(p.age<=21&&fit.score>=65) bumpRep("youthDevelopment",3);
  if(to.needs) to.needs[p.pos]=clamp((to.needs[p.pos]??50)-30,0,100);
  (p.careerEvents=p.careerEvents||[]).push({s:S.season,w:S.week,t:"Transfer",d:`${from?from.name:"?"} → ${to.name} · ${fmtM(o.fee)}`});
  if(p.careerEvents.length>20)p.careerEvents.shift();
  if(S.history){ S.history.transferHistory.unshift({s:S.season,w:S.week,name:p.name,from:from?from.name:"?",to:to.name,fee:o.fee,comm:o.comm});
    S.history.transferHistory=S.history.transferHistory.slice(0,30); }
  p.contractEndSeason=S.season+ri(2,4); p.contractEndWeek=ri(20,42); p.coachTrust=clamp(45+Math.round((p.ca-to.strength)*1.2),20,80);
  taskDone("transfer");
  S.rep=clamp(S.rep + 2 + Math.min(6,o.fee/5e6), 0, 100);
  p.mediaPop=clamp(p.mediaPop+6,1,99);
  S.offers=S.offers.filter(x=>x.pid!==p.id);
  addNews("me",`İMZA: ${p.name} → ${to.name} ✍️`,`${fmtM(o.fee)} bonservis. Ajans kasasına ${fmtM(o.comm)} komisyon girdi.${o.sellOn?` Sonraki satıştan %${o.sellOn} pay da cepte.`:""}`,"good");
  milestone("firstTransfer","İlk transferini tamamladın! 🎉");
  if(S.totalCommission>=1e6) milestone("m1","Toplam 1M€ komisyon! Artık ciddi bir oyuncusun. 💰");
  toast(`+${fmtM(o.comm)} komisyon`, "green"); confettiIfBig(o.comm);
}
function counterOffer(o){
  const p=S.world.players[o.pid];
  o.patience=(o.patience??3)-1;
  const roll=rnd() + S.rep/300 + (S.staff.lawyer?0.06:0) + (S.approach==="pazarlik"?0.05:0) - (o.patience<=0?0.25:0);
  if(roll<0.55){ // kabul
    o.fee=Math.round(o.fee*1.22/1000)*1000; o.comm=Math.round(o.fee*p.agentCommission); o.wage=Math.round(o.wage*1.1/100)*100;
    toast("Kulüp yeni şartları kabul etti! 🤝","green"); return "ok";
  } else if(roll<0.85 && o.patience>0){
    o.fee=Math.round(o.fee*1.1/1000)*1000; o.comm=Math.round(o.fee*p.agentCommission);
    toast("Ortada buluştular: +%10","gold"); return "half";
  } else {
    S.offers=S.offers.filter(x=>x.id!==o.id);
    const c=S.world.clubs[o.cid];
    c.relation=clamp(c.relation-6,0,100);
    addNews("me","Masa dağıldı",`${c.name} pazarlıktan çekildi. Belki gelecek pencere...`,"bad");
    toast("Kulüp masadan kalktı 😬"); return "gone";
  }
}

function recordHistory(sum){
  if(!S.history) return;
  const mp=myPlayers();
  const inc=S.ledger.filter(l=>l.w===S.week&&l.amt>0).reduce((t,l)=>t+l.amt,0);
  const exp=S.ledger.filter(l=>l.w===S.week&&l.amt<0).reduce((t,l)=>t-l.amt,0);
  S.history.agencyWeekly.push({s:S.season,w:S.week,cash:Math.round(S.cash),rep:Math.round(S.rep),
    score:calculateAgencyScore(),tier:S.agencyTierLv,pv:mp.reduce((t,p)=>t+p.value,0),n:mp.length,inc,exp});
  if(S.history.agencyWeekly.length>170) S.history.agencyWeekly.splice(0,S.history.agencyWeekly.length-170);
  for(const p of mp){
    (p.valueHistory=p.valueHistory||[]).push(p.value); if(p.valueHistory.length>64)p.valueHistory.shift();
    (p.caHistory=p.caHistory||[]).push(Math.round(p.ca*10)/10); if(p.caHistory.length>64)p.caHistory.shift();
  }
}
function runwayWeeks(){
  if(S.cash<=0) return 0;
  const H=(S.history&&S.history.agencyWeekly)||[]; if(H.length<4) return null;
  const last=H.slice(-6);
  const burn=last.reduce((t,x)=>t+(x.exp-x.inc),0)/last.length;
  if(burn<=0) return null;
  return Math.max(0,Math.round(S.cash/burn));
}
function generateAgencyInsights(){
  const out=[]; const mp=myPlayers();
  const tv=mp.reduce((t,p)=>t+p.value,0);
  if(mp.length>1&&tv>0){ const top=mp.reduce((a,b)=>a.value>b.value?a:b);
    const share=Math.round(top.value/tv*100);
    if(share>=60) out.push(`Portföy değerinin %${share}'i ${top.name}'e bağlı — riski dağıt.`); }
  const rw=runwayWeeks();
  if(rw!=null&&rw<12) out.push(`Mevcut gider hızıyla kasan yaklaşık ${rw} hafta dayanır.`);
  for(const p of mp){
    const played=(p.ratingHistory||[]).slice(-4).filter(r=>r!=null).length;
    if(played<=1&&!p.injury&&!p.loan&&p.clubId){ out.push(`${p.name} son 4 haftada neredeyse hiç oynamadı — kiralık veya görüşme düşün.`); break; }
  }
  const soon=mp.find(p=>p.clubId&&contractWeeksLeft(p)<40);
  if(soon) out.push(`${soon.name}'in kulüp sözleşmesi azalıyor — yenile ya da bonservissiz gitmeden sat.`);
  if(S.reports.filter(r=>!r.opened).length>=2) out.push("Açılmamış scout raporların birikiyor.");
  return out.slice(0,4);
}

function pruneHistory(st){
  if(!st) return st;
  if(st.history){
    if(st.history.agencyWeekly.length>170) st.history.agencyWeekly=st.history.agencyWeekly.slice(-170);
    st.history.transferHistory=(st.history.transferHistory||[]).slice(0,30);
  }
  if(st.notifications&&st.notifications.length>40) st.notifications.length=40;
  // oyuncu geçmişleri: son 5 sezon (~210 hafta) detay
  const HCAP=210;
  for(const id in (st.world&&st.world.players||{})){ const p=st.world.players[id];
    for(const k of ["valueHistory","caHistory","ratingHistory","minutesHistory"])
      if(Array.isArray(p[k])&&p[k].length>HCAP) p[k]=p[k].slice(-HCAP);
    if(Array.isArray(p.careerEvents)&&p.careerEvents.length>24) p.careerEvents=p.careerEvents.slice(-24);
  }
  // pazarlık oturumları: sadece son 30 gün önemli görüşme
  if(st.negotiationSessions){ const keys=Object.keys(st.negotiationSessions);
    if(keys.length>40) for(const k of keys.slice(0,keys.length-40)) delete st.negotiationSessions[k]; }
  if(Array.isArray(st.departmentTasks)&&st.departmentTasks.length>60) st.departmentTasks=st.departmentTasks.slice(-60);
  return st;
}
function pruneInbox(st){

function seasonAwards(){

  const avg=p=>p.seasonStats.ratSum/p.seasonStats.ratN;

  const byRat=[...all].sort((a,b)=>avg(b)-avg(a))[0];
  const young=all.filter(p=>p.age<=21);
  const byYoung=young.length?[...young].sort((a,b)=>avg(b)-avg(a))[0]:null;
  S.lastAwards={season:S.season,pending:true,list:[]};

      addNews("me",`ÖDÜL: ${p.name} — ${t} 🏆`,`Sezon sonu ödül gecesinde sahneye senin oyuncun çıktı.`,"good");
    }
  };
  give("Gol Kralı",byGoals,`${byGoals.name} (${byGoals.seasonStats.goals} gol)`);
  give("Sezonun Oyuncusu",byRat,`${byRat.name} (${avg(byRat).toFixed(2)})`);
  if(byYoung) give("Yılın Genç Oyuncusu",byYoung);
  const bigDeal=((S.history&&S.history.transferHistory)||[]).filter(t=>t.s===S.season).sort((a,b)=>b.fee-a.fee)[0];
  if(bigDeal){
    S.lastAwards.list.push({t:"Yılın Anlaşması",name:`${bigDeal.name} → ${bigDeal.to} (${fmtM(bigDeal.fee)})`,mine:true});
    addNews("me",`Yılın Anlaşması senin masandan çıktı 🏆`,`${bigDeal.name} transferi (${fmtM(bigDeal.fee)}) sezona damga vurdu.`,"good");

  if(S.seasonObjectives&&S.seasonObjectives.season===S.season){

    }

function runStabilitySimulation(weeks){
  if(!S){ console.warn("Önce oyun başlat"); return; }
  weeks=weeks||100;
  const snap=JSON.stringify({...S,decisions:[]});
  let errs=0, msg="";
  for(let i=0;i<weeks;i++){
    try{
      while(S.decisions.length){ const d=S.decisions[0];
        try{ if(typeof d.opts[0].fx==="function") d.opts[0].fx(); }catch(e){ errs++; msg=e.message; }
        S.decisions.shift(); }
      const sum={performances:[],newReports:0,newOffers:0,cashBefore:S.cash};
      advanceWeek(sum);
      const bad=[S.cash,S.rep,S.week,S.mediaPower].some(v=>typeof v!=="number"||Number.isNaN(v))
        || Object.values(S.world.players).some(p=>Number.isNaN(p.ca)||Number.isNaN(p.value));
      if(bad){ errs++; msg="NaN tespit edildi (hafta "+i+")"; break; }
    }catch(e){ errs++; msg=e.message; console.error("Simülasyon hatası, hafta",i,e); break; }
  }
  const rapor={hafta:weeks,hata:errs,not:msg||"temiz",kasa:fmtM(S.cash),itibar:Math.round(S.rep),tier:calculateAgencyTier().name};
  if(console.table) console.table([rapor]); else console.log(rapor);
  S=JSON.parse(snap); S.decisions=[];
  renderAll();
  toast(errs?`🧪 Test: ${errs} hata — konsola bak ⚠️`:`🧪 ${weeks} hafta hatasız ✅`, errs?"":"green");
  return rapor;
}

  try{ const prev=localStorage.getItem(SAVE_KEY); if(prev) localStorage.setItem(SAVE_KEY+"-backup",prev); }catch(e){}

}

function playerCard(p, compact){
  const club=S.world.clubs[p.clubId]; const val=fmtM(p.value);
  const badges=[`<span class="badge pos">${POS_LABEL[p.pos]}</span>`];
  if(p.injury) badges.push(`<span class="badge inj">🤕 ${p.injury.weeks}h</span>`);
  if(p.suspension>0) badges.push(`<span class="badge inj">Cezalı ${p.suspension}h</span>`);
  if(p.loan) badges.push(`<span class="badge pos">Kiralık ${p.loan.weeks}h</span>`);
  if(p.breakout) badges.push(`<span class="badge hot">🔥 Patlama</span>`);
  if(p.morale<40) badges.push(`<span class="badge sad">Mutsuz</span>`);
  if(p.rivalId&&p.agent==="you") badges.push(`<span class="badge inj">🦈 Rakip riski</span>`);
  if(S.offers.some(o=>o.pid===p.id)) badges.push(`<span class="badge ok">📩 Teklif var</span>`);
  const cw=p.clubId?contractWeeksLeft(p):null;
  if(cw!=null&&cw<26&&cw<999) badges.push(`<span class="badge sad">Kontrat ${Math.max(0,cw)}h</span>`);
  return `<div class="card tappable ${p.breakout?'gold':''}" onclick="openPlayer('${p.id}')">
    <div class="row">
      ${renderPlayerPortrait(p,46)}
      <div class="grow">
        <div class="row" style="justify-content:space-between">
          <span class="b">${p.natFlag} ${p.name}</span>
          <span class="b" style="color:#3E8E63">${val}</span></div>
        <div class="muted">${p.age} yaş · ${club?club.name:"Kulüpsüz"} · ${moodEmoji(p.morale)}${p.agent==="you"?` · ${p.squadRole||playerRole(p)}`:""}</div>
        <div class="row" style="justify-content:space-between;margin-top:3px">
          <div>${starStr(p.ca)}</div>${sparkline(p.ratings)}</div>
        ${compact?"":`<div class="badges">${badges.join("")}</div>`}
      </div></div></div>`;
}

/* ---------- OYUNCULARIM ---------- */
function pQ(v){ PSTATE.q=(v||"").toLowerCase(); const el=$("plist"); if(el) el.innerHTML=buildPlayerList(); }
function setPF(f){ PSTATE.f=f; renderAll(); }
function setPS(v){ PSTATE.s=v; renderAll(); }
function playersFiltered(){
  let arr=myPlayers();
  if(PSTATE.q) arr=arr.filter(p=>p.name.toLowerCase().includes(PSTATE.q)||(S.world.clubs[p.clubId]?.name||"").toLowerCase().includes(PSTATE.q));
  switch(PSTATE.f){
    case "genc": arr=arr.filter(p=>p.age<=20); break;
    case "form": arr=arr.filter(p=>p.form>=65); break;
    case "mutsuz": arr=arr.filter(p=>p.morale<45); break;
    case "sakat": arr=arr.filter(p=>p.injury); break;
    case "teklif": arr=arr.filter(p=>S.offers.some(o=>o.pid===p.id)); break;
    case "kontrat": arr=arr.filter(p=>p.clubId&&contractWeeksLeft(p)<40); break;
    case "risk": arr=arr.filter(p=>p.loyalty<45||p.morale<38||p.rivalId||(p.agentWeeksLeft>0&&p.agentWeeksLeft<15)); break;
  }
  const sf={value:(a,b)=>b.value-a.value,age:(a,b)=>a.age-b.age,form:(a,b)=>b.form-a.form,
    morale:(a,b)=>b.morale-a.morale,loyalty:(a,b)=>b.loyalty-a.loyalty,
    contract:(a,b)=>contractWeeksLeft(a)-contractWeeksLeft(b),pot:(a,b)=>b.pa-a.pa};
  return [...arr].sort(sf[PSTATE.s]||sf.value);
}
function buildPlayerList(){
  const arr=playersFiltered();
  return arr.length? arr.map(p=>playerCard(p)).join(""):`<div class="empty">Bu filtrede oyuncu yok.</div>`;
}
function renderPlayers(){
  const mp=myPlayers();
  const cap=BAL.officeLevels[S.officeLevel].cap;
  const tv=mp.reduce((t,p)=>t+p.value,0);
  const avgAge=mp.length?(mp.reduce((t,p)=>t+p.age,0)/mp.length).toFixed(1):"—";
  const avgMor=mp.length?Math.round(mp.reduce((t,p)=>t+p.morale,0)/mp.length):0;
  const ga=mp.reduce((t,p)=>t+p.seasonStats.goals+p.seasonStats.assists,0);
  const riskN=mp.filter(p=>p.loyalty<45||p.morale<38||p.rivalId).length;
  const offN=mp.filter(p=>S.offers.some(o=>o.pid===p.id)).length;
  let h=renderPageHero({tone:"blue",art:"pitch",eyebrow:"PORTFÖY YÖNETİMİ",
    title:`${mp.length} futbolcunun kariyeri elinde`,
    desc:`Kapasite ${mp.length}/${cap} · Bu sezon ${ga} gol katkısı`,
    metrics:[["Toplam Değer",fmtM(tv)],["Ort. Yaş",avgAge],["Ort. Moral",avgMor+" "+moodEmoji(avgMor)],["Riskli",riskN],["Teklif Alan",offN]]});
  h+=`
  <input class="search" placeholder="Oyuncu veya kulüp ara..." value="${PSTATE.q}" oninput="pQ(this.value)" aria-label="oyuncu ara">
  <div class="filterrow">${[["all","Tümü"],["genc","Gençler"],["form","Formda"],["mutsuz","Mutsuz"],["sakat","Sakat"],["teklif","Teklif Alan"],["kontrat","Kontratı Biten"],["risk","Riskli"]].map(([k,l])=>
    `<button class="fchip ${PSTATE.f===k?'on':''}" onclick="setPF('${k}')">${l}</button>`).join("")}</div>
  <div class="row" style="justify-content:flex-end;margin-bottom:8px"><label class="tiny" style="margin-right:6px">Sırala:</label>
  <select class="sel" onchange="setPS(this.value)" aria-label="sıralama">
    ${[["value","Piyasa değeri"],["pot","Potansiyel"],["age","Yaş"],["form","Form"],["morale","Moral"],["loyalty","Sadakat"],["contract","Sözleşme süresi"]].map(([k,l])=>`<option value="${k}" ${PSTATE.s===k?"selected":""}>${l}</option>`).join("")}
  </select></div>
  <div id="plist">${buildPlayerList()}</div>`;
  $("scr-players").innerHTML=h;
}

/* ---------- OYUNCU DETAY (sheet) ---------- */
function pdTab(pid,tab){ PDTAB=tab; openPlayer(pid); }
function careerStage(p){
  if(p.age<=17) return "Akademi Adayı";
  if(p.age<=20) return "Genç Profesyonel";
  if(p.age<=23) return "Gelişim Oyuncusu";
  if(p.age<=29) return "Prime Dönem";
  if(p.age<=32) return "Tecrübeli Lider";
  return "Kariyer Sonu";
}
function openPlayer(pid){
  const p=S.world.players[pid]; if(!p) return;
  if(typeof emitGameEvent==="function"&&!UI._suppressPush) emitGameEvent("PLAYER_PROFILE_OPENED",{pid});
  const club=S.world.clubs[p.clubId];
  const L=leagueOf(p,S.world);
  const isMine=p.agent==="you";
  const tabs=isMine?[["genel","Genel"],["perf","Performans"],["kariyer","Kariyer"],["soz","Sözleşme"],["pazar","Pazar"]]
                   :[["genel","Genel"],["perf","Performans"]];
  if(!tabs.some(([id])=>id===PDTAB)) PDTAB="genel";
  let h=`<div class="grab"></div>
  <div class="row">${renderPlayerPortrait(p,58)}
  <div class="grow"><div class="b" style="font-size:18px;font-family:'Fraunces',serif">${p.natFlag} ${p.name}</div>
  <div class="muted">${p.age} yaş · ${POS_LABEL[p.pos]} · ${club?club.name:"Kulüpsüz"} ${L?"· "+L.flag:""}</div>
  <div>${starStr(p.ca)} <span class="tiny">${careerStage(p)}</span></div></div>
  <div style="text-align:right"><div class="tiny">DEĞER</div><div class="b" style="color:#3E8E63;font-size:16px">${fmtM(p.value)}</div>
  ${isMine?`<div class="tiny">${p.squadRole||playerRole(p)}</div>`:""}</div></div>
  <div class="seg" style="margin-top:10px">${tabs.map(([id,l])=>`<button class="${PDTAB===id?'on':''}" onclick="pdTab('${p.id}','${id}')">${l}</button>`).join("")}</div>`;
  h+= PDTAB==="perf"? pdPerf(p): PDTAB==="kariyer"? pdCareer(p): PDTAB==="soz"? pdContract(p): PDTAB==="pazar"? pdMarket(p): pdOverview(p);
  showEntityPage("player",p.id,h,{section:PDTAB});
}
function pdOverview(p){
  const isMine=p.agent==="you";
  let h=`<div class="sb"><div class="lbl"><span>Form</span><span>${Math.round(p.form)}</span></div><div class="track"><div class="fill ${p.form>65?'g':p.form<40?'r':''}" style="width:${p.form}%"></div></div></div>
  <div class="sb"><div class="lbl"><span>Moral ${moodEmoji(p.morale)}</span><span>${Math.round(p.morale)}</span></div><div class="track"><div class="fill ${p.morale>65?'g':p.morale<40?'r':''}" style="width:${p.morale}%"></div></div></div>`;
  if(p.clubId){
    const ct=p.coachTrust??50;
    h+=`<div class="sb"><div class="lbl"><span>Hoca Güveni</span><span>${Math.round(ct)}</span></div><div class="track"><div class="fill ${ct>60?'g':ct<38?'r':'au'}" style="width:${ct}%"></div></div></div>
    <div class="tiny" style="margin:2px 2px 8px">${roleHint(p)}</div>`;
  }
  if(!isMine && p.discovered){
    if(p.agent){ h+=`<div class="card alt" style="text-align:center;margin-top:8px"><span class="badge sad">Başka bir menajerle çalışıyor</span></div>`; }
    else {
      const w=calculatePlayerWillingness(p); const cat=playerCategory(p);
      h+=`<div class="card alt" style="margin-top:8px">
      <div class="row" style="justify-content:space-between"><span class="muted">Kategori</span><span class="b">${cat.label}</span></div>
      <div class="sb"><div class="lbl"><span>Temsil Etme Şansı</span><span>%${w}</span></div><div class="track"><div class="fill ${w>=70?'g':w<35?'r':'au'}" style="width:${w}%"></div></div></div>
      ${w<50?`<div class="tiny" style="margin-top:2px">${getWillingnessReasons(p)[0]}</div>`:""}
      ${p.meetCooldown>0?`<div class="tiny" style="color:#C96A6A;margin-top:4px">Aile ${p.meetCooldown} hafta sonra görüşmeye açık.</div>`

function openMarketing(pid){
  const p=S.world.players[pid];

  <div class="muted" style="margin-bottom:8px">Kampanya kulüp ilgisini körükler. Pencere kapaliyken ilgi birikir, açılınca teklif gelir.</div>`;

function runCampaign(pid,type){
  if(typeof emitGameEvent==="function") emitGameEvent("PLAYER_MARKETED",{pid});
  const p=S.world.players[pid];
  const def=CAMPAIGNS.find(c=>c.id===type); if(!def) return;
  if(S.cash<def.cost){ toast("Yetersiz bakiye 💸"); return; }
  ledger(`Pazarlama (${def.label}) — ${p.name}`, -def.cost); taskDone("market");
  let boosted=0;
  for(const L of S.world.leagues){
    for(const cid of L.clubIds){
      if(cid===p.clubId) continue;
      const c=S.world.clubs[cid];
      let ch=0, amt=[0,0];
      if(type==="local"){ if(L.namePool!=="tr") continue; ch=0.4+c.relation/200; amt=[10,22]; }
      if(type==="europe"){ ch=0.3+c.relation/250; amt=[6,16]; }
      if(type==="vitrin"){ if(c.prestige<65) continue; ch=0.45; amt=[10,24]; }
      if(rnd()<ch && p.value<c.budget*1.6){ p.interest[cid]=clamp((p.interest[cid]||0)+ri(amt[0],amt[1]),0,100); boosted++; }
    }
  }
  if(type==="europe") p.mediaPop=clamp(p.mediaPop+3,1,99);
  if(type==="vitrin"){
    p.mediaPop=clamp(p.mediaPop+5,1,99);
    if(rnd()<0.35) addNews("",`Dedikodu: ${p.name} büyük transfere mi hazırlanıyor?`,`Menajerinin vitrin dosyası kulislerde dolaşıyor. Rakip menajerler de kokuyu aldı.`,"");
    if(rnd()<0.12&&!p.rivalId) p.rivalId=pick(RIVALS).id;
  }
  toast(boosted?`${boosted} kulübün radarına girdin 📡`:"Bu tur ilgi zayıf kaldı 😕", boosted?"green":"");
  save(); closeSheet(); renderAll();
}

    <button class="btn sm ghost" style="margin-top:6px" onclick="openOffer('${r.o.id}')">Masaya otur →</button></div>`;

const PROFILE_W={
 "Genç geliştirici":{fee:1.1,wage:0.9,sellOn:0.7,signBonus:1.2,playGuar:0.6},
 "Yıldız alıcı":{fee:0.7,wage:0.8,sellOn:1.3,signBonus:0.9,playGuar:1.1},
 "Satıcı kulüp":{fee:1.3,wage:1.0,sellOn:0.6,signBonus:1.0,playGuar:1.0},
 "Kiralık sever":{fee:1.0,wage:1.2,sellOn:0.9,signBonus:1.1,playGuar:0.7},
 "Maaş cömerti":{fee:1.1,wage:0.5,sellOn:1.0,signBonus:0.8,playGuar:1.0},
 "Yerli odaklı":{fee:1.0,wage:1.0,sellOn:1.0,signBonus:1.0,playGuar:0.9},
};
const PROFILE_HINT={
 "Genç geliştirici":"gençlere oynama garantisini kolay verir, bonservise direnir",
 "Yıldız alıcı":"bonservis öder ama sell-on sevmez",
 "Satıcı kulüp":"bonservisi yüksek tutmak ister",
 "Kiralık sever":"maaş yükünde katıdır",
 "Maaş cömerti":"maaşta esner, bonserviste pazarlıkçıdır",
 "Yerli odaklı":"dengeli ama temkinli pazarlık yapar",
};
const SELLON_STEPS=[0,10,15], SB_STEPS=[0,0.03,0.05];
function negoRow(label,val,dn,up){
  return `<div class="nego-line"><span class="muted">${label}</span><span class="row" style="gap:8px">
  <button class="btn sm ghost" style="min-height:32px;padding:4px 11px" aria-label="azalt" onclick="${dn}">−</button>
  <span class="b" style="min-width:78px;text-align:center">${val}</span>
  <button class="btn sm ghost" style="min-height:32px;padding:4px 11px" aria-label="artır" onclick="${up}">+</button></span></div>`;
}
function negoValues(o){
  const fee=Math.round(o.fee*(1+o.ask.fee*0.1)/1000)*1000;
  return {
    fee,
    wage:Math.round(o.wage*(1+o.ask.wage*0.1)/100)*100,
    sellOn:SELLON_STEPS[o.ask.sellOn],
    signBonus:Math.round(fee*SB_STEPS[o.ask.signBonus]/1000)*1000,
    playGuar:!!o.ask.playGuar,
  };
}
function negoLoad(o){
  const c=S.world.clubs[o.cid]; const w=PROFILE_W[c.profile]||{};
  return o.ask.fee*(w.fee??1)
   + o.ask.wage*(w.wage??1)*0.8
   + Math.max(0,o.ask.sellOn-(o.sellOn?SELLON_STEPS.indexOf(o.sellOn):0))*(w.sellOn??1)*0.7
   + Math.max(0,o.ask.signBonus-(o.signBonus?1:0))*(w.signBonus??1)*0.6
   + (o.ask.playGuar&&!o.playGuar?(w.playGuar??1)*0.8:0);
}
function openNegoTable(oid,msg){
  const o=S.offers.find(x=>x.id===oid); if(!o){ closeSheet(); renderAll(); return; }
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  if(!o.ask) o.ask={fee:0,wage:0,sellOn:Math.max(0,SELLON_STEPS.indexOf(o.sellOn||0)),signBonus:o.signBonus?1:0,playGuar:!!o.playGuar};
  const v=negoValues(o);
  const pat=o.patience??3;
  const load=negoLoad(o);
  const heat=load<1?"Rahat 🟢":load<2.2?"Gergin 🟡":"Riskli 🔴";
  let h=`<div class="grab"></div>
  <div style="text-align:center"><div class="tiny">PAZARLIK MASASI · TUR BAZLI</div>
  <div class="b" style="font-family:'Fraunces',serif;font-size:19px">${c.name} × ${p.name}</div>
  <div class="tiny">${c.profile||""} — ${PROFILE_HINT[c.profile]||""}</div></div>
  <div class="card alt" style="margin-top:8px">🗣️ ${msg||`"Masaya hoş geldin. Taleplerini duyalım."`}</div>
  <div class="card">
    ${negoRow("Bonservis",fmtM(v.fee),`negoAdj('${oid}','fee',-1)`,`negoAdj('${oid}','fee',1)`)}
    ${negoRow("Oyuncu maaşı",fmtM(v.wage)+"/hf",`negoAdj('${oid}','wage',-1)`,`negoAdj('${oid}','wage',1)`)}
    ${negoRow("Sell-on payı","%"+v.sellOn,`negoAdj('${oid}','sellOn',-1)`,`negoAdj('${oid}','sellOn',1)`)}
    ${negoRow("İmza parası",v.signBonus?fmtM(v.signBonus):"Yok",`negoAdj('${oid}','signBonus',-1)`,`negoAdj('${oid}','signBonus',1)`)}
    <div class="nego-line"><span class="muted">Oynama garantisi</span>
      <button class="btn sm ${o.ask.playGuar?'primary':'ghost'}" onclick="negoAdj('${oid}','playGuar',0)">${o.ask.playGuar?"İsteniyor ✅":"İstenmiyor"}</button></div>
    <div class="nego-line"><span class="muted">Ajans komisyonu (%${Math.round(p.agentCommission*100)})</span>
      <span class="b" style="color:#3E8E63">${fmtM(Math.round(v.fee*p.agentCommission))}</span></div>
    <div class="tiny" style="margin-top:6px">Talep yükü: <b>${heat}</b> · Kulüp sabrı: ${pat} tur</div>
    <div class="patience"><div class="pf" style="width:${clamp(pat/3*100,5,100)}%"></div></div>
  </div>

  { const _u=negoSessionUI(oid); if(_u)_u.activeStep="package"; showEntityPage("negotiation",oid, negoStepperHeader(oid,"package")+h, {section:"package"}); return; }

function negoAdj(oid,k,d){
  const o=S.offers.find(x=>x.id===oid); if(!o||!o.ask) return;
  if(k==="playGuar"){ o.ask.playGuar=!o.ask.playGuar; }
  else { const max={fee:3,wage:2,sellOn:2,signBonus:2}[k]; o.ask[k]=clamp(o.ask[k]+d,0,max); }
  openNegoTable(oid);
}
function sendNegoOffer(oid){
  const o=S.offers.find(x=>x.id===oid); if(!o) return;
  const p=S.world.players[o.pid]; const c=S.world.clubs[o.cid];
  if((o.patience??3)<=0) return;
  o.patience=(o.patience??3)-1;
  if(o.budget==null) o.budget=2.2+rnd()*1.4;
  const load=negoLoad(o);
  if(rnd()<0.12){ addNews("",`Sızıntı: ${p.name} pazarlığı basında`,`${c.name} ile görüşmeler medyaya sızdı. Baskı ve değer arttı.`,"");
    p.mediaPop=clamp(p.mediaPop+2,1,99);
    if(rnd()<0.3&&!p.rivalId){ p.rivalId=pick(RIVALS).id; rlog(p.rivalId,`${p.name} pazarlığına burnunu soktu`); } }
  const succ=clamp((0.75-load*0.13+S.rep/300+(S.staff.lawyer?0.06:0)+(S.approach==="pazarlik"?0.06:0)+(focusOn("pazarlik")?0.06:0)+(repProfile().negotiation-50)/250)*(load>o.budget?0.5:1),0.05,0.95);
  const roll=rnd();
  if(roll<succ){
    const v=negoValues(o);
    o.fee=v.fee; o.wage=v.wage; o.sellOn=v.sellOn; o.signBonus=v.signBonus; o.playGuar=v.playGuar;
    o.comm=Math.round(o.fee*p.agentCommission);
    o.ask={fee:0,wage:0,sellOn:SELLON_STEPS.indexOf(o.sellOn),signBonus:o.signBonus?1:0,playGuar:o.playGuar};
    o.budget=Math.max(0,o.budget-load*0.85);
    bumpRep("negotiation",1);
    toast("Kulüp şartları kabul etti 🤝","green");
    save(); openNegoTable(oid,`"Zor pazarlıkçısın... Kabul. Kalemler güncellendi." 🤝`);
  } else if(roll<succ+0.3 && o.patience>0){
    o.ask.fee=Math.ceil(o.ask.fee/2); o.ask.wage=Math.ceil(o.ask.wage/2);
    const v=negoValues(o);
    o.fee=v.fee; o.wage=v.wage; o.comm=Math.round(o.fee*p.agentCommission);
    o.ask.fee=0; o.ask.wage=0;
    toast("Kulüp ortada buluştu","gold");
    save(); openNegoTable(oid,`"Ortada buluşalım — bonservis ve maaşta biraz esnedik, gerisi zor."`);
  } else if(o.patience<=0){
    S.offers=S.offers.filter(x=>x.id!==o.id);
    c.relation=clamp(c.relation-6,0,100);
    addNews("me","Masa dağıldı",`${c.name} pazarlıktan çekildi. Belki gelecek pencere...`,"bad");
    toast("Kulüp masadan kalktı 😬");
    save(); closeSheet(); renderAll();
  } else {
    save(); openNegoTable(oid,`"Bu şartlar bizim için ağır. Taleplerini düşür ya da vazgeç." 😤`);
  }
  renderChrome();
}

const SP_DUR=[24,40,56], SP_SHARE=[20,25,30];
function openSponsorNego(spid,msg){

    ${negoRow("Süre",SP_DUR[sp.ask.dur]+" hf",`spAdj('${spid}','dur',-1)`,`spAdj('${spid}','dur',1)`)}
    ${negoRow("Ajans payı","%"+SP_SHARE[sp.ask.share],`spAdj('${spid}','share',-1)`,`spAdj('${spid}','share',1)`)}
    <div class="nego-line"><span class="muted">Ajansa aylık</span><span class="b" style="color:#3E8E63">${fmtM(cut)}</span></div>
    <div class="tiny" style="margin-top:4px">Kalan deneme hakkı: ${2-(sp.tries||0)} · Skandal maddesi: var</div>
  </div>
  <button class="btn block primary" onclick="sendSponsorOffer('${spid}')">📨 Şartları Gönder</button>
  <button class="btn block ghost" style="margin-top:8px" onclick="closeSheet()">Sonra Dönerim</button>`;
  openSheet(h);

function spAdj(spid,k,d){
  const sp=(S.sponsorPipeline||[]).find(x=>x.id===spid); if(!sp||!sp.ask) return;
  sp.ask[k]=clamp(sp.ask[k]+d,0,2);
  openSponsorNego(spid);
}
function sendSponsorOffer(spid){
  const sp=(S.sponsorPipeline||[]).find(x=>x.id===spid); if(!sp) return;
  const p=S.world.players[sp.pid];
  sp.tries=(sp.tries||0)+1;
  const load=sp.ask.pay*1+sp.ask.share*0.9+(2-sp.ask.dur)*0.2;
  const succ=clamp(0.8-load*0.16+(S.staff.marketer?0.08:0)+(S.mediaPower||0)/400+(repProfile().media-50)/300,0.1,0.95);
  if(rnd()<succ){
    const pay=Math.round(sp.val*(1+sp.ask.pay*0.15)/10)*10;
    const cut=Math.round(pay*SP_SHARE[sp.ask.share]/100);
    S.sponsorDeals.push({brand:sp.brand,pid:sp.pid,cut,weeksLeft:SP_DUR[sp.ask.dur]});
    S.sponsorPipeline=S.sponsorPipeline.filter(x=>x.id!==spid);
    p.mediaPop=clamp(p.mediaPop+5,1,99);
    bumpRep("media",3);
    addNews("me",`${p.name}, ${sp.brand}'ın yüzü oldu 👟`,`${SP_DUR[sp.ask.dur]} haftalık anlaşma. Ajans payı aylık ${fmtM(cut)}.`,"good");
    toast("Sponsor anlaşması imzalandı 🤝","gold");
    save(); closeSheet(); renderAll();
  } else if(sp.tries>=2){
    S.sponsorPipeline=S.sponsorPipeline.filter(x=>x.id!==spid);
    addNews("me",`${sp.brand} masadan kalktı`,`Şartlar markaya ağır geldi. Belki daha popüler bir dönemde...`,"bad");
    toast("Sponsor vazgeçti 😬"); save(); closeSheet(); renderAll();
  } else {
    save(); openSponsorNego(spid,`"Bu şartlar bütçemizi aşıyor. Biraz esneyin — bu son denememiz."`);
  }
}
